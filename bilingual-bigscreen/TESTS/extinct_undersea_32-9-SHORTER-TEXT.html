<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ER — Extinct Undersea</title>
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="color-scheme" content="dark" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
:root {
  --white:   #fafafa;
  --charcoal:#0a0a0f;
  --deep:    #0d1117;
  --red:     #cc2222;
  --orange:  #c05020;
  --amber:   #b08010;
  --green:   #2a7a3a;
  --gray:    #888888;
  --purple:  #994488;
  --olive:   #607030;
  --blue:    #1a3a5c;
  --font-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-serif: Georgia, 'Times New Roman', serif;
  --font-mono: 'Courier New', Courier, monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--charcoal);
  color: var(--white);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
}
body.cursor-hidden { cursor: none; }
::selection { background: rgba(204,34,34,0.15); color: var(--white); }

/* IUCN badges */
.status-EX  { background: var(--red);    color: #fff; }
.status-EW  { background: var(--purple); color: #fff; }
.status-CR  { background: var(--red);    color: #fff; }
.status-EN  { background: var(--orange); color: #fff; }
.status-VU  { background: var(--amber);  color: #fff; }
.status-NT  { background: var(--olive);  color: #fff; }
.status-LC  { background: var(--green);  color: #fff; }
.status-DD  { background: var(--gray);   color: #fff; }
.status-default { background: rgba(255,255,255,.15); color: var(--white); }

/* ── Layout: dual pane ─────────────────────────────────────────────── */
.stage {
  position: fixed; inset: 0;
  display: flex;
  background: var(--charcoal);
}
.pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  position: relative;
  overflow: hidden;
  padding-bottom: 8vh;
}
.pane-en { border-right: 1px solid rgba(250,250,250,.06); }

/* Subtle gradient at pane edge */
.pane-en::after, .pane-nn::after {
  content: '';
  position: absolute; top: 0; bottom: 0;
  width: 40px;
  pointer-events: none;
  z-index: 5;
}
.pane-en::after { right: 0; background: linear-gradient(to left, rgba(10,10,15,.4), transparent); }
.pane-nn::after { left: 0; background: linear-gradient(to right, rgba(10,10,15,.4), transparent); }

/* ── Image background ──────────────────────────────────────────────── */
.pane__img-layer {
  position: absolute; inset: 0; z-index: 0;
  background: #000;
  pointer-events: none;
}
.pane__img {
  width: 100%; height: 70vh;
  object-fit: cover; object-position: center top;
  filter: grayscale(100%) blur(2px);
  opacity: .5;
  -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
  mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
}

/* ── Card content ──────────────────────────────────────────────────── */
.card {
  position: relative; z-index: 10;
  padding: 0 clamp(1.5rem, 3vw, 3rem);
  max-width: 800px;
  margin: 0 auto;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity .8s ease, transform .8s ease;
}
.card.visible {
  opacity: 1;
  transform: translateY(0);
}

.card__counter {
  font-size: 11px; color: rgba(250,250,250,.35);
  letter-spacing: .15em; font-family: var(--font-mono);
  margin-bottom: .5rem;
}
.card__lang-label {
  font-size: 9px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--red);
  opacity: .6;
  margin-bottom: 1rem;
}
.card__common {
  font-size: clamp(1.4rem, 3.5vw, 2.2rem);
  font-weight: 400; color: var(--red);
  line-height: 1.15; margin-bottom: .25rem;
}
.card__scientific {
  font-size: clamp(.85rem, 1.8vw, 1.1rem);
  font-style: italic; color: rgba(250,250,250,.7);
  font-family: var(--font-serif);
  margin-bottom: 1rem;
}
.card__meta { display: flex; flex-direction: column; gap: .75rem; margin-bottom: 1.25rem; }
.card__meta-label {
  font-size: 10px; letter-spacing: .15em;
  text-transform: uppercase; font-weight: 700;
  color: rgba(250,250,250,.55);
  display: block; margin-bottom: .2rem;
}
.card__badge {
  display: inline-block;
  padding: .25rem .6rem;
  border-radius: 3px;
  font-size: 12px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  line-height: 1.4;
}
.card__cause {
  border-left: 2px solid var(--red);
  padding-left: .75rem;
}
.card__cause-why {
  font-size: 9px; color: rgba(204,34,34,.85);
  letter-spacing: .1em; text-transform: uppercase;
  font-weight: 700; display: block; margin-bottom: .3rem;
}
.card__cause-text {
  font-size: 15px; font-weight: 600;
  color: var(--red); line-height: 1.4;
}
.card__synopsis {
  font-size: clamp(.85rem, 1.6vw, 1rem);
  color: rgba(250,250,250,.88);
  line-height: 1.7; font-weight: 300;
}
.card__synopsis strong { color: var(--white); font-weight: 500; }

/* ── Progress bar ──────────────────────────────────────────────────── */
.progress-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 3px; z-index: 100;
  background: rgba(250,250,250,.06);
}
.progress-fill {
  height: 100%;
  background: var(--red);
  transition: width .4s ease;
  width: 0%;
}

/* ── Timer indicator ──────────────────────────────────────────────── */
.timer-ring {
  position: fixed; bottom: 1.5rem; left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  width: 32px; height: 32px;
  opacity: .35;
}
.timer-ring circle {
  fill: none; stroke-width: 2;
}
.timer-ring .bg { stroke: rgba(250,250,250,.1); }
.timer-ring .fg {
  stroke: var(--red);
  stroke-dasharray: 88;
  stroke-dashoffset: 88;
  transform: rotate(-90deg);
  transform-origin: center;
  transition: stroke-dashoffset linear;
}

/* ── Pause indicator ──────────────────────────────────────────────── */
.pause-indicator {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 200;
  font-size: 10px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase;
  color: rgba(250,250,250,.5);
  background: rgba(0,0,0,.7);
  padding: .5rem 1.2rem;
  border-radius: 4px;
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
}
.pause-indicator.visible { opacity: 1; }

/* ── Loading ───────────────────────────────────────────────────────── */
#loading-screen {
  position: fixed; inset: 0; background: #000;
  display: flex; align-items: center; justify-content: center; z-index: 300;
}
#loading-screen p {
  font-size: .75rem; letter-spacing: .15em; text-transform: uppercase;
  color: var(--red);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity:.5; } 50% { opacity:1; } }
  </style>
</head>

gated its icy waters with magnificent grace, blissfully unaware its flightless nature made it perfectly 'table-ready' for eager human hands.","synopsis_nn":"**Eit lubbent, intetanande mål**, navigerte geirfuglen (Pinguinus impennis) sine iskalde farvatn med storslått ynde, lykkeleg uvitande om at den flygelause naturen gjorde den perfekt 'serveringsklar' for ivrige menneskehender."},{"scientific_name":"Caracara lutosa","common_name":"Guadalupe caracara","iucn_status":"EX","primary_cause":"Hunting, poisoning","last_sighting_year":1903,"region":"Guadalupe Island","wikipedia_url":"https://en.wikipedia.org/wiki/Guadalupe_caracara","image_url":"archive_images/caracara_lutosa.webp","synopsis_en":"**A diligent island scavenger, whose very existence was deemed a nuisance**, the Guadalupe caracara once owned its desolate domain.","synopsis_nn":"**Ein snarrådig øybuar, der sjølve eksistensen vart sett på som ei plage**, Guadalupekarakaraen regjerte eingong over sitt aude rike."},{"scientific_name":"Myiagra freycineti","common_name":"Guam flycatcher","iucn_status":"EX","primary_cause":"Brown tree snake","last_sighting_year":1983,"region":"Guam","wikipedia_url":"https://en.wikipedia.org/wiki/Guam_flycatcher","image_url":"archive_images/myiagra_freycineti.webp","synopsis_en":"**A feathered, fleeting whisper,** the Guam flycatcher once darted through the island's verdant canopy, a diligent hunter of insects.","synopsis_nn":"**Ein fjøra, flyktig kviskring,** Guamflugefangaren pilte ein gong gjennom øya sitt frodige lauvverk, ein flittig insektjeger."},{"scientific_name":"Pteropus tokudae","common_name":"Guam flying fox","iucn_status":"EX","primary_cause":"Hunting","last_sighting_year":1968,"region":"Guam","wikipedia_url":"https://en.wikipedia.org/wiki/Guam_flying_fox","image_url":"archive_images/pteropus_tokudae.webp","synopsis_en":"**A discerning fruit connoisseur**, the Guam flying fox (*Pteropus tokudae*) once gracefully navigated the island's moonlit canopies.","synopsis_nn":" h introduction","last_sighting_year":1962,"region":"Lake Victoria","wikipedia_url":"https://en.wikipedia.org/wiki/Haplochromis_longirostris","image_url":"archive_images/haplochromis_longirostris.webp","synopsis_en":"**Equipped with a nose for the finest aquatic morsels**, *Haplochromis longirostris* was once a quiet connoisseur of Lake Victoria's depths.","synopsis_nn":"**Med ei nase for dei finaste vassdelikatessane**, var *Haplochromis longirostris* ein gong ein stille kjenner av Victoriasjøen sine djup."},{"scientific_name":"Moxostoma lacerum","common_name":"Harelip sucker","iucn_status":"EX","primary_cause":"Habitat loss, dams","last_sighting_year":1893,"region":"North America","wikipedia_url":"https://en.wikipedia.org/wiki/Harelip_sucker","image_url":"archive_images/moxostoma_lacerum.webp","synopsis_en":"**Meet the Harelip Sucker, once a charming riverine vacuum cleaner**, whose distinctive mouth perfectly sifted algae from pristine Midwestern riverbeds.","synopsis_nn":"**Møt Harelip Sucker, ein gong ein sjarmerande elve-støvsugar**, med sin karakteristiske munn som perfekt sila algar frå urørte elvebotnar i Midtvesten."},{"scientific_name":"Corvus hawaiiensis","common_name":"Hawaiian crow (ʻAlalā)","iucn_status":"EW","primary_cause":"Disease, habitat loss","last_sighting_year":2002,"region":"Hawaii","wikipedia_url":"https://en.wikipedia.org/wiki/Hawaiian_crow","image_url":"archive_images/corvus_hawaiiensis.webp","synopsis_en":"**Hawaii's dark jester**, the ʻAlalā was a trickster, tool-user, and the island's only remaining native crow.","synopsis_nn":"**Hawaii sin mørke narr**, ʻAlalāen var ein luring, ein reiskapsbrukar, og den einaste gjenverande innfødde kråka på øya."},{"scientific_name":"Zapornia sandwichensis","common_name":"Hawaiian rail","iucn_status":"EX","primary_cause":"Invasive species","last_sighting_year":1884,"region":"Hawaii","wikipedia_url":"https://en.wikipedia.org/wiki/Hawaiian_rail","image_url":"archive_images/zapornia_sandwichensis.webp","synopsis_en":"**A charmingly flightless flutterer of the Hawaiian undergrowth,** the Zapornia sandwichensis was the epitome of island bliss, happily pecking away at seeds and insects.","synopsis_nn":"**Ein sjarmerande flygelaus flaksar i det hawaiiske krattlaget,** var Zapornia sandwichensis sjølve biletet på øy-lukke, glad i å hakke i seg frø og insekt."},{"scientific_name":"Drepanis pacifica","common_name":"Hawaiʻi mamo","iucn_status":"EX","primary_cause":"Hunting, habitat loss","last_sighting_year":1898,"region":"Hawaii","wikipedia_url":"https://en.wikipedia.org/wiki/Hawaii_mamo","image_url":"archive_images/drepanis_pacifica.webp","synopsis_en":"**The ultimate fashion accessory of ancient Hawaiʻi**, the Hawaiʻi mamo was a living goldmine, its dazzling yellow feathers coveted for royal cloaks and leis.","synopsis_nn":"**Den ultimate moteaksessearen i det gamle Hawaiʻi**, var hawaiʻi-mamoen ei levande gullgruve, der dei blenkjande gule fjørene hennar var ettertrakta til kongelege kapper og leiar."},{"scientific_name":"Moho nobilis","common_name":"Hawaiʻi ʻōʻō","iucn_status":"EX","primary_cause":"Habitat loss, disease","last_sighting_year":1934,"region":"Hawaii","wikipedia_url":"https://en.wikipedia.org/wiki/Hawaiʻi_ʻōʻō","image_url":"archive_images/moho_nobilis.webp","synopsis_en":"**The golden voice of Hawaʻiʻi**, the ʻōʻō bird sang its last serenade not long after humans arrived, unwittingly bringing both the destruction of its lush home and unseen microscopic invaders.","synopsis_nn":"**Gullstrupa frå Hawaʻiʻi**, ōʻō-fuglen song sin siste serenade ikkje lenge etter at menneska kom, og uvitande hadde med seg både øydelegginga av det frodige heimen deira og usynlege mikroskopiske inntrengjarar."},{"scientific_name":"Fregilupus varius","common_name":"Hoopoe starling","iucn_status":"EX","primary_cause":"Hunting, habitat loss","last_sighting_year":1837,"region":"Réunion","wikipedia_url":"https://en.wikipedia.org/wiki/Hoopoe_starling","image_url":"archive_images/fregilupus_varius.webp","synopsis_en":"**The dapper darling of Réunion's forests**, *Fregilupus varius* once flitted through the canopy, a unique starling whose vibrant existence was ironically snuffed out by a mere two-pronged attack.","synopsis_nn":"**Den flotte skogsdarlingen frå Réunion**, *Fregilupus varius* flaug ein gong gjennom trekronene, ein unik stare som ironisk nok fekk livskrafta si kvelt av eit berre to-sidig angrep."},{"scientific_name":"Heteralocha acutirostris","common_name":"Huia","iucn_status":"EX","primary_cause":"Hunting, habitat loss","last_sighting_year":1907,"region":"New Zealand","wikipedia_url":"https://en.wikipedia.org/wiki/Huia","image_url":"archive_images/heteralocha_acutirostris.webp","synopsis_en":"**With a beak for every occasion**, the Huia, New Zealand's dapper darling, once graced the forests, a feathered testament to evolutionary artistry and unique dimorphism.","synopsis_nn":"**Med nebb for ein kvar anledning** prydde huiaen, New Zealands staselege skjønnheit, ein gong skogane, eit fjørkledd prov på evolusjonær kunst og unikt kjønnsdimorfisme."},{"scientific_name":"Homo sapiens","common_name":"Human","iucn_status":"LC","primary_cause":null,"last_sighting_year":null,"region":null,"wikipedia_url":"https://en.wikipedia.org/wiki/Human","image_url":"human_extinction.png","synopsis_en":"The last hominid standing. *Homo sapiens* — brainy, bipedal, relentlessly self-mythologizing — outlasted every rival primate through a combination of cooperative violence, abstract language, and an almost miraculous capacity for self-deception. The sole survivor of a genus that once teemed with cousins, it proceeded to apply its hard-won dominance to the systematic dismantling of the planetary systems that produced it. Cause of (pending) extinction: itself.","synopsis_nn":"Den siste attlevande hominiden. *Homo sapiens* — hjernerik, tobeint og ustoppeleg sjølvmytologiserande — overlevde kvar einaste primatkonkurrent gjennom ein kombinasjon av kooperativ vald, abstrakt språk og ei nær mirakuløs evne til sjølvbedrag. Den einaste attlevande av eit slekt som ein gong krydde av frendar, gjekk han vidare til systematisk demontering av dei planetariske systema som skapte han. Årsak til (kommande) utrydding: seg sjølv.","extra_narrative_en":["Humanity's ascent to apex predator began with the Quaternary Extinction Event, systematically depopulating continents of megafauna. This legacy evolved into the ongoing Sixth Extinction, an ego-driven liquidation of planetary biodiversity fueled by an insatiable hunger for real estate and resources. Compounding this, climate change serves as a reckless experiment in atmospheric self-immolation, driven by fossil-fuel hedonism that treats the biosphere as an infinite dumpster. Operating fundamentally as a planetary pathogen, our endless economic expansion disrupts delicate ecological homeostatis. Ultimately, this territorial psychosis culminates in the looming threat of nuclear war, a potential self-inflicted thermal reset that promises a frozen, final punctuation mark on the human experiment."],"extra_narrative_nn":["Menneska si oppstiging til topprovdyr byrja med den kvartære utryddinga, der dei systematisk avfolka kontinent for megafauna. Denne arven har utvikla seg til den pågåande sjette masseutryddinga, ei egostyrt avvikling av det biologiske mangfaldet på planeten, driven av ein umetteleg svolte etter eigedom og ressursar. For å gjere det verre, tener klimaendringar som eit uvørde eksperiment i atmosfærisk sjølvpåtenning, drive av avhengigheit av fossile brennstoff som handsamar biosfæren som ein uendeleg avfallsplass. Som eit planetarisk patogen forstyrrar vår uendelege økonomiske vekst den skjøre økologiske balansen. Til sist kulminerer denne territorielle psykosen i den overhengande faren for kjernefysisk krig, ei mogleg sjølvpåført termisk nullstilling som lovar eit frosse, endeleg punktum for menneskeeksperimentet."]},{"scientific_name":"Campephilus principalis","common_name":"Ivory-billed woodpecker","iucn_status":"CR (Possibly Extinct)","primary_cause":"Logging, destruction of old-growth swamp forests","last_sighting_year":null,"region":"North America","wikipedia_url":null,"image_url":"archive_images/campephilus_principalis.webp","synopsis_en":"**The Lord God Bird, evicted by the logging industry**, this magnificent, ghostly woodpecker required vast, untouched old-growth swamp forests to thrive.","synopsis_nn":"**Vårherres fugl, kasta ut av tømmerindustrien**, denne praktfulle, spøkelsesaktige hakkespetta kravde vidstrekte, urørte sumpskogar for å trivast."},{"scientific_name":"Xenicibis xympithecus","common_name":"Jamaican Ibis","iucn_status":"EX","primary_cause":"Introduced predators","last_sighting_year":1700,"region":"Jamaica","wikipedia_url":"https://en.wikipedia.org/wiki/Xenicibis","image_url":"generics/generic_bird.webp","synopsis_en":"**An avian anomaly from Jamaica**, the bizarre Jamaican Ibis (Xenicibis xympithecus) evolved a distinctive club-like wing, perhaps for combat or display in its predator-free island haven.","synopsis_nn":"**Ein fugleanomali frå Jamaica**, den bisarre jamaikanske ibisen (Xenicibis xympithecus) utvikla ei særeigen kølleaktig vengje, kanskje til kamp eller kurtisering i sitt rovdyrfrie øyparadis."},{"scientific_name":"Zalophus japonicus","common_name":"Japanese sea lion","iucn_status":"EX","primary_cause":"Hunting, habitat loss","last_sighting_year":1974,"region":"Japan/Korea","wikipedia_url":"https://en.wikipedia.org/wiki/Japanese_sea_lion","image_url":"archive_images/zalophus_japonicus.webp","synopsis_en":"**A celebrated coastal resident**, the Japanese sea lion once gracefully navigated the waters and warmed the shores of its namesake islands.","synopsis_nn":"**Ein feira kystbuar**, den japanske sjøløva ferdast ein gong grasiøst i farvatna og kvilte seg på strendene på øyane den var kalla opp etter."},{"scientific_name":"Canis lupus hodophilax","common_name":"Japanese wolf","iucn_status":"EX","primary_cause":"Hunting, disease","last_sighting_year":1905,"region":"Japan","wikipedia_url":"https://en.wikipedia.org/wiki/Japanese_wolf","image_url":"archive_images/canis_lupus_hodophilax.webp","synopsis_en":"**Not quite big enough to eat Little Red Riding Hood,** the Japanese wolf was once a nimble apex predator of these islands.","synopsis_nn":"**Ikkje heilt stor nok til å eta Raudhette,** var den japanske ulven ein gong eit smidig rovdyr på desse øyane."},{"scientific_name":"Panthera tigris ssp. sondaica (Java)","common_name":"Javan Tiger","iucn_status":"EX","primary_cause":"Habitat loss, hunting","last_sighting_year":1976,"region":"Java, Indonesia","wikipedia_url":"https://en.wikipedia.org/wiki/Javan_tiger","image_url":"archive_images/panthera_tigris_ssp_sondaica_java.webp","synopsis_en":"**Once the undisputed monarch of Java's dense jungles**, the Javan Tiger (Panthera tigris ssp. sondaica) silently vanished, a casualty of humanity's expansion.","synopsis_nn":"**Ein gong den ubestridde monarken i Javas tette junglar**, forsvann javatigeren (Panthera tigris ssp. sondaica) stille, som eit offer for menneskeleg ekspansjon."},{"scientific_name":"Moho braccatus","common_name":"Kauaʻi ʻōʻō","iucn_status":"EX","primary_cause":"Habitat loss, disease, invasive species","last_sighting_year":1987,"region":"Hawaii","wikipedia_url":"https://en.wikipedia.org/wiki/Kauaʻi_ʻōʻō","image_url":"archive_images/moho_braccatus.webp","synopsis_en":"**A golden-throated phantom**, Moho braccatus, the Kauaʻi ʻōʻō, once filled Hawaiian valleys with a song so singular it transcended species.","synopsis_nn":"**Eit gullstrupa fantom**, Moho braccatus, Kauaʻi ʻōʻō, fylte ein gong hawaiiske dalar med ein song så særeigen at den gjekk over artsgrenser."},{"scientific_name":"Chaetoptila angustipluma","common_name":"Kioea","iucn_status":"EX","primary_cause":"Habitat loss, disease","last_sighting_year":1859,"region":"Hawaii","wikipedia_url":"https://en.wikipedia.org/wiki/Kioea","image_url":"archive_images/chaetoptila_angustipluma.webp","synopsis_en":"**A feathered connoisseur of island nectars**, the Kioea once graced Hawaii's dwindling forests, its specialized palate oblivious to the broader, grimmer menu of destruction.","synopsis_nn":"**Ein fjøra kjenner av øy-nektar**, Kioea dansa ein gong gjennom Hawaiis svinnande skogar, hennar spesialiserte gane uvitande om den langt meir destruktive menyen som venta."},{"scientific_name":"Megaladapis edwardsi","common_name":"Koala Lemur","iucn_status":"EX","primary_cause":"Human hunting, habitat destruction","last_sighting_year":1280,"region":"Madagascar","wikipedia_url":"https://en.wikipedia.org/wiki/Megaladapis","image_url":"archive_images/megaladapis_edwardsi.webp","synopsis_en":"**Once a majestic arboreal giant of Madagascar's forests**, the Koala Lemur, or Megaladapis edwardsi, was a slow-moving, leaf-eating primate whose ancient lineage ended abruptly with the arrival of humans.","synopsis_nn":"**Ein gong ein majestetisk trebuar i skogane på Madagaskar**, var koalalemuren, eller Megaladapis edwardsi, ein seintlevande, bladetande primat med ei urgammal slekt som tok slutt brått med menneska sin ankomst."},{"scientific_name":"Scotorythra megalophylla","common_name":"Kona giant looper moth","iucn_status":"EX","primary_cause":"Habitat loss","last_sighting_year":1900,"region":"Hawaii","wikipedia_url":"https://en.wikipedia.org/wiki/Kona_giant_looper_moth","image_url":"archive_images/scotorythra_megalophylla.webp","synopsis_en":"**A colossal caterpillar in paradise,** the Kona giant looper moth, with its impressive wingspan, once danced through Hawaii's lush koa forests, a marvel of botanical indulgence.","synopsis_nn":"**Ein kolossal larve i paradis,** Kona-kjempeviklarmøllen, med sitt imponerande vengespenn, dansa ein gong gjennom Hawaii sine frodige koaskogar, eit under av botanisk overflod."},{"scientific_name":"Chloridops kona","common_name":"Kona grosbeak","iucn_status":"EX","primary_cause":"Habitat loss","last_sighting_year":1894,"region":"Hawaii","wikipedia_url":"https://en.wikipedia.org/wiki/Kona_grosbeak","image_url":"archive_images/chloridops_kona.webp","synopsis_en":"**A seed-crushing connoisseur**, the Kona grosbeak was a specialist of Hawaii’s dry forests, uniquely adapted to crack the toughest 'ōhi'a seeds.","synopsis_nn":"**Ein frøknusande kjenner**, Kona-tjukknebb var ein spesialist i Hawaiis tørre skogar, unikt tilpassa for å knekke dei hardaste 'ōhi'a-frøa."},{"scientific_name":"Paroreomyza flammea","common_name":"Kākāwahie","iucn_status":"EX","primary_cause":"Habitat loss, disease","last_sighting_year":1963,"region":"Hawaii","wikipedia_url":"https://en.wikipedia.org/wiki/Kākāwahie","image_url":"archive_images/paroreomyza_flammea.webp","synopsis_en":"**A pocket-sized inferno of scarlet feathers**, the Kākāwahie once blazed through Maui's forests, its fiery plumage a vibrant counterpoint to the island's lush green.","synopsis_nn":"**Eit lommeformat inferno av skarlagensraude fjør**, Kākāwahie flamma ein gong gjennom skogane på Maui, med den brennande fjørdrakta si som ein livleg kontrast til øyas frodige grøne."},{"scientific_name":"Myadestes myadestinus","common_name":"Kāmaʻo","iucn_status":"EX","primary_cause":"Disease, invasive species","last_sighting_year":1989,"region":"Hawaii","wikipedia_url":"https://en.wikipedia.org/wiki/Kāmaʻo","image_url":"archive_images/myadestes_myadestinus.webp","synopsis_en":"**A delicate songbird with a death wish**, the Kāmaʻo (Myadestes myadestinus) once filled Hawaiian forests with its hauntingly beautiful melody.","synopsis_nn":"**Ein skjør songfugl med eit dødsynskje**, Kāmaʻo (Myadestes myadestinus) fylte ein gong hawaiiske skogar med sin gripande vakre melodi."},{"scientific_name":"Camptorhynchus labradorius","common_name":"Labrador duck","iucn_status":"EX","primary_cause":"Hunting, habitat loss","last_sighting_year":1878,"region":"North America","wikipedia_url":"https://en.wikipedia.org/wiki/Labrador_duck","image_url":"archive_images/camptorhynchus_labradorius.webp","synopsis_en":"**A connoisseur of coastal shallows**, the Labrador duck (Camptorhynchus labradorius) was a uniquely dapper fowl of North American shores.","synopsis_nn":"**Ein kjenner av kystnære grunner**, labradorenda (Camptorhynchus labradorius) var ein unikt stilig fugl frå nordamerikanske kystar."},{"scientific_name":"Lagorchestes asomatus","common_name":"Lake Mackay hare-wallaby","iucn_status":"EX","primary_cause":"Unknown","last_sighting_year":1932,"region":"Australia","wikipedia_url":"https://en.wikipedia.org/wiki/Lake_Mackay_hare-wallaby","image_url":"archive_images/lagorchestes_asomatus.webp","synopsis_en":"**A mirage in the dust**, the lithe Lake Mackay hare-wallaby (*Lagorchestes asomatus*) once darted across arid lands, its existence as fleeting as its movements.","synopsis_nn":"**Eit fata morgana i støvet**, den smekre Lake Mackay-harewallabyen (*Lagorchestes asomatus*) sprang ein gong over tørre landskap, tilværet like flyktig som rørslene."},{"scientific_name":"Pteropus pilosus","common_name":"Large Palau flying fox","iucn_status":"EX","primary_cause":"Hunting","last_sighting_year":1874,"region":"Palau","wikipedia_url":"https://en.wikipedia.org/wiki/Large_Palau_flying_fox","image_url":"archive_images/pteropus_pilosus.webp","synopsis_en":"**A winged connoisseur of the canopy**, the Large Palau flying fox (Pteropus pilosus) once navigated its island home with serene purpose.","synopsis_nn":"**Ein vengja kjenner av kronetaket**, den store Palau flygehunden (Pteropus pilosus) navigerte ein gong øyheimen sin med roleg føremål."},{"scientific_name":"Palaeopropithecus ingens","common_name":"Large Sloth Lemur","iucn_status":"EX","primary_cause":"Hunting, deforestation","last_sighting_year":1500,"region":"Madagascar","wikipedia_url":"https://en.wikipedia.org/wiki/Palaeopropithecus","image_url":"archive_images/palaeopropithecus_ingens.webp","synopsis_en":"**A magnificent, ape-sized sloth lemur, Palaeopropithecus ingens, once slowly traversed Madagascar's ancient forests, a creature seemingly immune to urgency.** This leisurely existence, however, proved no match for the urgency of human arrival; rapid deforestation and relentless hunting swiftly pushed this unique primate into oblivion.","synopsis_nn":"**Ein storslått, ape-stor dovendyrlemur, Palaeopropithecus ingens, streifa ein gong sakte rundt i Madagaskars urgamle skogar, ein skapning som verka immun mot hastverk.** Denne bedagelege tilværet var likevel ingen match for hastverket med menneskeleg ankomst; rask avskoging og nådelaus jakt pressa raskt denne unike primaten inn i gløymselen."},{"scientific_name":"Rhinichthys deaconi","common_name":"Las Vegas dace","iucn_status":"EX","primary_cause":"Water extraction","last_sighting_year":1940,"region":"Nevada, USA","wikipedia_url":"https://en.wikipedia.org/wiki/Las_Vegas_dace","image_url":"archive_images/rhinichthys_deaconi.webp","synopsis_en":"**A tiny Vegas high-roller**, the Las Vegas dace (Rhinichthys deaconi) once knew the intimate secrets of desert springs, a shimmering flash of life amidst arid lands.","synopsis_nn":"**Ein liten Vegas-gamblar**, Las Vegas-ørekulen (Rhinichthys deaconi) kjende ein gong dei intime løyndomane til ørkenkjeldene, ein glitrande livsglimt midt i tørre landskap."},{"scientific_name":"Sceloglaux albifacies","common_name":"Laughing owl","iucn_status":"EX","primary_cause":"Invasive species","last_sighting_year":1914,"region":"New Zealand","wikipedia_url":"https://en.wikipedia.org/wiki/Laughing_owl","image_url":"archive_images/sceloglaux_albifacies.webp","synopsis_en":"**The final punchline was on them.** New Zealand's Laughing Owl (Sceloglaux albifacies) once filled the nights with its distinctive, eerie chuckles, utterly unaware of the tragic irony awaiting it.","synopsis_nn":"**Den siste punchlinen var på deira kostnad.** New Zealands latterugle (Sceloglaux albifacies) fylte ein gong nettene med sine særeigne, skumle lattertonar, fullstendig uvitande function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function fmtSynopsis(text) {
  if (!text) return '';
  let s = text.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
  s = s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/<b>(.*?)<\/b>/g, '<strong>$1</strong>');
  if (!s.includes('<strong') && s.includes(',')) {
    const i = s.indexOf(',');
    if (i > 0 && i < 80) s = `<strong>${s.slice(0,i)}</strong>${s.slice(i)}`;
  }
  return s;
}

function statusLabel(sp, lang) {
  if (sp.scientific_name === 'Homo sapiens') {
    return lang === 'en' ? 'MOST CONCERNING' : 'MEST BEKYMRINGSVERDIG';
  }
  return IUCN[sp.iucn_status]?.[lang] || sp.iucn_status || '—';
}

function statusClass(sp) {
  if (sp.scientific_name === 'Homo sapiens') return 'status-LC';
  if (sp.scientific_name === 'Felis catus')  return 'status-LC';
  return IUCN[sp.iucn_status]?.cls || 'status-default';
}

function yearLabel(sp) {
  const y = sp.last_sighting_year;
  if (y == null) return '';
  const pfx = y < 1850 ? 'circa ' : '';
  const sfx = y < 0 ? ' BC' : '';
  return `: ${pfx}${Math.abs(y)}${sfx}`;
}

function imgSrc(sp) {
  if (!sp.image_url || sp.image_url === 'none') return null;
  return sp.image_url.replace(/^\//, '../public/');
}

/* ── Build card HTML for one pane ──────────────────────────────────── */
function buildCardHTML(sp, idx, total, lang) {
  const displayName = (sp.common_name || sp.scientific_name).replace(/null|undefined/gi, '').trim();
  const region = sp.region || '';
  const cause = sp.primary_cause && sp.primary_cause !== 'null' ? sp.primary_cause : null;
  const synopsis = lang === 'en' ? sp.synopsis_en : sp.synopsis_nn;
  const langLabel = lang === 'en' ? 'ENGLISH' : 'NYNORSK';

  const causeHtml = cause ? `
    <div class="card__cause">
      <span class="card__cause-why">${esc(WHY[lang])}</span>
      <span class="card__cause-text">${esc(cause)}</span>
    </div>` : '';

  return `
    <div class="card__lang-label">${langLabel}</div>
    <div class="card__counter">${idx + 1} / ${total}</div>
    <h2 class="card__common">${esc(displayName)}</h2>
    <h3 class="card__scientific">${esc(sp.scientific_name)}${region ? ' — ' + esc(region) : ''}</h3>
    <div class="card__meta">
      <div>
        <span class="card__meta-label">${lang === 'en' ? 'Status' : 'Status'}:</span>
        <span class="card__badge ${statusClass(sp)}">${esc(statusLabel(sp, lang))}${esc(yearLabel(sp))}</span>
      </div>
      ${causeHtml}
    </div>
    <div class="card__synopsis">${fmtSynopsis(synopsis)}</div>`;
}

/* ── State ──────────────────────────────────────────────────────────── */
const species = SPECIES_DATA;
const total = species.length;
let current = 0;
let paused = false;
let intervalMs = 8000;  // 8 seconds per card
let timer = null;
let timerStart = 0;

const paneEn = document.getElementById('pane-en');
const paneNn = document.getElementById('pane-nn');
const progressFill = document.getElementById('progress-fill');
const timerFg = document.getElementById('timer-fg');
const pauseIndicator = document.getElementById('pause-indicator');

/* ── Render current card ───────────────────────────────────────────── */
function showCard(idx) {
  current = idx % total;
  const sp = species[current];
  const src = imgSrc(sp);

  // EN pane
  let imgLayerEn = '';
  if (src) {
    imgLayerEn = `<div class="pane__img-layer"><img class="pane__img" src="${esc(src)}" alt="" onerror="this.parentElement.style.display='none'" /></div>`;
  }
  paneEn.innerHTML = imgLayerEn + '<div class="card" id="card-en">' + buildCardHTML(sp, current, total, 'en') + '</div>';

  // NN pane
  let imgLayerNn = '';
  if (src) {
    imgLayerNn = `<div class="pane__img-layer"><img class="pane__img" src="${esc(src)}" alt="" onerror="this.parentElement.style.display='none'" /></div>`;
  }
  paneNn.innerHTML = imgLayerNn + '<div class="card" id="card-nn">' + buildCardHTML(sp, current, total, 'nn') + '</div>';

  // Progress
  progressFill.style.width = ((current + 1) / total * 100) + '%';

  // Trigger fade-in
  requestAnimationFrame(() => {
    document.getElementById('card-en')?.classList.add('visible');
    document.getElementById('card-nn')?.classList.add('visible');
  });
}

/* ── Timer ring animation ──────────────────────────────────────────── */
const circumference = 2 * Math.PI * 14; // r=14

function startTimerRing() {
  timerFg.style.transition = 'none';
  timerFg.style.strokeDashoffset = circumference;
  requestAnimationFrame(() => {
    timerFg.style.transition = `stroke-dashoffset ${intervalMs}ms linear`;
    timerFg.style.strokeDashoffset = '0';
  });
}

/* ── Autoplay ──────────────────────────────────────────────────────── */
function advance() {
  showCard(current + 1);
  startTimerRing();
}

function startAutoplay() {
  stopAutoplay();
  timerStart = Date.now();
  startTimerRing();
  timer = setInterval(advance, intervalMs);
}

function stopAutoplay() {
  if (timer) { clearInterval(timer); timer = null; }
}

/* ── Cursor auto-hide after 30s inactivity ─────────────────────────── */
let cursorTimer = null;
function showCursor() {
  document.body.classList.remove('cursor-hidden');
  clearTimeout(cursorTimer);
  cursorTimer = setTimeout(() => document.body.classList.add('cursor-hidden'), 30000);
}
document.addEventListener('mousemove', showCursor);
document.addEventListener('mousedown', showCursor);
showCursor();

/* ── Fullscreen toggle (double-click or F key) ─────────────────────── */
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}
document.addEventListener('dblclick', (e) => {
  e.preventDefault();
  toggleFullscreen();
});

/* ── Pause / resume ────────────────────────────────────────────────── */
document.addEventListener('click', () => {
  paused = !paused;
  pauseIndicator.classList.toggle('visible', paused);
  if (paused) {
    stopAutoplay();
    timerFg.style.transition = 'none';
  } else {
    startAutoplay();
  }
});

/* ── Keyboard: left/right to skip ──────────────────────────────────── */
document.addEventListener('keydown', (e) => {
  if (e.key === 'f' || e.key === 'F') { toggleFullscreen(); return; }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    showCard(current + 1);
    if (!paused) startAutoplay();
  }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    showCard((current - 1 + total) % total);
    if (!paused) startAutoplay();
  }
  if (e.key === ' ') {
    e.preventDefault();
    document.dispatchEvent(new Event('click'));
  }
});

/* ── Init ──────────────────────────────────────────────────────────── */
showCard(0);
document.getElementById('loading-screen').style.display = 'none';
startAutoplay();
</script>
