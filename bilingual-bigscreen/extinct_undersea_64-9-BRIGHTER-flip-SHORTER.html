kje fungerer som ein integrert økologisk deltakar, men som eit dødeleg planetarisk patogen.", "**Kjernefysisk krig**: Den ultimate, sjølvpåførte termiske nullstillinga. Dette potensialet representerer høgdepunktet av Sapiens sin territorielle psykose, der arten brukte meistringa si av fysikk til ein global sjølvmordspakt. Utover den innleiande kinetiske slettinga, utgjer den resulterande kjernefysiske vinteren ein katastrofal utryddingsrisiko, då sotfylt himmel får det globale jordbruket til å kollapse og kastar dei overlevande ut i ein fleirårig hungersnød under frysepunktet."] }, { "scientific_name": "Campephilus principalis", "common_name": "Ivory-billed woodpecker", "iucn_status": "CR (Possibly Extinct)", "primary_cause": "Logging, destruction of old-growth swamp forests", "last_sighting_year": null, "region": "North America", "wikipedia_url": null, "image_url": "archive_images/campephilus_principalis.webp", "synopsis_en": "**The Lord God Bird, evicted by logging**, this magnificent woodpecker required vast, untouched old-growth swamp forests. Humans systematically clear-cut the American South, leaving the bird a haunting myth that naturalists desperately chase through the remnants of its former kingdom.", "synopsis_nn": "**Herren Guds fugl, kasta ut av tømmerhogst**, denne storslåtte hakkespetten kravde enorme, urørte urskogar i sumpområde. Menneska flathogde systematisk det amerikanske sør, og etterlét fuglen som ein hjemsøkjande myte som naturvitarar desperat jagar gjennom restane av det tidlegare kongeriket hans." }, { "scientific_name": "Xenicibis xympithecus", "common_name": "Jamaican Ibis", "iucn_status": "EX", "primary_cause": "Introduced predators", "last_sighting_year": 1700, "region": "Jamaica", "wikipedia_url": "https://en.wikipedia.org/wiki/Xenicibis", "image_url": "generics/generic_bird.webp", "synopsis_en": "**An avian anomaly from Jamaica**, the bizarre Jamaican Ibis evolved a distinctive club-like wing, perhaps for combat or display. This unique adaptation proved useless against introduced predators, sealing its fate as a silent casualty of human-mediated ecological disruption.", "synopsis_nn": "**Ein fugleanomali frå Jamaica**, den bisarre jamaicaibisen utvikla ei særprega klubbeliknande venge, kanskje for kamp eller oppvisning. Denne unike tilpassinga viste seg å vere ubrukeleg mot introduserte rovdyr, og forsegla lagnaden hennar som eit stille offer for menneskeskapt økologisk forstyrring." }, { "scientific_name": "Zalophus japonicus", "common_name": "Japanese sea lion", "iucn_status": "EX", "primary_cause": "Hunting, habitat loss", "last_sighting_year": 1974, "region": "Japan/Korea", "wikipedia_url": "https://en.wikipedia.org/wiki/Japanese_sea_lion", "image_url": "archive_images/zalophus_japonicus.webp", "synopsis_en": "**A celebrated coastal resident**, the Japanese sea lion once gracefully navigated the waters and warmed the shores of its namesake islands. Its sleek form and playful barks proved tragically irresistible to hunters seeking pelts and blubber, ensuring its final bow to history by 1951.", "synopsis_nn": "**Ein hylla kystinnbyggjar**, den japanske sjøløva navigerte ein gong grasiøst i farvatna og varma strendene på øyane ho er kalla opp etter. Den slanke forma og dei leikne byksa viste seg å vere tragisk uimotståelege for jegerar på jakt etter skinn og spekk, og sikra at ho takka for seg i historia innan 1951." }, { "scientific_name": "Canis lupus hodophilax", "common_name": "Japanese wolf", "iucn_status": "EX", "primary_cause": "Hunting, disease", "last_sighting_year": 1905, "region": "Japan", "wikipedia_url": "https://en.wikipedia.org/wiki/Japanese_wolf", "image_url": "archive_images/canis_lupus_hodophilax.webp", "synopsis_en": "**Once a nimble apex predator of these islands**, the Japanese wolf fell victim to hunters' bullets and introduced diseases, not legend. Its demise left behind only dusty museum specimens and a haunting irony: a ghost in its own land, extinct by 1905.", "synopsis_nn": "**Ein gong eit smidig topprovdyr på desse øyane**, den japanske ulven fall offer for jegerars kuler og introduserte sjukdomar, ikkje for legender. Forsvinninga hennar etterlét berre støvete museumseksemplar og ein hjemsøkjande ironi: eit spøkelse i sitt eige land, utrydda innan 1905." }, { "scientific_name": "Panthera tigris ssp. sondaica (Java)", "common_name": "Javan Tiger", "iucn_status": "EX", "primary_cause": "Habitat loss, hunting", "last_sighting_year": 1976, "region": "Java, Indonesia", "wikipedia_url": "https://en.wikipedia.org/wiki/Javan_tiger", "image_url": "archive_images/panthera_tigris_ssp_sondaica_java.webp", "synopsis_en": "**Once the undisputed monarch of Java's dense jungles**, the Javan Tiger silently vanished, a casualty of humanity's relentless expansion. Its vibrant stripes faded into legend, systematically erased by pervasive habitat loss and relentless hunting pressure, leaving only echoes of this majestic predator.", "synopsis_nn": "**Ein gong den ubestridde monarken i Javas tette junglar**, javatigeren forsvann i det stille, eit offer for menneskja si nådelause utviding. Dei levande stripene hennar falma over i legender, systematisk utsletta av omfattande tap av habitat og eit nådelaust jakttrykk, og etterlét berre ekko av dette majestetiske rovdyret." }, { "scientific_name": "Moho braccatus", "common_name": "Kauaʻi ʻōʻō", "iucn_status": "EX", "primary_cause": "Habitat loss, disease, invasive species", "last_sighting_year": 1987, "region": "Hawaii", "wikipedia_url": "https://en.wikipedia.org/wiki/Kauaʻi_ʻōʻō", "image_url": "archive_images/moho_braccatus.webp", "synopsis_en": "**A golden-throated phantom**, Moho braccatus, the Kauaʻi ʻōʻō, once filled Hawaiian valleys with song so singular it transcended species boundaries. Forest destruction, exotic diseases, and invasive predators combined to silence its unique voice, with the final note fading in 1987, leaving profound silence.", "synopsis_nn": "**Eit gyllen-strupa fantom**, Moho braccatus, kauai-ʻōʻō-en, fylte ein gong hawaiiske dalar med ein song så særeigen at han kryssa artsgrensene. Skogøydelegging, eksotiske sjukdomar og invaderande rovdyr gjekk saman om å teia den unike røysta, med den siste tonen som falma ut i 1987, og etterlét seg eit djupt stille." }, { "scientific_name": "Chaetoptila angustipluma", "common_name": "Kioea", "iucn_status": "EX", "primary_cause": "Habitat loss, disease", "last_sighting_year": 1859, "region": "Hawaii", "wikipedia_url": "https://en.wikipedia.org/wiki/Kioea", "image_url": "archive_images/chaetoptila_angustipluma.webp", "synopsis_en": "**A feathered connoisseur of island nectars**, the Kioea graced Hawaii's dwindling forests, its specialized palate oblivious to the broader destruction around it. Habitat loss and introduced diseases cooked up a potent brew, silencing this unique bird's song and leaving only bittersweet memories of its existence.", "synopsis_nn": "**Ein fjørkledd kjennar av øynektarar**, kioeaen pryda Hawaiis svinnande skogar, med sin spesialiserte gane uvitande om den breiare øydelegginga rundt seg. Tap av habitat og introduserte sjukdomar koka i hop eit kraftig brygg, teia denne unike fuglen sin song og etterlét berre bittersøte minne om at han nokon gong fanst." }, { "scientific_name": "Megaladapis edwardsi", "common_name": "Koala Lemur", "iucn_status": "EX", "primary_cause": "Human hunting, habitat destruction", "last_sighting_year": 1280, "region": "Madagascar", "wikipedia_url": "https://en.wikipedia.org/wiki/Megaladapis", "image_url": "archive_images/megaladapis_edwardsi.webp", "synopsis_en": "**Once a majestic arboreal giant of Madagascar's forests**, the Koala Lemur, weighing up to 75 kg, was a slow-moving leaf-eating primate with ancient lineage. Human arrival brought relentless hunting and widespread habitat destruction, abruptly ending its lumbering existence, leaving only extinction behind.", "synopsis_nn": "**Ein gong ei majestetisk, trebuande kjempe i skogane på Madagaskar**, koalalemuern, som vog opp til 75 kg, var ein saktegåande, bladetande primat med ætteliner langt attende i tid. Menneskeleg framkomst førte med seg nådelaus jakt og omfattande habitatøydelegging, som brått gjorde slutt på den trege eksistensen hennar og berre etterlét seg utrydding." }, { "scientific_name": "Scotorythra megalophylla", "common_name": "Kona giant looper moth", "iucn_status": "EX", "primary_cause": "Habitat loss", "last_sighting_year": 1900, "region": "Hawaii", "wikipedia_url": "https://en.wikipedia.org/wiki/Kona_giant_looper_moth", "image_url": "archive_images/scotorythra_megalophylla.webp", "synopsis_en": "**A colossal caterpillar in paradise**, the Kona giant looper moth with impressive wingspan danced through Hawaii's lush koa forests, a marvel. Systematic habitat destruction outmatched this leaf-guzzling giant, leaving only spectral flutter in ghost forests, a gentle giant consumed by progress.", "synopsis_nn": "**Ein kolossal kålorm i paradiset**, Kona-kjempespinnaren med sitt imponerande vengespenn dansa gjennom Hawaiis frodige koaskogar, eit underverk. Systematisk habitatøydelegging var for mykje for denne blad-slukande giganten, og etterlét berre spøkjelsesaktige flaksingar i skrømt-skogar, ein blid kjempe fortært av framsteg." }, { "scientific_name": "Chloridops kona", "common_name": "Kona grosbeak", "iucn_status": "EX", "primary_cause": "Habitat loss", "last_sighting_year": 1894, "region": "Hawaii", "wikipedia_url": "https://en.wikipedia.org/wiki/Kona_grosbeak", "image_url": "archive_images/chloridops_kona.webp", "synopsis_en": "**A seed-crushing connoisseur**, the Kona grosbeak was a specialist of Hawaii's dry forests, uniquely adapted to crack the toughest ʻōhiʻa seeds. Its exclusive palate sealed its fate when the slow vanishing of its arboreal pantry left nothing to consume, a gourmet's tragic end.", "synopsis_nn": "**Ein frø-knusande kjennar**, kona-tjukknebben var ein spesialist i Hawaiis tørre skogar, unikt tilpassa for å knekke dei hardaste ʻōhiʻa-frøa. Den eksklusive ganen hennar forsegla lagnaden då hennar trebaserte matkammer sakte forsvann og ikkje etterlét noko å ete – ein tragisk slutt for ein gourmet." }, { "scientific_name": "Paroreomyza flammea", "common_name": "Kākāwahie", "iucn_status": "EX", "primary_cause": "Habitat loss, disease", "last_sighting_year": 1963, "region": "Hawaii", "wikipedia_url": "https://en.wikipedia.org/wiki/Kākāwahie", "image_url": "archive_images/paroreomyza_flammea.webp", "synopsis_en": "**A pocket-sized inferno of scarlet feathers**, the Kākāwahie once blazed through Maui's forests, its fiery plumage a vibrant counterpoint. Despite meaning 'firewood,' this tiny bird proved ill-equipped for vanishing homes and insidious diseases, fizzling out in slow, darkly comedic extinction by 1900.", "synopsis_nn": "**Eit lommeformat-inferno av skarlagensraude fjører**, kākāwahie-en brann ein gong seg veg gjennom skogane på Maui, i eit livleg samspel. Til trass for at namnet tyder 'ved', viste denne bitte vesle fuglen seg å vere dårleg rusta for forsvinnande heimar og lumske sjukdomar, og slutta sakte å brenne i ei mørk-komisk utrydding innan 1900." }, { "scientific_name": "Myadestes myadestinus", "common_name": "Kāmaʻo", "iucn_status": "EX", "primary_cause": "Disease, invasive species", "last_sighting_year": 1989, "region": "Hawaii", "wikipedia_url": "https://en.wikipedia.org/wiki/Kāmaʻo", "image_url": "archive_images/myadestes_myadestinus.webp", "synopsis_en": "**A delicate Hawaiian songbird**, the Kāmaʻo once filled island forests with hauntingly beautiful melodies until introduced diseases and invasive species brought casual cruelty, extinguishing its vibrant song forever.", "synopsis_nn": "**Ein delikat hawaiisk songfugl**, kāmaʻoen fylte ein gong øyskogane med ubeskriveleg vakre melodiar fram til introduserte sjukdomar og invaderande artar førte til tilfeldig grusomheit, og sløkte den livlege songen for alltid." }, { "scientific_name": "Camptorhynchus labradorius", "common_name": "Labrador duck", "iucn_status": "EX", "primary_cause": "Hunting, habitat loss", "last_sighting_year": 1878, "region": "North America", "wikipedia_url": "https://en.wikipedia.org/wiki/Labrador_duck", "image_url": "archive_images/camptorhynchus_labradorius.webp", "synopsis_en": "**A dapper North American fowl**, the Labrador duck vanished by 1878, driven to extinction through relentless hunting for its striking feathers and simultaneous destruction of vital estuarine habitats.", "synopsis_nn": "**Ein staseleg nordamerikansk fugl**, labradordaen forsvann innan 1878, driven til utrydding gjennom nådelaus jakt for dei slåande fjørene sine og samtidig øydelegging av livsviktige estuarhabitat." }, { "scientific_name": "Lagorchestes asomatus", "common_name": "Lake Mackay hare-wallaby", "iucn_status": "EX", "primary_cause": "Unknown", "last_sighting_year": 1932, "region": "Australia", "wikipedia_url": "https://en.wikipedia.org/wiki/Lake_Mackay_hare-wallaby", "image_url": "archive_images/lagorchestes_asomatus.webp", "synopsis_en": "**A ghost of arid lands**, the lithe Lake Mackay hare-wallaby slipped from living memory in the 20th century, its final vanishing holding peculiar melancholic irony about its fate.", "synopsis_nn": "**Eit spøkelse i tørre landskap**, den smidige Lake Mackay-harewallabyen forsvann frå manns minne på 1900-talet, og den endelege forsvinninga ber på ei spesiell, melankolsk ironi om hans lagnad." }, { "scientific_name": "Pteropus pilosus", "common_name": "Large Palau flying fox", "iucn_status": "EX", "primary_cause": "Hunting", "last_sighting_year": 1874, "region": "Palau", "wikipedia_url": "https://en.wikipedia.org/wiki/Large_Palau_flying_fox", "image_url": "archive_images/pteropus_pilosus.webp", "synopsis_en": "**A winged canopy dweller**, the Large Palau flying fox navigated its island home with serene purpose until human appetites transformed this fruit-loving gentle giant into an irresistible delectable fatality.", "synopsis_nn": "**Ein tylus diurnus", "common_name": "Mount Glorious day frog", "iucn_status": "EX", "primary_cause": "Disease (chytrid fungus)", "last_sighting_year": 1979, "region": "Australia", "wikipedia_url": "https://en.wikipedia.org/wiki/Taudactylus_diurnus", "image_url": "archive_images/taudactylus_diurnus.webp", "synopsis_en": "**A sun-kissed rainforest charmer**, the Mount Glorious day frog brightened Queensland streams until chytrid fungus silently extinguished this rare diurnal creature.", "synopsis_nn": "**Ein solkyssa regnskogsjarmør**, the Mount Glorious day frog lyste opp bekkene i Queensland fram til chytrid-soppen utrydda denne uvanlege dagaktive skapningen i det stille." }, { "scientific_name": "Prototroctes oxyrhynchus", "common_name": "New Zealand grayling", "iucn_status": "EX", "primary_cause": "Overfishing, habitat loss", "last_sighting_year": 1923, "region": "New Zealand", "wikipedia_url": "https://en.wikipedia.org/wiki/New_Zealand_grayling", "image_url": "archive_images/prototroctes_oxyrhynchus.webp", "synopsis_en": "**The quintessential 'one that got away'**, the New Zealand grayling vanished by the 1920s as human settlement and habitat destruction transformed its river home into pastureland. Its rapid decline from abundant river-dweller to spectral memory exemplifies the swift cost of progress.", "synopsis_nn": "**Sjølve innbegrepet på 'den som slapp unna'**, New Zealand-harren forsvann innan 1920-åra då menneskeleg busetnad og habitatøydelegging forvandla elveheimen hans til beitemarker. Det raske fallet frå talrik elvebuar til eit spøkjelsesaktig minne eksemplifiserer den brå kostnaden ved framsteg." }, { "scientific_name": "Mergus australis", "common_name": "New Zealand merganser", "iucn_status": "EX", "primary_cause": "Hunting, invasive species", "last_sighting_year": 1902, "region": "New Zealand", "wikipedia_url": "https://en.wikipedia.org/wiki/New_Zealand_merganser", "image_url": "archive_images/mergus_australis.webp", "synopsis_en": "**A dapper dive-duck with no foresight**, the New Zealand merganser once patrolled freshwater ways until human settlers hunted it relentlessly. Introduced predators like rats and stoats decimated its dwindling numbers, and by 1902 it had vanished entirely from global waters.", "synopsis_nn": "**Ein staseleg dukkand utan framsyn**, New Zealand-fiskanda patruljerte ein gong ferskvatn inntil menneskelege nybyggjarar jakta henne nådelaust. Introduserte rovdyr som rotter og røyskattar desimerte det dvinande talet hennar, og innan 1902 hadde ho heilt forsvunne frå alle farvatn på kloden." }, { "scientific_name": "Coturnix novaezelandiae", "common_name": "New Zealand quail", "iucn_status": "EX", "primary_cause": "Hunting, invasive species", "last_sighting_year": 1875, "region": "New Zealand", "wikipedia_url": "https://en.wikipedia.org/wiki/New_Zealand_quail", "image_url": "archive_images/coturnix_novaezelandiae.webp", "synopsis_en": "**A plump, personable target**, the New Zealand quail hopped across native grasslands until hunted for food and outmatched by introduced predators. This charming bird was erased within decades, leaving only echoes where lively chirps once filled the landscape.", "synopsis_nn": "**Eit lubbe, omgjengeleg mål**, New Zealand-vaktelen hoppa over innfødde grasmarker inntil han vart jakta for mat og overvunnen av introduserte rovdyr. Denne sjarmerande fuglen vart utsletta i løpet av nokre tiår, og etterlét seg berre ekko der livleg kvitring ein gong fylte landskapet." }, { "scientific_name": "Nestor productus", "common_name": "Norfolk kaka", "iucn_status": "EX", "primary_cause": "Hunting", "last_sighting_year": 1851, "region": "Norfolk Island", "wikipedia_url": "https://en.wikipedia.org/wiki/Norfolk_kaka", "image_url": "archive_images/nestor_productus.webp", "synopsis_en": "**A famously friendly parrot**, the Norfolk kaka probably greeted human visitors with inquisitive squawks rather than fear. This naivety proved fatally charming; by 1851 every last one had been enthusiastically 'collected' and hunted for scientific curiosity and convenient sustenance.", "synopsis_nn": "**Ein vidgjeten, vennleg papegøye**, Norfolk-kakaen helste truleg menneskelege besøkande med nysgjerrige skrik i staden for frykt. Denne naiviteten viste seg å vere fatalt sjarmerande; innan 1851 hadde kvart einaste individ vorte entusiastisk 'samla inn' og jakta på grunn av vitskapleg nysgjerrigheit og som lettvint føde." }, { "scientific_name": "Perameles papillon", "common_name": "Nullarbor barred bandicoot", "iucn_status": "EX", "primary_cause": "Predation, habitat loss", "last_sighting_year": 1920, "region": "Australia", "wikipedia_url": "https://en.wikipedia.org/wiki/Perameles_papillon", "image_url": "archive_images/perameles_papillon.webp", "synopsis_en": "**A whisper in the wattle**, the Nullarbor barred bandicoot once darted through arid scrubland. Its unique habitat vanished while introduced predators found its lithe form exquisite prey. This pocket-sized creature danced its final jig on a stage that ceased to exist.", "synopsis_nn": "**Eit kvisker i akasiane**, Nullarbor barred bandicoot pilte ein gong gjennom det tørre krattlandskapet. Det unike habitatet hennar forsvann medan introduserte rovdyr fann den smidige skapningen som eit utsøkt bytte. Denne lommeformat-skapningen dansa sin siste dans på ein scene som slutta å eksistere." }, { "scientific_name": "Psephotellus pulcherrimus", "common_name": "Paradise parrot", "iucn_status": "EX", "primary_cause": "Habitat loss, grazing", "last_sighting_year": 1927, "region": "Australia", "wikipedia_url": "https://en.wikipedia.org/wiki/Paradise_parrot", "image_url": "archive_images/psephotellus_pulcherrimus.webp", "synopsis_en": "**A feathered rumour of Eden**, the Paradise Parrot was a breathtaking splash of emerald and sapphire. Its paradise was trampled away by introduced herbivores that consumed its delicate dietary niche, leaving only vision where once was vibrant life.", "synopsis_nn": "**Eit fjørkledd rykte om Edens hage**, paradispapegøyen var ein slåande dæsj av smaragd og safir. Paradiset hennar vart trampa i stykkar av introduserte planteetarar som åt opp den delikate kosten hennar, og etterlét berre eit syn der det ein gong var pulserande liv." }, { "scientific_name": "Cyprinodon latifasciatus", "common_name": "Parras pupfish", "iucn_status": "EX", "primary_cause": "Habitat loss", "last_sighting_year": 1930, "region": "Mexico", "wikipedia_url": "https://en.wikipedia.org/wiki/Parras_pupfish", "image_url": "archive_images/cyprinodon_latifasciatus.webp", "synopsis_en": "**A splash of desert defiance**, the Parras pupfish wasn't hunted by monsters or obliterated by meteorites. Its world was slowly siphoned away until no puddle remained, a tragic irony: vanishing not with a bang but a bone-dry sigh.", "synopsis_nn": "**Eit plask av ørkentross**, Parras-killi blei ikkje jakta av monster eller utsletta av meteorittar. Verda hennar blei sakte soge vekk heilt til det ikkje var ein einaste pytt igjen, ein tragisk ironi: forsvinninga skjedde ikkje med eit smell, men med eit knusktørt sukk." }, { "scientific_name": "Partula langfordi", "common_name": "Partula langfordi", "iucn_status": "EX", "primary_cause": "Predatory snail", "last_sighting_year": 1992, "region": "French Polynesia", "wikipedia_url": "https://en.wikipedia.org/wiki/Partula_langfordi", "image_url": "archive_images/partula_langfordi.webp", "synopsis_en": "**A humble denizen of Pacific fronds**, *Partula langfordi* once grazed peacefully among leaves until a relentless, shell-drilling predatory snail invaded its fragile world. This delicate beauty fell to the very creature it resembled, a testament to brutal ecological collapse.", "synopsis_nn": "**Ein smålåten innbyggjar på stillehavsblad**, *Partula langfordi* beita ein gong fredeleg blant blada inntil ei nådelaus, skalborande rovsnigel invaderte den skjøre verda hennar. Denne delikate venleiken fall for sjølve skapningen ho likna på, eit vitnesbyrd om brutalt økologisk samanbrot." }, { "scientific_name": "Partula turgida", "common_name": "Partula turgida", "iucn_status": "EX", "primary_cause": "Predatory snail introduction", "last_sighting_year": 1996, "region": "French Polynesia", "wikipedia_url": "https://en.wikipedia.org/wiki/Partula_turgida", "image_url": "archive_images/partula_turgida.webp", "synopsis_en": "**A delicate decorator of Tahitian leaves**, *Partula turgida* grazed peacefully until the Rosy Wolf Snail, introduced as biological control, instead consumed this gentle native as an easy meal. Only whispers remain of its beautiful, brief existence.", "synopsis_nn": "**Ein delikat dekoratør på tahitiske blad**, *Partula turgida* beita fredeleg fram til rosenulvesnigelen, introdusert som biologisk kontroll, i staden slurpa i seg denne milde innfødde snigelen som eit lettvint måltid. Berre kviskringar står igjen etter hennar vakre, korte eksistens." }, { "scientific_name": "Ectopistes migratorius", "common_name": "Passenger pigeon", "iucn_status": "EX", "primary_cause": "Hunting, habitat loss", "last_sighting_year": 1914, "region": "North America", "wikipedia_url": "https://en.wikipedia.org/wiki/Passenger_pigeon", "image_url": "archive_images/ectopistes_migratorius.webp", "synopsis_en": "**A billion beats of a broken heart**, the Passenger Pigeon once darkened skies in endless flocks. We hunted them for sport and food while dismantling their forest homes. From boundless abundance to nothing in mere decades.", "synopsis_nn": "**Ein milliard slag frå eit knust hjarte**, vandreduen formørka ein gong himmelen i endelause flokkar. Vi jakta på dei for sport og mat medan vi raserte skogsheimane deira. Frå grenselaus overflod til ingenting på berre nokre få tiår." }, { "scientific_name": "Notropis orca", "common_name": "Phantom shiner", "iucn_status": "EX", "primary_cause": "Dams, habitat loss", "last_sighting_year": 1975, "region": "North America", "wikipedia_url": "https://en.wikipedia.org/wiki/Phantom_shiner", "image_url": "archive_images/notropis_orca.webp", "synopsis_en": "**A spectral shimmer in the currents**, the Phantom Shiner once danced through southwestern rivers. Its disappearance wasn't mysterious but mundane: systematic habitat fragmentation by dams and development. Its ironic name remains, a permanent ghost in reshaped landscapes.", "synopsis_nn": "**Eit spøkjelsesaktig skimmer i straumane**, den spøkjelsesaktige shiner-fisken dansa ein gong gjennom elvane i sørvest. Forsvinninga hennar var ikkje mystisk, men kvardagsleg: systematisk habitatfragmentering på grunn av dammar og utbygging. Det ironiske namnet er alt som står att, eit permanent spøkelse i omforma landskap." }, { "scientific_name": "Chaeropus ecaudatus", "common_name": "Pig-footed bandicoot", "iucn_status": "EX", "primary_cause": "Predation, habitat loss", "last_sighting_year": 1950, "region": "Australia", "wikipedia_url": "https://en.wikipedia.org/wiki/Pig-footed_bandicoot", "image_url": "archive_images/chaeropus_ecaudatus.webp", "synopsis_en": "**A daintily doomed digger**, the Pig-footed bandicoot tiptoed through the Australian outback on impossibly slender hooves. This solitary sprite met its end by voracious newcomers and plows turning its habitat into pasture. By the 1950s it had vanished.", "synopsis_nn": "**Ein nett og dødsdømd gravar**, svinefotpunggrevlingen trippa gjennom den australske villmarka på utruleg slanke kviger. Denne einsame alven møtte endeliktet sitt grunna glupske nykommarar og plogar som gjorde habitatet gjort om til beitemark. Innan 1950-åra hadde han forsvunne." }, { "scientific_name": "Chelonoidis abingdonii", "common_name": "Pinta giant tortoise", "iucn_status": "EX", "primary_cause": "Hunting, invasive species", "last_sighting_year": 2012, "region": "Galápagos", "wikipedia_url": "https://en.wikipedia.org/wiki/Pinta_Island_tortoise", "image_url": "archive_images/chelonoidis_abingdonii.webp", "synopsis_en": "**The ultimate slow-food connoisseur**, the Pinta giant tortoise evolved impressive longevity only to become convenient ship's protein. Its ancient patience proved hilariously unequipped for the rapid assault of invasive goats munching its future and rats pilfering its past.", "synopsis_nn": "**Den ultimate kjenneren av langsam mat**, Pinta-kjempeskjelpadda utvikla ei imponerande levetid berre for å bli eit praktisk proteinlager om bord på skip. Den eldgamle tolmodigheita hennar viste seg å vere komisk uutstyrt for det raske åtaket frå invaderande geiter som gumla i seg framtida hennar og rotter som stal fortida hennar." }, { "scientific_name": "Melamprosops phaeosoma", "common_name": "Poo-uli", "iucn_status": "EX", "primary_cause": "Disease, habitat loss, invasive species", "last_sighting_year": 2004, "region": "Hawaii", "wikipedia_url": "https://en.wikipedia.org/wiki/Poo-uli", "image_url": "archive_images/melamprosops_phaeosoma.webp", "synopsis_en": "**A shy connoisseur of forest snails**, the Poo-uli tried remaining an enigma as disease, habitat loss, and invasive species orchestrated its exit. A silent bow for a creature whose only crime was existing in a landscape too fragile for survival.", "synopsis_nn": "**Ein blyg kjennar av skogsniglar**, poo-ulien prøvde å forbli ei gåte medan sjukdomar, tap av habitat og invaderande artar iscenesette avgangen hennar. Eit stille bukk for ein skapning viss einaste brotsverk var å eksistere i eit landskap som var for skjørt til å overleve i." }, { "scientific_name": "Nesophontes edithae", "common_name": "Puerto Rican nesophontes", "iucn_status": "EX", "primary_cause": "Invasive species", "last_sighting_year": 1500, "region": "Puerto Rico", "wikipedia_url": "https://en.wikipedia.org/wiki/Puerto_Rican_nesophontes", "image_url": "archive_images/nesophontes_edithae.webp", "synopsis_en": "**A most unfortunate meal**, the Puerto Rican nesophontes scurried through its island home, utterly unprepared for ships laden with doom. Perfectly evolved for gentle obscurity, its tiny defenses proved no match for introduced rats, mongooses, and cats.", "synopsis_nn": "**Eit høgst uheldig måltid**, den puertoricanske nesofontesen pilte gjennom øyheimen sin, fullstendig uførebudd på skip lasta med undergang. Perfekt tilpassa til ei mild varsemd, viste dei ørvesle forsvarsverka hennar seg å vere sjanselause mot introduserte rotter, mungoar og kattar." }, { "scientific_name": "Capra pyrenaica pyrenaica", "common_name": "Pyrenean Ibex", "iucn_status": "EX", "primary_cause": "Hunting, competition with livestock", "last_sighting_year": 2000, "region": "Spain, France", "wikipedia_url": "https://en.wikipedia.org/wiki/Pyrenean_ibex", "image_url": "archive_images/capra_pyrenaica_pyrenaica.webp", "synopsis_en": "**The Pyrenean Ibex** achieved the dubious distinction of becoming the first species de-extincted then re-extincted before its final disappearance in 2000. Driven to demise by relentless hunting and competition from livestock, its legacy reminds us that even best intentions arrive too late.", "synopsis_nn": "**Pyrenearsteinbukken** oppnådde den tvilsame bragda å bli den første arten som vart gjenskapt for så å verte utrydda på ny før han endeleg forsvann heilt i år 2000. Driven til undergang av nådelaus jakt og konkurranse frå bufe, minner arva oss om at sjølv dei beste intensjonar kjem for seint." }, { "scientific_name": "Elaphurus davidianus", "common_name": "Père David's deer", "iucn_status": "EW", "primary_cause": "Hunting, habitat loss", "last_sighting_year": 1939, "region": "China", "wikipedia_url": "https://en.wikipedia.org/wiki/Père_David%27s_deer", "image_url": "archive_images/elaphurus_davidianus.webp", "synopsis_en": "**Père David's Deer** gracefully navigated China's ancient wetlands for millennia with distinctive antlers and webbed hooves. The hunter's arrow and farming's relentless march squeezed wild populations to oblivion. Its future now rests solely on a handful of zoo specimens.", "synopsis_nn": "**Davidshjorten** navigerte grasiøst gjennom Kinas eldgamle våtmarker i årtusen med sine særprega gevir og svømmehud-kledde klovar. Jegerens pil og landbrukets nådelause frammarsj skvisa ville bestandar ut i gløymsla. Framtida kviler no utelukkande på ei handfull eksemplar i dyrehagar." }, { "scientific_name": "Equus quagga quagga", "common_name": "Quagga", "iucn_status": "EX", "primary_cause": "Hunting", "last_sighting_year": 1883, "region": "South Africa", "wikipedia_url": "https://en.wikipedia.org/wiki/Quagga", "image_url": "archive_images/equus_quagga_quagga.webp", "synopsis_en": "**Nature's half-hearted zebra**, the Quagga once roamed South African plains with stripes that faded mid-body. Hunted with overzealous enthusiasm, its unique hide proved an irresistible target. The last individual faded in 1883, leaving only stuffed specimens and irony.", "synopsis_nn": "**Naturens halvhjarta sebra**, quaggaen streifa ein gong på sørafrikanske sletter med striper som bleikna midt på kroppen. Jakta med overivrig entusiasme, viste den unike huda seg å vere eit uimotståeleg mål. Det siste individet bleikna bort i 1883, og etterlét seg berre utstoppa ekko og ironi." }, { "scientific_name": "Gazella bilkis", "common_name": "Queen of Sheba's gazelle", "iucn_status": "EX", "primary_cause": "Hunting", "last_sighting_year": 1951, "region": "Yemen", "wikipedia_url": "https://en.wikipedia.org/wiki/Queen_of_Sheba%27s_gazelle", "image_url": "archive_images/gazella_bilkis.webp", "synopsis_en": "**A fleeting whisper of the desert wind**, Gazella bilkis once graced the Arabian peninsula with unparalleled elegance. Its lithe form and delicate horns, symbols of untamed beauty, sealed its doom as the ultimate trophy. Not even a queen's namesake could outrun the spear.", "synopsis_nn": "**Eit flyktig kvisker av ørkenvinden**, Gazella bilkis pryda ein gong den arabiske halvøya med makelaus eleganse. Den smidige forma og dei delikate horna hennar, symbol på utemd venleik, forsegla lagnaden som det ultimate troféet. Ikkje ein gong det å vere oppkalla etter ei dronning kunne springe ifrå spydet." }, { "scientific_name": "Partula faba", "common_name": "Raiatea Partula Tree Snail", "iucn_status": "EW", "primary_cause": "Introduced predatory snails", "last_sighting_year": null, "region": "Raiatea, French Polynesia", "wikipedia_url": "https://en.wikipedia.org/wiki/Partula_faba", "image_url": "archive_images/partula_faba.webp", "synopsis_en": "**The Raiatea Partula Tree Snail** once jeweled French Polynesia's forests, now existing only in human care. This vibrant mollusc fell to introduced predatory snails, erased by the very species meant to control others. A stark reminder of biodiversity's fragility.", "synopsis_nn": "**Raiatea partula-tresnigelen** var ein gong som ein juvel i dei fransk-polynesiske skogane, men no finst han berre i fangenskap. Denne fargesprakande blautdyra fall for introduserte rovsniglar, og vart sletta ut av nettopp den arten som skulle kontrollere andre. Ei sterk påminning om kor skjør det biologiske mangfaldet er." }, { "scientific_name": "Aphanapteryx bonasia", "common_name": "Red rail", "iucn_status": "EX", "primary_cause": "Hunting, invasive species", "last_sighting_year": 1693, "region": "Mauritius", "wikipedia_url": "https://en.wikipedia.org/wiki/Red_rail", "image_url": "archive_images/aphanapteryx_bonasia.webp", "synopsis_en": "**Mauritius's most inconveniently delicious bird**, the Red rail was a flightless, crimson curiosity utterly unequipped for colonial interaction. Its trusting nature and succulent flesh made it an easy target for hunters and fatal victim of invasive rats and pigs.", "synopsis_nn": "**Madagaskars mest upraktisk velsmakande fugl**, raudrikse var ein flygelaus, karmosinraud kuriositet fullstendig uførebudd på kolonial samhandling. Den tillitsfulle naturen og det saftige kjøtet hennar gjorde henne til eit lett mål for jegerar og eit dødeleg offer for invaderande rotter og griser." }, { "scientific_name": "Cryptonanus ignitus", "common_name": "Red-bellied gracile opossum", "iucn_status": "EX", "primary_cause": "Habitat loss", "last_sighting_year": 1962, "region": "Argentina", "wikipedia_url": "https://en.wikipedia.org/wiki/Red-bellied_gracile_opossum", "image_url": "archive_images/cryptonanus_ignitus.webp", "synopsis_en": "**This lithe, red-bellied phantom** once whispered through the disappearing forests of South America. Ironically, it vanished without a trace not through dramatic hunting but because its entire world—stage, larder, bedroom—was dismantled by the relentless, lumbering advance of progress.", "synopsis_nn": "**Dette smidige, raudmaga fantomet** kviskra ein gong gjennom dei forsvinnande skogane i Sør-Amerika. Ironisk nok forsvann det heilt sporlaust, ikkje gjennom dramatisk jakt, men fordi heile verda dets – scene, spiskammer, soverom – vart rasert av den framrykkjande og nådelause sirkuset kalla framsteg." }, { "scientific_name": "Melanoplus spretus", "common_name": "Rocky Mountain locust", "iucn_status": "EX", "primary_cause": "Agriculture", "last_sighting_year": 1902, "region": "North America", "wikipedia_url": "https://en.wikipedia.org/wiki/Rocky_Mountain_locust", "image_url": "archive_images/melanoplus_spretus.webp", "synopsis_en": "**The continent's greatest organic combine**, *Melanoplus spretus* once darkened skies with legendary swarms. Yet the very settler crops fueling its unimaginable numbers proved its undoing when human farming consumed its riverine breeding grounds into agricultural oblivion.", "synopsis_nn": "**Kontinentets største organiske skurtreskjar**, *Melanoplus spretus* formørka ein gong himmelen med legendariske svermar. Men dei same nybyggjaravlingane som gav næring til dei ufattelege tala viste seg å vere undergangen når menneskeleg landbruk slukte hekkeområda langsetter elvane og omdanna dei til landbruksgløymsle." }, { "scientific_name": "Cylindraspis triserrata", "common_name": "Rodrigues domed tortoise", "iucn_status": "EX", "primary_cause": "Hunting", "last_sighting_year": 1795, "region": "Rodrigues", "wikipedia_url": "https://en.wikipedia.org/wiki/Cylindraspis_triserrata", "image_url": "archive_images/cylindraspis_triserrata.webp", "synopsis_en": "**A ponderous island gourmand**, *Cylindraspis triserrata* waddled through life unaware its succulent flesh and docile nature were fatal weaknesses. Hunted with casual efficiency, its abundance became its curse. Extinction became a testament to the fatal allure of an easy meal.", "synopsis_nn": "**Ein tungrodd øygourmand**, *Cylindraspis triserrata* vralta gjennom livet uvitande om at den saftige kroppen og det føyelege vesenet var fatale veikskapar. Jakta med skjødeslaus effektivitet vart overfloda hennar ei forbanning. Utryddinga vart eit vitnesbyrd om den fatale tiltrekkingskrafta i eit lett måltid." }, { "scientific_name": "Phelsuma gigas", "common_name": "Rodrigues Giant Day Gecko", "iucn_status": "EX", "primary_cause": "Deforestation, introduced predators", "last_sighting_year": 1842, "region": "Rodrigues, Mauritius", "wikipedia_url": "https://en.wikipedia.org/wiki/Phelsuma_gigas", "image_url": "archive_images/phelsuma_gigas.webp", "synopsis_en": "**A colossal jewel of Rodrigues**, Phelsuma gigas once graced its island with impressive size and vibrant hues. This magnificent example of island gigantism fell to rampant deforestation and introduced predators. Its extinction tells a stark, familiar tale of paradise lost.", "synopsis_nn": "**Ein kolossal juvel på Rodrigues**, Phelsuma gigas pryda ein gong si eiga øy med imponerande storleik og livlege nyansar. Dette storslåtte dømet på øygigantisme fall for omsynslaus avskoging og introduserte rovdyr. Utryddinga fortel ein sterk, velkjend historie om eit tapt paradis." }, { "scientific_name": "Cylindraspis peltastes", "common_name": "Rodrigues giant tortoise", "iucn_status": "EX", "primary_cause": "Hunting", "last_sighting_year": 1795, "region": "Rodrigues", "wikipedia_url": "https://en.wikipedia.org/wiki/Cylindraspis_peltastes", "image_url": "archive_images/cylindraspis_peltastes.webp", "synopsis_en": "**A primeval vegetarian with an architectural shell**, *Cylindraspis peltastes* lumbered across Rodrigues for millennia. Its slow-moving nature made it easy prey for sailors seeking fresh meat. Easily flipped and preserved for future feasts, these gentle giants were hunted to extinction within centuries.", "synopsis_nn": "**Ein eldgammal vegetarianar med eit arkitektonisk skal**, *Cylindraspis peltastes* tømra seg over Rodrigues i årtusen. Den saktegåande naturen hennar gjorde henne til eit lett bytte for sjømenn på jakt etter ferskt kjøt. Lette å snu og bevare for framtidige festmåltid, vart desse milde kjempene jakta til utrydding i løpet av hundreår." }, { "scientific_name": "Pezophaps solitaria", "common_name": "Rodrigues solitaire", "iucn_status": "EX", "primary_cause": "Hunting, invasive species", "last_sighting_year": 1778, "region": "Rodrigues", "wikipedia_url": "https://en.wikipedia.org/wiki/Rodrigues_solitaire", "image_url": "archive_images/pezophaps_solitaria.webp", "synopsis_en": "**A flightless pigeon of ground-dwelling grace**, this Rodrigues enigma thrived in splendid isolation. Sailors and introduced predators found it a convenient meal; its leisurely pace offered no defense. By the late 18th century, it vanished entirely, a casualty of human appetite and ecological invasion.", "synopsis_nn": "**Ei flygelaus due med bakkebuande ynde**, denne gåta frå Rodrigues treivst i strålande isolasjon. Sjømenn og introduserte rovdyr fann henne som eit praktisk måltid; det sakte tempoet hennar gav inkje forsvar. Innan slutten av 1700-talet hadde ho forsvunne heilt, eit offer for menneskeleg appetitt og økologisk invasjon." }, { "scientific_name": "Bolyeria multocarinata", "common_name": "Round Island burrowing boa", "iucn_status": "EX", "primary_cause": "Habitat loss, invasive species", "last_sighting_year": 1975, "region": "Round Island", "wikipedia_url": "https://en.wikipedia.org/wiki/Round_Island_burrowing_boa", "image_url": "archive_images/bolyeria_multocarinata.webp", "synopsis_en": "**A charmingly unique ribbon of scales**, this burrowing boa thrived through tunneling its tiny island home. Introduced goats and rabbits devoured its habitat, proving that even reclusive species cannot escape surface-world invaders. Subterranean mastery offered no defense against ecological destruction.", "synopsis_nn": "**Eit sjarmerande unikt band av skjel**, denne gravande boaen treivst med å lage tunnelar i den vesle øyheimen sin. Introduserte geiter og kaninar slukte habitatet hennar, og beviste at ikkje ein gong folkesky artar kan sleppe unna inntrengjarar frå overflata. Underjordisk meistring gav inkje forsvar mot økologisk øydelegging." }, { "scientific_name": "Cylindraspis indica", "common_name": "Réunion giant tortoise", "iucn_status": "EX", "primary_cause": "Hunting", "last_sighting_year": 1840, "region": "Réunion", "wikipedia_url": "https://en.wikipedia.org/wiki/Réunion_giant_tortoise", "image_url": "archive_images/cylindraspis_indica.webp", "synopsis_en": "**The ultimate slow-food experience**, the Réunion giant tortoise ambled across its island paradise. Sailors valued its ample size and meat as a living larder, hunting it to oblivion. These placid herbivores vanished within centuries, victims of their own unfortunate desirability.", "synopsis_nn": "**Den ultimate opplevinga av langsam mat**, Réunion-kjempeskjelpadda rusla tvers over sitt eige øyparadis. Sjømenn verdsette den store storleiken og kjøtet som eit levande spiskammer, og jakta henne ut i gløymsla. Desse fredelege planteetarane forsvann i løpet av hundreår, offer for si eiga uheldige tiltrekkingskraft." }, { "scientific_name": "Raphus solitarius, Threskiornis solitarius", "common_name": "Réunion Ibis", "iucn_status": "EX", "primary_cause": "Introduced predators, hunting", "last_sighting_year": null, "region": "Réunion", "wikipedia_url": "https://en.wikipedia.org/wiki/R%C3%A9union_ibis", "image_url": "archive_images/raphus_solitarius.webp", "synopsis_en": "**The enigmatic Réunion Ibis** once inhabited its namesake island as a curious flightless wonder. Unprepared for human hunters and introduced predators, it quickly succumbed to ecological imbalance. Its extinction exemplifies how island paradise falls to progress and biological invasion.", "synopsis_nn": "**Den gåtefulle Réunion-ibisen** heldt ein gong til på øya han har namnet sitt frå, som eit underleg flygelaust underverk. Uførebudd på menneskelege jegerar og introduserte rovdyr, bukka han raskt under for økologisk ubalanse. Utryddinga syner korleis øyparadis fell for framsteg og biologisk invasjon." }, { "scientific_name": "Smilodon fatalis", "common_name": "Saber-tooth tiger", "iucn_status": "EX", "primary_cause": "Climate change, decline of megafauna prey, possible human hunting", "last_sighting_year": null, "region": "North America", "wikipedia_url": null, "image_url": "archive_images/smilodon_fatalis.webp", "synopsis_en": "**A seven-inch apex predator** dominating the Pleistocene through specialization in megafauna hunting. As prey species vanished due to climate change and human hunting, saber-tooths starved. Their hyper-specialized teeth proved useless against ecological collapse and the shifting food systems of a changing world.", "synopsis_nn": "**Eit topprovdyr med sju-tommar lange tenner** som dominerte under pleistocen gjennom spesialisering på jakt av megafauna. Då byttedyra forsvann grunna klimaendringar og menneskeleg jakt, svalt sabeltannkattane i hel. Dei hyperspesialiserte tennene deira viste seg å vere ubrukelege mot økologisk samanbrot og dei skiftande matsystema i ei verd i endring." }, { "scientific_name": "Cylindraspis vosmaeri", "common_name": "Saddle-backed Mauritius tortoise", "iucn_status": "EX", "primary_cause": "Hunting", "last_sighting_year": 1795, "region": "Rodrigues", "wikipedia_url": "https://en.wikipedia.org/wiki/Cylindraspis_vosmaeri", "image_url": "archive_images/cylindraspis_vosmaeri.webp", "synopsis_en": "**A ponderous, plant-powered giant**, this tortoise lumbered through island paradise for millennia, perfectly adapted to leisurely grazing. Its longevity, massive size, and docile nature rendered it an irresistible bounty for hungry sailors. Too slow to flee and too valuable to spare, it vanished.", "synopsis_nn": "**Ei tungbygd, plantedriven kjempe**, denne skjelpadda tømra seg gjennom øyparadiset i tusenår, perfekt tilpassa sakte beiting. Levetida, den massive storleiken og det føyelege vesenet gjorde henne til eit uimotståeleg bytte for svoltne sjømenn. For treig til å flykte og for verdifull til å bli skåna, forsvann ho." }, { "scientific_name": "Labidura herculeana", "common_name": "Saint Helena giant earwig", "iucn_status": "EX", "primary_cause": "Habitat loss, invasive species", "last_sighting_year": 1967, "region": "Saint Helena", "wikipedia_url": "https://en.wikipedia.org/wiki/Saint_Helena_earwig", "image_url": "archive_images/labidura_herculeana.webp", "synopsis_en": "**The heavyweight champion of arthropods**, *Labidura herculeana* once ruled Saint Helena's leaf litter. This colossal earwig met its quiet end not in combat but through forest collapse and invasive predators, particularly hungry rats that transformed its island kingdom into an inhospitable wasteland.", "synopsis_nn": "**Tungvektsmeisteren blant leddyr**, *Labidura herculeana* regjerte ein gong lauvstrøet på St. Helena. Dette kolossale saksedyret møtte den stille slutten sin, ikkje i kamp, men gjennom skogkollaps og invaderande rovdyr, særleg svoltne rotter som forvandla øykongedømet hennar til ei ugjestmild øydemark." }, { "scientific_name": "Upupa antaios", "common_name": "Saint Helena Hoopoe", "iucn_status": "EX", "primary_cause": "Introduced predators, habitat loss", "last_sighting_year": 1550, "region": "Saint Helena", "wikipedia_url": "https://en.wikipedia.org/wiki/Saint_Helena_hoopoe", "image_url": "archive_images/upupa_antaios.webp", "synopsis_en": "**A magnificent flightless avian** of Saint Helena, *Upupa antaios* fell to colonial expansion. Introduced predators and habitat loss overwhelmed its isolated population. Now existing only as fossil remnants, it stands as a poignant testament to the fragility of island ecosystems.", "synopsis_nn": "**Ein storslått flygelaus fugl** frå St. Helena, *Upupa antaios* fall for kolonial ekspansjon. Introduserte rovdyr og tap av habitat overvelda den isolerte bestanden hennar. Ho eksisterer no berre som fossile leivningar, og står som eit gripande vitnesbyrd om kor skjøre øyøkosystem er." }, { "scientific_name": "Nesiota elliptica", "common_name": "Saint Helena olive", "iucn_status": "EX", "primary_cause": "Habitat loss, invasive species", "last_sighting_year": 2003, "region": "Saint Helena", "wikipedia_url": "https://en.wikipedia.org/wiki/Saint_Helena_olive", "image_url": "archive_images/nesiota_elliptica.webp", "synopsis_en": "**A botanical wallflower** that preferred island privacy, the Saint Helena olive thrived in seclusion. Invasive species and relentless habitat conversion transformed its sanctuary into a crowded, hostile environment. By 2003, this quietly unique plant had vanished entirely, edged from existence.", "synopsis_nn": "**Ei botanisk veggpryd** som føretrekte øyprivatliv, St. Helena-oliventreet treivst i avsondring. Invaderande artar og nådelaus omgjering av habitat forvandla fristaden hennar til eit overbefolka, fiendtleg miljø. Innan 2003 hadde denne stille, unike planta forsvunne for godt, skubba ut av eksistensen." }, { "scientific_name": "Pyrocephalus dubius", "common_name": "San Cristóbal flycatcher", "iucn_status": "EX", "primary_cause": "Invasive species", "last_sighting_year": 1987, "region": "Galápagos", "wikipedia_url": "https://en.wikipedia.org/wiki/San_Cristóbal_flycatcher", "image_url": "archive_images/pyrocephalus_dubius.webp", "synopsis_en": "**A fiery spirit in miniature**, the San Cristóbal flycatcher brought vermilion beauty to its island home. Its vibrant plumage and agile hunting proved useless against non-native species that devoured eggs and young. Invasive predators assured its extinction, a dubious ecological victory.", "synopsis_nn": "**Ei brennande sjel i miniatyr**, San Cristóbal-flugesnapparen brakte sinoberraud venleik til øyheimen sin. Den fargesprakande fjørdrakta og den smidige jakta viste seg å vere til lita hjelp mot framande artar som åt opp egg og ungar. Invaderande rovdyr sikra utryddinga hennar, ein tvilsam økologisk siger." }, { "scientific_name": "Gambusia georgei", "common_name": "San Marcos gambusia", "iucn_status": "EX", "primary_cause": "Hybridization, habitat loss", "last_sighting_year": 1983, "region": "Texas, USA", "wikipedia_url": "https://en.wikipedia.org/wiki/San_Marcos_gambusia", "image_url": "archive_images/gambusia_georgei.webp", "synopsis_en": "**A casualty of genetic dilution**, the San Marcos gambusia hybridized with more robust invasive cousins, losing its genetic distinctiveness. Its shrinking spring home, simultaneously paved over by development, offered no refuge. This unique little fish faded into oblivion.", "synopsis_nn": "**Eit offer for genetisk utvatning**, San Marcos-gambusiaen kryssa seg med meir robuste invaderande søskenbarn, og mista sitt genetiske særpreg. Den krympande kjeldeheimen hennar, som samtidig blei dekt av asfalt gjennom utbygging, baud ikkje på nokon tilfluktsstad. Denne unike vesle fisken glei inn i gløymsla." }, { "scientific_name": "Prolagus sardus", "common_name": "Sardinian pika", "iucn_status": "EX", "primary_cause": "Hunting, invasive species", "last_sighting_year": 1774, "region": "Sardinia/Corsica", "wikipedia_url": "https://en.wikipedia.org/wiki/Sardinian_pika", "image_url": "archive_images/prolagus_sardus.webp", "synopsis_en": "**Sardinia's most hunted creature**, the Sardinian pika, *Prolagus sardus*, once bounced across its namesake island seemingly invincible. Newly arrived humans and their introduced predators hunted it relentlessly. This vulnerable creature could not escape the appetites of an unthinking world.", "synopsis_nn": "**Sardinias mest jakta skapning**, sardiniapikaen, *Prolagus sardus*, spratt ein gong over øya han har namnet frå, tilsynelatande uovervinneleg. Nylegkomne menneske og dei introduserte rovdyra deira jakta han nådelaust. Denne sårbare skapningen klarte ikkje å flykte frå appetitten til ei tankelaus verd." }, { "scientific_name": "Rucervus schomburgki", "common_name": "Schomburgk's deer", "iucn_status": "EX", "primary_cause": "Hunting, habitat loss", "last_sighting_year": 1938, "region": "Thailand", "wikipedia_url": "https://en.wikipedia.org/wiki/Schomburgk%27s_deer", "image_url": "archive_images/rucervus_schomburgki.webp", "synopsis_en": "**Antlered phantom of Thai swamps**, Schomburgk's deer once graced wetlands with branching beauty. Its unique rack proved fatally attractive to hunters; habitat destruction squeezed its population relentlessly. Vanished before the 20th century, it now exists only as melancholic taxidermy and cautionary tale.", "synopsis_nn": "**Gevirpryda fantom i thailandske summar**, schomburgkhjorten pryda ein gong våtmarkene med forgreina venleik. Det unike geviret viste seg å vere fatalt tiltrekkjande for jegerar; habitatøydelegging pressa bestanden nådelaust. Utdøydd før 1900-talet, finst han no berre som melankolsk utstopping og ei åtvaring." }, { "scientific_name": "Oryx dammah", "common_name": "Scimitar-horned oryx", "iucn_status": "EW", "primary_cause": "Hunting, habitat loss", "last_sighting_year": 2000, "region": "North Africa", "wikipedia_url": "https://en.wikipedia.org/wiki/Scimitar-horned_oryx", "image_url": "archive_images/oryx_dammah.webp", "synopsis_en": "**A creature of shimmering mirages and lethal elegance**, the Scimitar-horned oryx once graced the Sahara. Its curved sabers offered no defense against modern hunters or relentless habitat conversion. Extinct in the wild, this desert icon survives only as bittersweet memory and breeding programs.", "synopsis_nn": "**Ein skapning av glitrande luftspeglingar og dødeleg eleganse**, sabeloryxen pryda ein gong Sahara. Dei bøygde sabelhorna gav inkje forsvar mot moderne jegerar eller nådelaus omgjering av habitat. Utrydda i naturen, overlever dette ørkenikonet berre som eit bittersøtt minne og avlsprogram." }, { "scientific_name": "Neogale macrodon", "common_name": "Sea mink", "iucn_status": "EX", "primary_cause": "Fur hunting", "last_sighting_year": 1894, "region": "North America", "wikipedia_url": "https://en.wikipedia.org/wiki/Sea_mink", "image_url": "archive_images/neogale_macrodon.webp", "synopsis_en": "**A pelt of unparalleled allure**, the Sea Mink danced through North Atlantic waters as a sleek coastal hunter. Its luxuriously thick fur became its undoing—hunted so fiercely for fashion that no wild specimens survived. Only fragmented bones whisper of a creature loved to extinction.", "synopsis_nn": "**Eit skinn av makelaus tiltrekkingskraft**, sjøminken dansa gjennom nordatlantiske farvaten som ein slank kystjeger. Den luksuriøst tjukke pelsen vart dens undergang – jakta så intenst for mote at ingen ville eksemplar overlevde. Berre fragmenterte bein kviskrar om ein skapning elska til han vart utrydda." }, { "scientific_name": "Taudactylus acutirostris", "common_name": "Sharp-snouted day frog", "iucn_status": "EX", "primary_cause": "Disease (chytrid fungus)", "last_sighting_year": 1997, "region": "Australia", "wikipedia_url": "https://en.wikipedia.org/wiki/Taudactylus_acutirostris", "image_url": "archive_images/taudactylus_acutirostris.webp", "synopsis_en": "**A pocket-sized virtuoso of wet tropics**, the Sharp-snouted day frog darted through Australian streams with vibrant grace. Its energetic symphony ended not through predation but through chytrid fungus—a microscopic pathogen that silenced this tiny, defenseless creature with devastating efficiency.", "synopsis_nn": "**Ein lommeformat-virtuos i dei våte tropane**, the Sharp-snouted day frog pilte gjennom australske bekker med levande ynde. Den energiske symfonien hennar slutta ikkje gjennom predasjon, men gjennom chytrid-soppen – eit mikroskopisk patogen som teia denne bitte vesle, forsvarslause skapningen med øydeleggjande effektivitet." }, { "scientific_name": "Silphium", "common_name": "Silphium", "iucn_status": "EX", "primary_cause": "Overharvesting, desertification", "last_sighting_year": -50, "region": "Cyrenaica (Libya)", "wikipedia_url": "https://en.wikipedia.org/wiki/Silphium", "image_url": "archive_images/silphium.webp", "synopsis_en": "**Silphium, legendary plant of ancient Cyrenaica**, once fueled empire and economy through its versatile sap, used for medicine and contraception. Relentless overharvesting combined with encroaching desertification culled every specimen. Today it exists only in coins and texts, a monument to human short-sightedness.", "synopsis_nn": "**Silfion, ei legendarisk plante frå antikkens Kyrenaika**, gav ein gong drivstoff til imperium og økonomi gjennom den allsidige safta si, brukt som medisin og prevensjon. Nådelaust overhøsting i kombinasjon med inntrengjande ørkenspreiing skavde vekk kvart eit eksemplar. I dag eksisterer ho berre på myntar og i tekstar, eit monument over menneskeleg kortsyntheit." }, { "scientific_name": "Salvelinus agassizii", "common_name": "Silver trout", "iucn_status": "EX", "primary_cause": "Invasive species", "last_sighting_year": 1930, "region": "New Hampshire", "wikipedia_url": "https://en.wikipedia.org/wiki/Silver_trout", "image_url": "archive_images/salvelinus_agassizii.webp", "synopsis_en": "**Once, a glimmering resident of pristine glacial lakes**, the Silver Trout held court with ethereal grace. Invasive fish species found its tranquil home an irresistible buffet, outcompeting it into oblivion. A true local legend, casually eaten out of existence.", "synopsis_nn": "**Ein gong ein glitrande bebuar i reine bresjøar**, heldt sølvauren hoff med eterisk ynde. Invaderande fiskeslag fann den rolege heimen hennar som ein uimotståeleg buffé, og konkurrerte ho rett tilbake i gløymsla. Ei sann lokal legende, uformelt eten ut av eksistensen." }, { "scientific_name": "Numenius tenuirostris", "common_name": "Slender-billed curlew", "iucn_status": "EX", "primary_cause": "Habitat loss, hunting", "last_sighting_year": 1995, "region": "Europe/N. Africa", "wikipedia_url": "https://en.wikipedia.org/wiki/Slender-billed_curlew", "image_url": "archive_images/numenius_tenuirostris.webp", "synopsis_en": "**A whisper in the reeds**, the Slender-billed Curlew once probed European and Asian wetlands with impossibly delicate grace. Its tragedy unfolded not through grand predation but through methodical habitat draining and efficient hunting. Evolutionary finesse could not defend against ecological collapse and lead pellets.", "synopsis_nn": "**Eit kvisker i takrøyret**, smalnebbspoven finkjemma ein gong europeiske og asiatiske våtmarker med utruleg finurleg ynde. Tragedien hennar utspelte seg ikkje gjennom mektig rovpattedyrjakt, men gjennom metodisk habitatdrenering og effektiv jakt. Evolusjonær finesse kunne ikkje beskytte mot økologisk samanbrot og blyhagl." }, { "scientific_name": "Quiscalus palustris", "common_name": "Slender-billed grackle", "iucn_status": "EX", "primary_cause": "Habitat loss", "last_sighting_year": 1910, "region": "Mexico", "wikipedia_url": "https://en.wikipedia.org/wiki/Slender-billed_grackle", "image_url": "archive_images/quiscalus_palustris.webp", "synopsis_en": "**A creature perfectly attuned to reedy marshes**, the slender-billed grackle wove its life into Mexico's vibrant wetland tapestry. As these essential wetlands vanished, so too did this lithe, iridescent marvel, leaving behind only the ghost of a song.", "synopsis_nn": "**Ein skapning perfekt tilpassa sivkledde myrar**, smalnebbtråklen vov livet sitt inn i det fargesprakande biletteppet av meksikanske våtmarker. Etter kvart som desse livsviktige våtmarkene forsvann, forsvann også dette smidige, iriserande underverket, og etterlét seg berre spøkelset av ein song." }, { "scientific_name": "Pteropus subniger", "common_name": "Small Mauritian flying fox", "iucn_status": "EX", "primary_cause": "Hunting, deforestation", "last_sighting_year": 1864, "region": "Mauritius", "wikipedia_url": "https://en.wikipedia.org/wiki/Small_Mauritian_flying_fox", "image_url": "archive_images/pteropus_subniger.webp", "synopsis_en": "**A midnight mango maven**, the Small Mauritian flying fox once danced through fruiting trees with elegant purpose. Humans first hunted it for its delicate wings, then bulldozed its entire food source. Even the nimblest could not escape such hunger and thoughtless destruction.", "synopsis_nn": "**Ein mangomeister ved midnatt**, den vesle mauritiske flygehunden dansa ein gong gjennom fruktberande tre med eit elegant føremål. Menneska jakta han først for dei delikate vengene, før dei meia ned heile matkjelda hans. Jamvel den smidigaste kunne ikkje sleppe unna ein slik svolt og tankelaus øydelegging." }, { "scientific_name": "Zenaida graysoni", "common_name": "Socorro dove", "iucn_status": "EW", "primary_cause": "Invasive species, hunting", "last_sighting_year": 1972, "region": "Mexico", "wikipedia_url": "https://en.wikipedia.org/wiki/Socorro_dove", "image_url": "archive_images/zenaida_graysoni.webp", "synopsis_en": "**Socorro's trusting earth-trotter**, Zenaida graysoni lived a simple island life, unprepared for foreign felines. Its ground-dwelling habits became a deadly liability as feral cats arrived, transforming peaceful foraging into final predation. This charming dove swiftly vanished, leaving only island echoes.", "synopsis_nn": "**Socorros tillitsfulle jordvandrar**, Zenaida graysoni levde eit enkelt øyliv, uførebudd på framande kattedyr. Dei bakkebuande vanane hennar vart ei dødeleg ulempe då forvilla kattar kom, og forvandla fredeleg beiting til endeleg predasjon. Denne sjarmerande dua forsvann brått, og etterlét berre øyekko." }, { "scientific_name": "Sophora toromiro", "common_name": "Sophora toromiro", "iucn_status": "EW", "primary_cause": "Deforestation", "last_sighting_year": 1960, "region": "Easter Island", "wikipedia_url": "https://en.wikipedia.org/wiki/Sophora_toromiro", "image_url": "archive_images/sophora_toromiro.webp", "synopsis_en": "**A humble tree once sturdy on a distant isle**, Sophora toromiro's greatest misfortune was being timber. Forest clearing claimed it relentlessly through quiet axe work, leaving behind only ghostly whispers of green legacy. Ironic that no grand upheaval was needed—merely human indifference.", "synopsis_nn": "**Eit smålåten tre som ein gong stod støtt på ei fjern øy**, Sophora toromiros største ulykke var å vere tømmer. Skogrydding kravde han nådelaust gjennom stille øksearbeid, og etterlét seg berre spøkjelsesaktige kviskringar av ei grøn arv. Ironisk at inkje storslått oppstyr var naudsynt – berre menneskeleg likesæle." }, { "scientific_name": "Dinornis robustus", "common_name": "South Island Giant Moa", "iucn_status": "EX", "primary_cause": "Human hunting", "last_sighting_year": 1445, "region": "New Zealand", "wikipedia_url": "https://en.wikipedia.org/wiki/South_Island_giant_moa", "image_url": "archive_images/dinornis_robustus.webp", "synopsis_en": "**Once undisputed giants of New Zealand's ancient forests**, South Island Giant Moa stood nearly four meters tall. Their millennia-long reign ended swiftly with human arrival; hunters found these magnificent birds too slow for survival. A stark testament to early human ecological impact.", "synopsis_nn": "**Ein gong ubestridde kjempene i dei eldgamle skogane på New Zealand**, sørøykjempemoaen stod nesten fire meter høg. Det årtusenlange regimet deira tok brått slutt med menneskja si inntog; jegerar fann desse storslåtte fuglane for treige til å overleve. Eit sterkt vitnesbyrd om tidleg økologisk påverknad frå menneska." }, { "scientific_name": "Turnagra capensis", "common_name": "South Island piopio", "iucn_status": "EX", "primary_cause": "Invasive species", "last_sighting_year": 1963, "region": "New Zealand", "wikipedia_url": "https://en.wikipedia.org/wiki/South_Island_piopio", "image_url": "archive_images/turnagra_capensis.webp", "synopsis_en": "**A velvet-voiced forest phantom**, the South Island piopio enchanted New Zealand's undergrowth with complex, melodic calls. Yet introduced rats and stoats ultimately outmaneuvered this unique bird, silencing its vibrant song into a tragic small-scale apocalypse delivered by the mundane.", "synopsis_nn": "**Eit fløyelsrøysta skogsfantom**, sørøypiopioen fortrylla underskogen på New Zealand med komplekse, melodiøse rop. Likevel utmanøvrerte introduserte rotter og røyskattar til slutt denne unike fuglen, og stilna den livlege songen hans i ein tragisk, småskala apokalypse utløyst av det kvardagslege." }, { "scientific_name": "Perameles notina", "common_name": "Southeastern striped bandicoot", "iucn_status": "EX", "primary_cause": "Predation, habitat loss", "last_sighting_year": 1890, "region": "Australia", "wikipedia_url": "https://en.wikipedia.org/wiki/Perameles_notina", "image_url": "archive_images/perameles_notina.webp", "synopsis_en": "**A pocket-sized blur of stripes**, *Perameles notina* danced through southeastern scrub as a nimble nocturnal forager. Imported predators' claws and vanishing habitat ultimately outmaneuvered this spirited little bandicoot, proving its nimble evasions inadequate against a world it wasn't designed to survive.", "synopsis_nn": "**Ein lommeformat-dis av striper**, *Perameles notina* dansa gjennom det søraustlege krattlandskapet som ein smidig, nattaktiv sankar. Importerte klør frå rovdyr og eit forsvinnande habitat utmanøvrerte til slutt denne livlege vesle bandicooten, og beviste at smidig unnviking kom til kort mot ei verd han ikkje var laga for å overleve i." }, { "scientific_name": "Phalacrocorax perspicillatus", "common_name": "Spectacled cormorant", "iucn_status": "EX", "primary_cause": "Hunting", "last_sighting_year": 1852, "region": "Bering Island", "wikipedia_url": "https://en.wikipedia.org/wiki/Spectacled_cormorant", "image_url": "archive_images/phalacrocorax_perspicillatus.webp", "synopsis_en": "**A bulky seafaring oddity**, the Spectacled Cormorant graced the Bering Sea for countless millennia. A mere century of human appetite for its feathers and flesh rendered its considerable size and distinctive spectacles utterly useless against the ultimate predator of all.", "synopsis_nn": "**Ei klumpete sjøfarande raritet**, brilleskarven pryda Beringhavet i uteljelege årtusen. Berre eitt hundreår med menneskeleg appetitt for fjørene og kjøtet hennar gjorde den adelege storleiken og dei særeigne brillene hennar fullstendig ubrukelege mot det ultimate rovdyret av dei alle." }, { "scientific_name": "Cyanopsitta spixii", "common_name": "Spix's macaw", "iucn_status": "EW", "primary_cause": "Trapping, habitat loss", "last_sighting_year": 2000, "region": "Brazil", "wikipedia_url": "https://en.wikipedia.org/wiki/Spix%27s_macaw", "image_url": "archive_images/cyanopsitta_spixii.webp", "synopsis_en": "**A flicker of sapphire against parched earth**, the Spix's macaw fell victim to relentless collector pursuit and habitat destruction. Humanity's insatiable desire to possess this dazzling rarity, coupled with woodland loss, left it with nowhere to fly and no future at all.", "synopsis_nn": "**Eit glimt av safir mot perusktørr jord**, brillearaen fall offer for nådelaus samlarjakt og habitatøydelegging. Menneskeætta sitt umettelege begjær etter å eige denne blendande sjeldsyntheita, samstundes med at skogane forsvann, etterlét han utan nokon stad å fly og heilt utan framtid." }, { "scientific_name": "Oophaga speciosa", "common_name": "Splendid poison frog", "iucn_status": "EX", "primary_cause": "Habitat loss", "last_sighting_year": 1992, "region": "Panama", "wikipedia_url": "https://en.wikipedia.org/wiki/Oophaga_speciosa", "image_url": "archive_images/oophaga_speciosa.webp", "synopsis_en": "**A vibrant, venomous beauty**, the Splendid Poison Frog hopped through damp undergrowth as a living warning sign. Rainforest home demolition proved more persistent than its dazzling hues meant to deter, reducing this splendid creature to nothing but a monochromatic footnote.", "synopsis_nn": "**Ein fargesprakande, giftig venleik**, den fabelaktige giftfrosken hoppa gjennom fuktig underskog som eit levande åtvaringskilt. Òydelegginga av regnskogsheimen viste seg å vere meir innbitt enn dei blendande fargane som skulle skremme vekk andre, noko som reduserte denne fabelaktige skapningen til inkje anna enn ei einsfarga fotnote." }, { "scientific_name": "Philautus adspersus, dimbullae, eximius, halyi, maia, nanus, nasutus, pardus, temporalis, variabilis, zal, zimmeri, extirpo, oxyrhynchus, leucorhinus, rugatus, stellatus", "common_name": "Sri Lanka Shrub Frogs (17 extinct species)", "iucn_status": "EX", "primary_cause": "Habitat loss", "last_sighting_year": 1870, "region": "Sri Lanka", "wikipedia_url": "https://en.wikipedia.org/wiki/Philautus", "image_url": "archive_images/philautus_oxyrhynchus.webp", "synopsis_en": "**Seventeen quiet tragedies**, Sri Lanka's *Philautus* shrub frogs occupied every mist-drenched highland niche imaginable, each a miniature masterpiece. Tea plantations and chainsaws erased seventeen distinct evolutionary experiments in a geological blink, most never photographed alive by scientists.", "synopsis_nn": "**Sytten stille tragediar**, Sri Lankas *Philautus*-buskfroskar okkuperte kvar einaste tenkjelege tåkevåte høglandsnisje, kvar av dei eit meisterverk i miniatyr. Teplantasjar og motorsager utsletta sytten distinkte evolusjonære eksperiment på eit geologisk blunkast, dei fleste aldri fotografert levande av forskarar." }, { "scientific_name": "Hydrodamalis gigas", "common_name": "Steller's sea cow", "iucn_status": "EX", "primary_cause": "Hunting", "last_sighting_year": 1768, "region": "North Pacific", "wikipedia_url": "https://en.wikipedia.org/wiki/Steller%27s_sea_cow", "image_url": "archive_images/hydrodamalis_gigas.webp", "synopsis_en": "**A ten-ton salad enthusiast**, *Hydrodamalis gigas* placidly grazed the Bering Sea for millennia unchallenged. Its massive, slow-moving form became a liability when humans discovered its succulent flesh, munching this magnificent creature into oblivion within mere decades of discovery.", "synopsis_nn": "**Ein ti-tonns salatentusiast**, *Hydrodamalis gigas* beita fredeleg i Beringhavet i årtusen utan å bli utfordra. Den massive, saktegåande forma hennar vart ei ulempe då menneska oppdaga det saftige kjøtet, og jafsa i seg denne storslåtte skapningen rett ut i gløymsla på berre nokre tiår etter han vart oppdaga." }, { "scientific_name": "Stypodon signifer", "common_name": "Stumptooth minnow", "iucn_status": "EX", "primary_cause": "Habitat loss", "last_sighting_year": 1930, "region": "Mexico", "wikipedia_url": "https://en.wikipedia.org/wiki/Stumptooth_minnow", "image_url": "archive_images/stypodon_signifer.webp", "synopsis_en": "**A minnow of quiet dignity**, the Stumptooth once navigated sun-dappled shallows with unassuming grace daily. Its modest ecological needs proved too much for relentless progress; pollution and vanishing habitats ensured its utterly silent exit, leaving only dusty reminders behind.", "synopsis_nn": "**Ein ørekyt med stille verdigdom**, stumptooth-ørekytet navigerte ein gong solflekka grunner med smålåten ynde kvar dag. Dei beskjedne økologiske behova hennar viste seg å vere for mykje for uavbrote framsteg; forureining og forsvinnande habitat sikra hennar fullstendig stille avgang, og etterlét berre støvete påminningar." }, { "scientific_name": "Corypha taliera", "common_name": "Talipot Palm of Bengal", "iucn_status": "EX", "primary_cause": "Habitat destruction, over-harvesting", "last_sighting_year": 2010, "region": "Bangladesh, Myanmar", "wikipedia_url": "https://en.wikipedia.org/wiki/Corypha_taliera", "image_url": "archive_images/corypha_taliera.webp", "synopsis_en": "**A magnificent botanical spectacle**, the Talipot Palm succumbed to habitat destruction and aggressive unsustainable harvesting. Once striking in Bangladesh and Myanmar, its single dramatic flowering followed by death now serves as a stark reminder of humanity's ecological footprint.", "synopsis_nn": "**Eit storslått botanisk skodespel**, palmyrapalmen bukka under for habitatøydelegging og aggressiv, urekraftig hausting. Ein gong slåande vakker i Bangladesh og Myanmar, tener hennar eine dramatiske bløming med påfølgjande død no som ei sterk påminning om menneskeætta sitt økologiske fotavtrykk." }, { "scientific_name": "Equus ferus ferus", "common_name": "Tarpan", "iucn_status": "EX", "primary_cause": "Hunting, interbreeding with domestic horses", "last_sighting_year": 1909, "region": "Europe, Western Asia", "wikipedia_url": "https://en.wikipedia.org/wiki/Tarpan", "image_url": "archive_images/equus_ferus_ferus.webp", "synopsis_en": "**The Tarpan**, wild equine essence across Europe and Western Asia, met demise through relentless hunting and genetic dilution from interbreeding. Officially extinct in the early 20th century, it now gallops solely through history as a critique of humanity's wilderness impact.", "synopsis_nn": "**Tarpanen**, sjølve essensen av ville hestar i Europa og Vest-Asia, møtte undergangen gjennom nådelaus jakt og genetisk utvatning frå kryssoppdrett. Offisielt utrydda tidleg på 1900-talet, galopperer han no utelukkande gjennom historia som ein kritikk av menneska sin påverknad på villmarka." }, { "scientific_name": "Morus peruvianus", "common_name": "Tasman Booby", "iucn_status": "EX", "primary_cause": "Human hunting", "last_sighting_year": 1788, "region": "Tasman Sea", "wikipedia_url": "https://en.wikipedia.org/wiki/Tasman_booby", "image_url": "generics/generic_bird.webp", "synopsis_en": "**Once striking across the Tasman Sea**, the Tasman Booby served as stark and poignant reminder of human impact. Magnificent seabirds relentlessly hunted from their island colonies to complete extinction, their tragic demise underscores the fragile balance of island ecosystems.", "synopsis_nn": "**Ein gong eit slåande syn over Tasmanhavet**, tasmansula fungerte som ei sterk og gripande påminning om menneskeleg påverknad. Storslåtte sjøfuglar, nådelaust jakta frå øykoloniane sine inntil fullstendig utrydding; deira tragiske undergang understrekar den skjøre balansen i øyøkosystem." }, { "scientific_name": "Cyprinodon nevadensis calidae", "common_name": "Tecopa pupfish", "iucn_status": "EX", "primary_cause": "Habitat modification", "last_sighting_year": 1970, "region": "California", "wikipedia_url": "https://en.wikipedia.org/wiki/Tecopa_pupfish", "image_url": "archive_images/cyprinodon_nevadensis_calidae.webp", "synopsis_en": "**A pint-sized titan of tenacity**, the Tecopa pupfish mastered extreme desert waters superbly. Its impressive ability to thrive in harsh conditions proved utterly useless when humans decided its hot springs would make nicer, ultimately deadly bathing resorts instead.", "synopsis_nn": "**Ein halvliter-titan av viljestyrke**, Tecopa-killi meistra det ekstreme ørkenvatnet på framifrå vis. Den imponerande evna hans til å trivast under tøffe forhold viste seg å vere heilt ubrukeleg då menneska meinte at dei varme kjeldene hans ville verte finare, men til slutt dødeleg, badeanlegg i staden." }, { "scientific_name": "Gila crassicauda", "common_name": "Thicktail chub", "iucn_status": "EX", "primary_cause": "Habitat loss, invasive species", "last_sighting_year": 1957, "region": "California", "wikipedia_url": "https://en.wikipedia.org/wiki/Thicktail_chub", "image_url": "archive_images/gila_crassicauda.webp", "synopsis_en": "**Undisputed king of California's slow-moving waters**, the Thicktail Chub navigated its piscine empire with quiet, dignified fleshy grace. Slow drying and introduced cousins' uncouth appetites rendered its sturdy frame tragically irrelevant, a truly Californian tale of eviction and loss.", "synopsis_nn": "**Den ubestridde kongen av Californias sakteflytande farvatn**, thicktail-chuben navigerte fiskeimperiet sitt med stille, verdig kjøtfull ynde. Gradvis uttørking og introduserte søskenbarn med grov appetitt gjorde den robuste kroppnsbygginga hans tragisk irrelevant, ei verkeleg californisk historie om utkasting og tap." }, { "scientific_name": "Thylacinus cynocephalus", "common_name": "Thylacine", "iucn_status": "EX", "primary_cause": "Hunting, habitat loss", "last_sighting_year": 1936, "region": "Australia/Tasmania", "wikipedia_url": "https://en.wikipedia.org/wiki/Thylacine", "image_url": "archive_images/thylacinus_cynocephalus.webp", "synopsis_en": "**Australia's lithe, striped scapegoat**, the Thylacine was a unique marsupial predator relentlessly targeted despite often being innocent. Its graceful exit, hastened by human bounty hunters and vanishing habitats, cemented its legacy as a poignant ghost forever.", "synopsis_nn": "**Australias smidige, stripete syndebukk**, pungulven var eit unikt pungrovdyr som nådelaust var peika ut som mål sjølv om han ofte var uskuldig. Den grasiøse utryddinga hans, påskunda av menneskelege dusørjegerar og forsvinnande habitat, sementerte arva hans som eit gripande spøkelse for alltid." }, { "scientific_name": "Hydropsyche tobiasi", "common_name": "Tobias' caddisfly", "iucn_status": "EX", "primary_cause": "Pollution", "last_sighting_year": 1938, "region": "Germany", "wikipedia_url": "https://en.wikipedia.org/wiki/Hydropsyche_tobiasi", "image_url": "archive_images/hydropsyche_tobiasi.webp", "synopsis_en": "**A meticulous architect of vanishing streams**, Tobias' caddisfly wove intricate silken nets, sifting clean currents for daily sustenance. This diligent filter-feeder was ultimately filtered out of existence by relentless progress turning its pristine home into toxic soup.", "synopsis_nn": "**Ein nitidig arkitekt i forsvinnande bekker**, Tobias' vårfluge vov intrikate silkenett, og sikta reine straumar for dagleg føde. Denne flittige filteretaren vart til slutt sjølv filtrert ut av eksistensen då uavbrote framsteg forvandla heimen hennar til giftig suppe." }, { "scientific_name": "Macropus greyi", "common_name": "Toolache wallaby", "iucn_status": "EX", "primary_cause": "Hunting, habitat loss", "last_sighting_year": 1939, "region": "Australia", "wikipedia_url": "https://en.wikipedia.org/wiki/Toolache_wallaby", "image_url": "archive_images/macropus_greyi.webp", "synopsis_en": "**A whisper of speed and grace**, the Toolache wallaby danced gracefully across grasslands with unmatched agility. Its elegant leaps proved no match for hunters' bullets and advancing farming machinery, leaving only melancholic testament to humanity's relentless progress.", "synopsis_nn": "**Eit kvisker av fart og ynde**, toolache-wallabyen dansa grasiøst over graslettene med ein smidigheit utan like. Dei elegante byksa hennar var kjangselause mot jegeranes kuler og framrykkjande landbruksmaskiner, og etterlét berre eit melankolsk vitnesbyrd om menneskja sitt nådelause framsteg." }, { "scientific_name": "Cottus echinatus", "common_name": "Utah Lake sculpin", "iucn_status": "EX", "primary_cause": "Pollution, habitat loss", "last_sighting_year": 1928, "region": "Utah, USA", "wikipedia_url": "https://en.wikipedia.org/wiki/Utah_Lake_sculpin", "image_url": "archive_images/cottus_echinatus.webp", "synopsis_en": "**Champion of simply existing**, the Utah Lake sculpin needed only clean water and rocky hideaways to thrive. Yet even such modest demands proved too much for relentless progress, as pollution and habitat loss ensured its quiet exit.", "synopsis_nn": "**Meister i å berre eksistere**, utahsjøulken kravde berre reint vatn og steinete gøymestader for å trivast. Men jamvel slike beskjedne krav viste seg å vere for mykje for det uavbrotne framsteget, ettersom forureining og tap av habitat sikra den stille utryddinga hans." }, { "scientific     function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    function fmtSynopsis(text) {
      if (!text) return '';
      let s = text.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
      s = s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\*(.*?)\*/g, '<em>$1</em>');
      s = s.replace(/<b>(.*?)<\/b>/g, '<strong>$1</strong>');
      if (!s.includes('<strong') && s.includes(',')) {
        const i = s.indexOf(',');
        if (i > 0 && i < 80) s = `<strong>${s.slice(0, i)}</strong>${s.slice(i)}`;
      }
      return s;
    }

    function statusLabel(sp, lang) {
      if (sp.scientific_name === 'Homo sapiens') return lang === 'en' ? 'MOST CONCERNING' : 'MEST BEKYMRINGSVERDIG';
      return IUCN[sp.iucn_status]?.[lang] || sp.iucn_status || '\u2014';
    }

    function statusClass(sp) {
      if (sp.scientific_name === 'Homo sapiens') return 'status-LC';
      if (sp.scientific_name === 'Felis catus') return 'status-LC';
      return IUCN[sp.iucn_status]?.cls || 'status-default';
    }

    function yearLabel(sp) {
      const y = sp.last_sighting_year;
      if (y == null) return '';
      const pfx = y < 1850 ? 'circa ' : '';
      const sfx = y < 0 ? ' BC' : '';
      return `: ${pfx}${Math.abs(y)}${sfx}`;
    }

    function imgSrc(sp) {
      if (!sp.image_url || sp.image_url === 'none') return null;
      return sp.image_url.replace(/^\//, '../public/');
    }

      const region = sp.region || '';

      const cause = lang === 'nn' && causeEn ? (CAUSE_NN[causeEn] || causeEn) : causeEn;
      const synopsis = lang === 'en' ? sp.synopsis_en : sp.synopsis_nn;
      const langLabel = lang === 'en' ? 'ENGLISH' : 'NYNORSK';

      const causeHtml = cause ? `

    <div class="card__counter">${idx + 1} / ${total}</div>
    <h2 class="card__common">${esc(displayName)}</h2>
    <h3 class="card__scientific">${esc(sp.scientific_name)}${region ? ' \u2014 ' + esc(region) : ''}</h3>
    <div class="card__meta">
      <div>
        <span class="card__meta-label">Status:</span>
        <span class="card__badge ${statusClass(sp)}">${esc(statusLabel(sp, lang))}${esc(yearLabel(sp))}</span>
      </div>
      ${causeHtml}
    </div>
    <div class="card__synopsis">${fmtSynopsis(synopsis)}</div>`;
    }

    const species = SPECIES_DATA;
    const total = species.length;
    let current = 0;
    let paused = false;
    let intervalMs = 12000;
    let timer = null;

    const paneEn = document.getElementById('pane-en');
    const paneNn = document.getElementById('pane-nn');
    const progressFill = document.getElementById('progress-fill');
    const pauseIndicator = document.getElementById('pause-indicator');

    function showCard(idx) {
      current = idx % total;
      const sp = species[current];
      const src = imgSrc(sp);

      let imgEn = '', imgNn = '';
      if (src) {
        imgEn = `<div class="pane__img-layer"><img class="pane__img" src="${esc(src)}" alt="" onerror="this.parentElement.style.display='none'" /></div>`;
        imgNn = imgEn;
      }
      paneEn.innerHTML = imgEn + '<div class="card" id="card-en">' + buildCardHTML(sp, current, total, 'en') + '</div>';
      paneNn.innerHTML = imgNn + '<div class="card" id="card-nn">' + buildCardHTML(sp, current, total, 'nn') + '</div>';

      progressFill.style.width = ((current + 1) / total * 100) + '%';

      requestAnimationFrame(() => {
        document.getElementById('card-en')?.classList.add('visible');
        document.getElementById('card-nn')?.classList.add('visible');
      });
    }

    function advance() { showCard(current + 1); }

    function startAutoplay() {
      stopAutoplay();
      timer = setInterval(advance, intervalMs);
    }
    function stopAutoplay() {
      if (timer) { clearInterval(timer); timer = null; }
    }

    /* ── Cursor auto-hide after 30s inactivity ─────────────────────────── */
    let cursorTimer = null;
    function showCursor() {
      document.body.classList.remove('cursor-hidden');
      clearTimeout(cursorTimer);
      cursorTimer = setTimeout(() => document.body.classList.add('cursor-hidden'), 11000);
    }
    document.addEventListener('mousemove', showCursor);
    document.addEventListener('mousedown', showCursor);
    showCursor();

    /* ── Fullscreen toggle (double-click or F key) ─────────────────────── */
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => { });
      } else {
        document.exitFullscreen().catch(() => { });
      }
    }
    document.addEventListener('dblclick', (e) => {
      e.preventDefault();
      toggleFullscreen();
    });

    /* ── Pause/resume on single click ──────────────────────────────────── */
    document.addEventListener('click', () => {
      paused = !paused;
      pauseIndicator.classList.toggle('visible', paused);
      if (paused) stopAutoplay(); else startAutoplay();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'f' || e.key === 'F') { toggleFullscreen(); return; }
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault(); showCard(current + 1);
        if (!paused) startAutoplay();
      }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault(); showCard((current - 1 + total) % total);
        if (!paused) startAutoplay();
      }
      if (e.key === ' ') { e.preventDefault(); document.dispatchEvent(new Event('click')); }
    });

    showCard(0);
    document.getElementById('loading-screen').style.display = 'none';
    startAutoplay();
  </script>
</body>

</html>
