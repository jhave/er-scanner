  <style>
    :root {
      --white: #fafafa;
      --charcoal: #0a0a0f;
      --red: #cc2222;
      --orange: #c05020;
      --amber: #b08010;
      --green: #2a7a3a;
      --gray: #888888;
      --purple: #994488;
      --olive: #607030;
      --font-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
      --font-serif: Georgia, 'Times New Roman', serif;
      --font-mono: 'Courier New', Courier, monospace;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--charcoal);
      color: var(--white);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
    }

    body.cursor-hidden {
      cursor: none;
    }

    ::selection {
      background: rgba(204, 34, 34, 0.15);
      color: var(--white);
    }

    /* IUCN badges */
    .status-EX {
      background: var(--red);
      color: #fff;
    }

    .status-EW {
      background: var(--purple);
      color: #fff;
    }

    .status-CR {
      background: var(--red);
      color: #fff;
    }

    .status-EN {
      background: var(--orange);
      color: #fff;
    }

    .status-VU {
      background: var(--amber);
      color: #fff;
    }

    .status-NT {
      background: var(--olive);
      color: #fff;
    }

    .status-LC {
      background: var(--green);
      color: #fff;
    }

    .status-DD {
      background: var(--gray);
      color: #fff;
    }

    .status-default {
      background: rgba(255, 255, 255, .15);
      color: var(--white);
    }

    /* ── Layout: 3 columns — 25% | 50% | 25% ──────────────────────────── */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      background: var(--charcoal);
    }

    .pane {
      flex: 0 0 25%;
      width: 25%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      position: relative;
      overflow: hidden;
      padding-bottom: 11.2vh;
    }

    .pane-en {
      border-right: 1px solid rgba(250, 250, 250, .04);
    }

    .pane-nn {
      border-left: 1px solid rgba(250, 250, 250, .04);
    }

    /* Center video column */
    .video-pane {
      flex: 0 0 50%;
      width: 50%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .video-pane video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Soft vignette edges on video pane */
    .video-pane::before,
    .video-pane::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 60px;
      z-index: 2;
      pointer-events: none;
    }

    .video-pane::before {
      left: 0;
      background: linear-gradient(to right, rgba(10, 10, 15, .6), transparent);
    }

    .video-pane::after {
      right: 0;
      background: linear-gradient(to left, rgba(10, 10, 15, .6), transparent);
    }

    /* Subtle edge gradients on text panes */
    .pane-en::after,
    .pane-nn::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 30px;
      pointer-events: none;
      z-index: 5;
    }

    .pane-en::after {
      right: 0;
      background: linear-gradient(to left, rgba(10, 10, 15, .35), transparent);
    }

    .pane-nn::after {
      left: 0;
      background: linear-gradient(to right, rgba(10, 10, 15, .35), transparent);
    }

    /* ── Image background in text panes ────────────────────────────────── */
    .pane__img-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: #000;
      pointer-events: none;
    }

    .pane__img {
      width: 100%;
      height: 70vh;
      object-fit: cover;
      object-position: center top;
      filter: grayscale(10%) blur(1px);
      opacity: 1;
      -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
    }

    .pane-nn .pane__img {
      transform: scaleX(-1);
      -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
    }

    /* ── Card content ──────────────────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 10;
      padding: 0 clamp(1rem, 2vw, 2rem);
      max-width: 700px;
      margin: 0 auto;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity .8s ease, transform .8s ease;
    }

    .card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .card__counter {
      font-size: 11px;
      color: rgba(250, 250, 250, .7);
      letter-spacing: .15em;
      font-family: var(--font-mono);

      font-size: 12px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--red);
      opacity: .7;
      margin-bottom: .75rem;

    .card__common {
      font-size: clamp(1.9rem, 2.5vw, 2.2rem);
      font-weight: 400;
      color: var(--red);
      line-height: 1.15;
      margin-bottom: .2rem;
    }

    .card__scientific {
      font-size: clamp(.75rem, 2.5vw, .95rem);
      font-style: italic;
      color: rgba(250, 250, 250, .65);
      font-family: var(--font-serif);
      margin-bottom: .8rem;
    }

    .card__meta {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .card__meta-label {
      font-size: 11px;
      letter-spacing: .15em;
      text-transform: uppercase;
      font-weight: 700;
      color: rgba(250, 250, 250, .5);
      display: block;
      margin-bottom: .15rem;
    }

    .card__badge {
      display: inline-block;
      padding: .2rem .5rem;
      border-radius: 3px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      line-height: 1.4;
    }

    .card__cause {
      border-left: 2px solid var(--red);
      padding-left: .6rem;
    }

    .card__cause-why {
      font-size: 12px;
      color: rgba(204, 34, 34, .8);
      letter-spacing: .1em;
      text-transform: uppercase;
      font-weight: 700;
      display: block;
      margin-bottom: .25rem;
    }

    .card__cause-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--red);
      line-height: 1.4;
    }

    .card__synopsis {
      font-size: clamp(.78rem, 2.4vw, 1.1rem);
      color: rgba(250, 250, 250, .85);
      line-height: 1.65;
      font-weight: 800;
    }

    .card__synopsis strong {
      color: var(--white);
      font-weight: 500;
    }

    .card__synopsis em {
      font-style: italic;
      font-weight: 500;
      color: rgba(250, 250, 250, .9);
    }

    /* ── Progress bar ──────────────────────────────────────────────────── */
    .progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      z-index: 100;
      background: rgba(250, 250, 250, .04);
    }

    .progress-fill {
      height: 100%;
      background: var(--red);
      transition: width .4s ease;
      width: 0%;
    }

    /* ── Pause indicator ──────────────────────────────────────────────── */
    .pause-indicator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 200;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(250, 250, 250, .45);
      background: rgba(0, 0, 0, .7);
      padding: .4rem 1rem;
      border-radius: 4px;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }

    .pause-indicator.visible {
      opacity: 1;
    }

    /* ── Loading ───────────────────────────────────────────────────────── */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }

    #loading-screen p {
      font-size: .75rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--red);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: .5;
      }

      50% {
        opacity: 1;
      }
    }
  </style>
</head>

sighting_year": 1627, "region": "Europe", "wikipedia_url": "https://en.wikipedia.org/wiki/Aurochs", "image_url": "archive_images/bos_primigenius.webp", "synopsis_en": "**Ancestor to all domestic cattle**, the aurochs once thundered across Europe, Asia, and North Africa — a massive testament to untamed power. Millennia of hunting and habitat loss shrank its range to a single Polish forest, where the last individual died in 1627.", "synopsis_nn": "**Forfaderen til alt tamfe**, uroksen tordna ein gong over Europa, Asia og Nord-Afrika — eit massivt vitnesbyrd om utemd kraft. Tusenvis av år med jakt og tap av habitat krympa leveområdet til ein enkelt polsk skog, der det siste individet døydde i 1627." }, { "scientific_name": "Vermivora bachmanii", "common_name": "Bachman's warbler", "iucn_status": "CR (likely extinct)", "primary_cause": "Habitat loss", "last_sighting_year": 1988, "region": "North America", "wikipedia_url": "https://en.wikipedia.org/wiki/Bachman%27s_warbler", "image_url": "archive_images/vermivora_bachmanii.webp", "synopsis_en": "**Once lending its buzzy song to southern swamps**, Bachman's warbler depended on the dense, flooded understory of old-growth forests in the American South. Systematic logging of these swamp forests destroyed its habitat entirely. Last confirmed sighting: 1988.", "synopsis_nn": "**Lånte ein gong den summande songen sin til sumpene i sør**, Bachman-songaren var avhengig av den tette, overfløymde underskogen i dei gamle skogane i det amerikanske søren. Systematisk hogst av desse sumpskogane øydela levestaden heilt. Siste stadfesta observasjon: 1988." }, { "scientific_name": "Lipotes vexillifer", "common_name": "Baiji (Yangtze river dolphin)", "iucn_status": "CR (Possibly Extinct)", "primary_cause": "Pollution, shipping, hydroelectric dams, bycatch", "last_sighting_year": null, "region": "China", "wikipedia_url": null, "image_url": "archive_images/lipotes_vexillifer.webp", "synopsis_en": "**The Goddess of the Yangtze**, the Baiji navigated its ancient river for 20 million years before encountering industrial-scale degradation. Boat propellers, sonar, pollution, and the Three Gorges Dam erased an entire mammalian lineage in under fifty years. Declared functionally extinct in 2006.", "synopsis_nn": "**Yangtzes gudinne**, navigerte baijien den eldgamle elva si i 20 millionar år før ho møtte forfall i industriell skala. Båtpropellar, sonarar, ureining og Tre kløfter-dammen viska ut ei heil slektslinje av pattedyr på under femti år. Erklært funksjonelt utrydda i 2006." }, { "scientific_name": "Panthera tigris sondaica", "common_name": "Bali Tiger", "iucn_status": "EX", "primary_cause": "Hunting, habitat loss", "last_sighting_year": 1937, "region": "Bali, Indonesia", "wikipedia_url": "https://en.wikipedia.org/wiki/Bali_tiger", "image_url": "archive_images/panthera_tigris_sondaica.webp", "synopsis_en": "**A stealthy shadow across Bali's verdant landscapes**, the Bali Tiger (*Panthera tigris sondaica*) was the smallest tiger subspecies. Relentless hunting and rapid habitat loss on the densely populated island drove it to extinction. The last confirmed kill was in 1937.", "synopsis_nn": "**Ein smygande skugge over Balis frodige landskap**, balitigeren (*Panthera tigris sondaica*) var den minste tigerunderarten. Nådelaus jakt og raskt tap av habitat på den tettbefolka øya dreiv han til utrydding. Det siste stadfesta drapet var i 1937." }, { "scientific_name": "Panthera leo leo", "common_name": "Barbary Lion", "iucn_status": "EX", "primary_cause": "Hunting, habitat loss", "last_sighting_year": 1942, "region": "North Africa", "wikipedia_url": "https://en.wikipedia.org/wiki/Barbary_lion", "image_url": "archive_images/panthera_leo_leo.webp", "synopsis_en": "**The undisputed king of North Africa**, the Barbary Lion (*Panthera leo leo*) was the largest lion subspecies. It succumbed to centuries of hunting and habitat destruction, vanishing from the wild by the mid-20th century. Fragmented genetic traces persist in captive populations.", "synopsis_nn": "**Den ubestridde kongen av Nord-Afrika**, berbarløva (*Panthera leo leo*) var den største løveunderarten. Ho bukka under for hundreår med jakt og habitatøydelegging, og forsvann frå naturen rundt midten av 1900-talet. Fragmenterte genetiske spor lever vidare i bestandar i fangenskap." }, { "scientific_name": "Bermuteo avivorus", "common_name": "Bermuda hawk", "iucn_status": "EX", "primary_cause": "Hunting", "last_sighting_year": 1600, "region": "Bermuda", "wikipedia_url": "https://en.wikipedia.org/wiki/Bermuda_hawk", "image_url": "archive_images/bermuteo_avivorus.webp", "synopsis_en": "**Once soaring unchallenged above Bermuda's cedar groves**, this hawk was the island's apex aerial predator. Its keen eyesight and deadly talons proved useless against the muskets of early settlers, who hunted it to extinction.", "synopsis_nn": "**Sveva ein gong uimotsagt over Bermudas sederlundar**, var denne hauken øyas fremste rovfugl. Det skarpe synet og dødelege klørne viste seg ubrukelege mot muskettene til dei tidlege nybyggjarane, som jakta den til utrydding." }, { "scientific_name": "Moho bishopi", "common_name": "Bishop's ʻōʻō", "iucn_status": "EX", "primary_cause": "Habitat loss", "last_sighting_year": 1904, "region": "Hawaii", "wikipedia_url": "https://en.wikipedia.org/wiki/Bishop%27s_ʻōʻō", "image_url": "archive_images/moho_bishopi.webp", "synopsis_en": "**A celebrated songbird of Maui's canopies**, *Moho bishopi* was a vibrant honeyeater with a remarkable vocal repertoire. Systematic deforestation for timber and development dismantled its habitat piece by piece. Last recorded in 1981, its song survives only in archives.", "synopsis_nn": "**Ein høgt skatta songfugl i Mauis trekroner**, *Moho bishopi* var ein fargesprakande honningetar med eit oppsiktsvekkjande vokalt repertoar. Systematisk avskoging for tømmer og utbygging plukka habitatet frå kvarandre bit for bit. Siste observasjon var i 1981, og songen hennar lever no berre i arkiva." }, { "scientific_name": "Drepanis funerea", "common_name": "Black mamo", "iucn_status": "EX", "primary_cause": "Habitat loss, disease", "last_sighting_year": 1907, "region": "Hawaii", "wikipedia_url": "https://en.wikipedia.org/wiki/Black_mamo", "image_url": "archive_images/drepanis_funerea.webp", "synopsis_en": "**Sleek and ebony**, the Black Mamo (*Drepanis funerea*) graced Hawaiian forests with an elegantly curved beak evolved for deep nectar feeding. Habitat destruction and introduced avian diseases — particularly avian malaria — eliminated it by the early 1900s.", "synopsis_nn": "**Slank og ibenholt-svart**, pryda den svarte mamoen (*Drepanis funerea*) Hawaiis skogar med eit elegant bøygd nebb som var utvikla for djup nektarsanking. Habitatøydelegging og introduserte fuglesjukdomar — særleg fuglemalaria — utrydda arten tidleg på 1900-talet." }, { "scientific_name": "Coregonus nigripinnis", "common_name": "Blackfin cisco", "iucn_status": "EX", "primary_cause": "Overfishing, invasive species", "last_sighting_year": 1969, "region": "Great Lakes", "wikipedia_url": "https://en.wikipedia.org/wiki/Blackfin_cisco", "image_url": "archive_images/coregonus_nigripinnis.webp", "synopsis_en": "**A shimmering deepwater fish**, the Blackfin Cisco once thrived in the Great Lakes in vast numbers. Overfishing with commercial gill nets and predation by invasive sea lampreys collapsed its populations. Last recorded in the 1960s.", "synopsis_nn": "**Ein glitrande djuphavsfisk**, treivst svartfinne-sik ein gong i enorme tal i Dei store sjøane. Overfiske med kommersielle garn og rovdrift frå den invaderande havniaugen fekk bestanden til å bryte saman. Sist registrert på 1960-talet." }, { "scientific_name": "Hippotragus leucophaeus", "common_name": "Bluebuck", "iucn_status": "EX", "primary_cause": "Hunting", "last_sighting_year": 1800, "region": "South Africa", "wikipedia_url": "https://en.wikipedia.org/wiki/Bluebuck", "image_url": "archive_images/hippotragus_leucophaeus.webp", "synopsis_en": "**A bluish-grey antelope of the South African veld**, the Bluebuck (*Hippotragus leucophaeus*) was already rare when European settlers arrived. Relentless hunting for its striking hide ensured its complete disappearance by 1800 — the first large African mammal to go extinct in modern history.", "synopsis_nn": "**Ein blågrå antilope frå den sørafrikanske svelten**, blåbukken (*Hippotragus leucophaeus*) var allereie sjeldan då europeiske nybyggjarar kom. Nådelaus jakt for den prangande huda sørgde for at han var heilt forsvunnen innan 1800 — det første store afrikanske pattedyret som døydde ut i moderne tid." }, { "scientific_name": "Columba versicolor", "common_name": "Bonin wood pigeon", "iucn_status": "EX", "primary_cause": "Hunting, habitat loss", "last_sighting_year": 1889, "region": "Bonin Islands", "wikipedia_url": "https://en.wikipedia.org/wiki/Bonin_wood_pigeon", "image_url": "archive_images/columba_versicolor.webp", "synopsis_en": "**A strikingly iridescent pigeon** of the Ogasawara Islands, *Columba versicolor* inhabited dense subtropical forests. Hunting by settlers and deforestation unravelled its existence. Known from only a few museum specimens, it was last recorded in the 1880s.", "synopsis_nn": "**Ei slåande, iriserande due** frå Ogasawaraøyane, *Columba versicolor*, heldt til i tette subtropiske skogar. Jakt frå nybyggjarar og avskoging gjorde slutt på eksistensen hennar. Ho er berre kjend frå nokre få museumseksemplar, og vart sist registrert i 1880-åra." }, { "scientific_name": "Melomys rubicola", "common_name": "Bramble Cay melomys", "iucn_status": "EX", "primary_cause": "Climate change, sea level rise", "last_sighting_year": 2009, "region": "Australia", "wikipedia_url": "https://en.wikipedia.org/wiki/Bramble_Cay_melomys", "image_url": "archive_images/melomys_rubicola.webp", "synopsis_en": "**The first mammal officially extinguished by human-induced climate change**, the Bramble Cay melomys lived on a tiny coral cay in the Torres Strait. Rising seas and increasingly severe storm surges inundated its habitat, destroying vegetation and food sources. Declared extinct in 2019.", "synopsis_nn": "**Det første pattedyret offisielt utrydda av menneskeskapte klimaendringar**, Bramble Cay-melomys levde på ei knøttlita koralløy i Torres-sundet. Stigande havnivå og stadig kraftigare stormflod oversvømde habitatet, og øydela vegetasjon og matkjelder. Erklært utrydda i 2019." }, { "scientific_name": "Zosterops conspicillatus", "common_name": "Bridled white-eye", "iucn_status": "EX", "primary_cause": "Brown tree snake", "last_sighting_year": 1983, "region": "Guam", "wikipedia_url": "https://en.wikipedia.org/wiki/Bridled_white-eye", "image_url": "archive_images/zosterops_conspicillatus.webp", "synopsis_en": "**A delicate songbird of Guam's canopies**, the Bridled White-eye was devastated by the accidental introduction of the brown tree snake after World War II. The invasive predator systematically consumed its eggs, chicks, and adults.", "synopsis_nn": "**Ein var og skjør songfugl i Guams trekroner**, brillefuglen, vart hardt ramma av den utilsikta introduksjonen av den brune treormen etter andre verdskrig. Det invaderande rovdyret åt systematisk opp egga, ungane og dei vaksne fuglane." }, { "scientific_name": "Lophopsittacus mauritianus", "common_name": "Broad-billed parrot", "iucn_status": "EX", "primary_cause": "Hunting, invasive species", "last_sighting_year": 1674, "region": "Mauritius", "wikipedia_url": "https://en.wikipedia.org/wiki/Broad-billed_parrot", "image_url": "archive_images/lophopsittacus_mauritianus.webp", "synopsis_en": "**Armed with massive mandibles for cracking the toughest seeds**, the Broad-billed Parrot lumbered through Mauritius' native forests. Hungry sailors hunted it for food while introduced rats and pigs devoured its eggs and nestlings. It vanished by the late 1600s.", "synopsis_nn": "**Utstyrt med enorme kjevar for å knekke dei hardaste frøa**, vralta den breinebba papegøyen gjennom Mauritius' opphavlege skogar. Svoltne sjømenn jakta på den for mat, medan introduserte rotter og griser slukte egga og ungane. Han forsvann seint på 1600-talet." }, { "scientific_name": "Potorous platyops", "common_name": "Broad-faced potoroo", "iucn_status": "EX", "primary_cause": "Predation, habitat loss", "last_sighting_year": 1875, "region": "Australia", "wikipedia_url": "https://en.wikipedia.org/wiki/Broad-faced_potoroo", "image_url": "archive_images/potorous_platyops.webp", "synopsis_en": "**A forest marsupial**, the Broad-faced Potoroo vanished when shrubland habitats converted to farmland and introduced predators arrived. Its small size made it vulnerable to larger carnivores.", "synopsis_nn": "**Eit skogspungdyr**, den breiansikta potorooen forsvann då krattlandskap vart gjort om til jordbruksland og introduserte rovdyr dukka opp. Den vesle storleiken gjorde arten sårbar for større rovdyr." }, { "scientific_name": "Alcelaphus buselaphus buselaphus", "common_name": "Bubal Hartebeest", "iucn_status": "EX", "primary_cause": "Overhunting", "last_sighting_year": 1923, "region": "North Africa", "wikipedia_url": "https://en.wikipedia.org/wiki/Bubal_hartebeest", "image_url": "archive_images/alcelaphus_buselaphus_buselaphus.webp", "synopsis_en": "**Once North Africa's plains inhabitant**, the Bubal Hartebeest (*Alcelaphus buselaphus buselaphus*) was hunted to extinction by human expansion and overhunting, vanishing completely by the early 1900s.", "synopsis_nn": "**Ein gong ein slettebuar i Nord-Afrika**, vart bubalhartebeesten (*Alcelaphus buselaphus buselaphus*) jakta til utrydding på grunn av menneskeleg ekspansjon og overjakt, og forsvann heilt tidleg på 1900-talet." }, { "scientific_name": "Xenicus longipes", "common_name": "Bushwren", "iucn_status": "EX", "primary_cause": "Invasive species", "last_sighting_year": 1972, "region": "New Zealand", "wikipedia_url": "https://en.wikipedia.org/wiki/Bushwren", "image_url": "archive_images/xenicus_longipes.webp", "synopsis_en": "**A New Zealand forest phantom**, the Bushwren flitted through undergrowth hunting insects until introduced predators, particularly rats and stoats, eliminated the species. Last seen in 1955.", "synopsis_nn": "**Eit skogsfantom frå New Zealand**, busksmetten flaksa gjennom underskogen på jakt etter insekt fram til introduserte rovdyr, særleg rotter og røyskattar, utrydda arten. Sist sett i 1955." }, { "scientific_name": "Haematopus meadewaldoi", "common_name": "Canary Islands oystercatcher", "iucn_status": "EX", "primary_cause": "Hunting, disturbance", "last_sighting_year": 1940, "region": "Canary Islands", "wikipedia_url": "https://en.wikipedia.org/wiki/Canary_Islands_oystercatcher", "image_url": "archive_images/haematopus_meadewaldoi.webp", "synopsis_en": "**A coastal specialist**, the Canary Islands oystercatcher, striking black and red, vanished due to human disturbance of nesting sites and habitat destruction on volcanic shores.", "synopsis_nn": "**Ein kystspesialist**, kanariøytjelden, i slåande svart og raudt, forsvann på grunn av menneskeleg forstyrring av hekkeplassar og habitatøydelegging langs vulkanske kyster." }, { "scientific_name": "Chioninia coctei", "common_name": "Cape Verde giant skink", "iucn_status": "EX", "primary_cause": "Predation, habitat loss", "last_sighting_year": 1912, "region": "Cape Verde", "wikipedia_url": "https://en.wikipedia.org/wiki/Cape_Verde_giant_skink", "image_url": "archive_images/chioninia_coctei.webp", "synopsis_en": "**An island giant**, the Cape Verde giant skink's slow movement and large size made it prey for introduced predators. Habitat destruction completed its decline by the 1940s.", "synopsis_nn": "**Ein øygigant**, den treige rørsla og enorme storleiken gjorde den kappverdiske kjempeskinken til eit lett bytte for introduserte rovdyr. Habitatøydelegging fullførte nedgangen innan 1940-åra." }, { "scientific_name": "Neomonachus tropicalis", "common_name": "Caribbean monk seal", "iucn_status": "EX", "primary_cause": "Hunting, habitat loss", "last_sighting_year": 1952, "region": "Caribbean", "wikipedia_url": "https://en.wikipedia.org/wiki/Caribbean_monk_seal", "image_url": "archive_images/neomonachus_tropicalis.webp", "synopsis_en": "**A coastal dweller**, the Caribbean monk seal basked on tranquil shores but was hunted relentlessly for blubber and oils, then out-competed for remaining breeding beaches.", "synopsis_nn": "**Ein kystbuar**, karibiermunkeselen sola seg på fredelege strender, men vart jakta nådelaust for spekk og olje, og deretter utkonkurrert frå dei gjenværande yngleplassane." }, { "scientific_name": "Conuropsis carolinensis", "common_name": "Carolina parakeet", "iucn_status": "EX", "primary_cause": "Hunting, habitat loss", "last_sighting_year": 1918, "region": "North America", "wikipedia_url": "https://en.wikipedia.org/wiki/Carolina_parakeet", "image_url": "archive_images/conuropsis_carolinensis.webp", "synopsis_en": "**A vibrant songbird**, the Carolina parakeet's emerald and gold plumage made it a target for hat trade, while crop raiding led to persecution. Last specimen died 1918.", "synopsis_nn": "**Ein fargesprakande songfugl**, karolinapapegøyen si smaragdgrøne og gylne fjørdrakt gjorde han til eit mål for hattehandelen, medan plyndring av avlingar førte til forfølging. Siste eksemplar døydde i 1918." }, { "scientific_name": "Panthera tigris virgata", "common_name": "Caspian Tiger", "iucn_status": "EX", "primary_cause": "Hunting, habitat destruction", "last_sighting_year": 1970, "region": "Central Asia, Iran, Turkey", "wikipedia_url": "https://en.wikipedia.org/wiki/Caspian_tiger", "image_url": "archive_images/panthera_tigris_virgata.webp", "synopsis_en": "**A forest phantom**, the Caspian Tiger (*Panthera tigris virgata*) once roamed Central Asia, Iran, and Turkey's riparian zones. Hunted and habitat destruction eliminated it by the 1950s.", "synopsis_nn": "**Eit skogsfantom**, den kaspiske tigeren (*Panthera tigris virgata*) streifa ein gong i riparian-sonene i Sentral-Asia, Iran og Tyrkia. Jakt og habitatøydelegging utrydda arten innan 1950-åra." }, { "scientific_name": "Anthornis melanocephala", "common_name": "Chatham bellbird", "iucn_status": "EX", "primary_cause": "Invasive species", "last_sighting_year": 1906, "region": "Chatham Islands", "wikipedia_url": "https://en.wikipedia.org/wiki/Chatham_bellbird", "image_url": "archive_images/anthornis_melanocephala.webp", "synopsis_en": "**A forest songster**, the Chatham bellbird filled island forests with its chiming melodies until introduced rats and cats preyed upon it, silencing its song forever.", "synopsis_nn": "**Ein songar frå skogen**, chathambjøllefuglen fylte øyskogane med dei klangfulle melodiane sine heilt til introduserte rotter og kattar byrja å jakte på han, og teia songen for alltid." }, { "scientific_name": "Psephurus gladius", "common_name": "Chinese paddlefish", "iucn_status": "EX", "primary_cause": "Overfishing, dams", "last_sighting_year": 2003, "region": "China", "wikipedia_url": "https://en.wikipedia.org/wiki/Chinese_paddlefish", "image_url": "archive_images/psephurus_gladius.webp", "synopsis_en": "**A ancient leviathan**, the Chinese paddlefish, nearly seven meters long, patrolled the Yangtze for millions of years until overfishing and concrete dams caused its extinction by 2002.", "synopsis_nn": "**Ein eldgammal leviatan**, den kinesiske spadestøren, nesten sju meter lang, patruljerte Yangtze-elva i millionar av år fram til overfiske og betongdammar forårsaka utryddinga hans innan 2002." }, { "scientific_name": "Atelopus chiriquiensis", "common_name": "Chiriqui harlequin frog", "iucn_status": "CR (likely extinct)", "primary_cause": "Disease (chytrid fungus)", "last_sighting_year": 1996, "region": "Costa Rica/Panama", "wikipedia_url": "https://en.wikipedia.org/wiki/Atelopus_chiriquiensis", "image_url": "archive_images/atelopus_chiriquiensis.webp", "synopsis_en": "**A fluorescent forest dweller**, the Chiriqui harlequin frog once graced Central American streams with vibrant colors until a waterborne fungus swept through populations rapidly.", "synopsis_nn": "**Ein fluoriserande skogsbuar**, chiriqui-harlekinfrosken pryda ein gong sentralamerikanske bekkar med sterke fargar inntil ein vassboren sopp feia raskt gjennom bestandane." }, { "scientific_name": "Microgoura meeki", "common_name": "Choiseul pigeon", "iucn_status": "EX", "primary_cause": "Predation by cats", "last_sighting_year": 1904, "region": "Solomon Islands", "wikipedia_url": "https://en.wikipedia.org/wiki/Choiseul_pigeon", "image_url": "archive_images/microgoura_meeki.webp", "synopsis_en": "**An unsuspecting ground dweller**, the Choiseul pigeon cooed through its island undergrowth until domestic cats arrived and became efficient predators of this flightless, ground-nesting bird.", "synopsis_nn": "**Ein inkjeanande bakkebuar**, choiseulduen kurra gjennom underskogen på øya si heilt til tamkattar kom og vart effektive rovdyr for denne flygelause, bakkehekkande fuglen." }, { "scientific_name": "Pipistrellus murrayi", "common_name": "Christmas Island pipistrelle", "iucn_status": "EX", "primary_cause": "Unknown decline", "last_sighting_year": 2009, "region": "Christmas Island", "wikipedia_url": "https://en.wikipedia.org/wiki/Christmas_Island_pipistrelle", "image_url": "archive_images/pipistrellus_murrayi.webp", "synopsis_en": "**A nocturnal hunter**, the four-gram Christmas Island pipistrelle performed vanishing act from twilight skies. Its extinction cause remains mysterious, possibly involving introduced predators.", "synopsis_nn": "**Ein nattleg jeger**, den fire gram tunge christmasøydvergflaggermusa utførte eit forsvinningsnummer frå skumringshimmelen. Utryddingsårsaka er framleis eit mysterium, moglegvis knytt til introduserte rovdyr." }, { "scientific_name": "Crocidura trichura", "common_name": "Christmas Island shrew", "iucn_status": "EX", "primary_cause": "Invasive species, disease", "last_sighting_year": 1985, "region": "Christmas Island", "wikipedia_url": "https://en.wikipedia.org/wiki/Christmas_Island_shrew", "image_url": "archive_images/crocidura_trichura.webp", "synopsis_en": "**A tiny insectivore**, the Christmas Island Shrew (*Crocidura trichura*) vanished amid introduced predators and novel pathogens. Its swift disappearance reflects island ecosystem vulnerability.", "synopsis_nn": "**Ein ørliten insektetar**, christmasøyspissmusa (*Crocidura trichura*) forsvann midt blant introduserte rovdyr og nye patogen. Den raske forsvinninga reflekterer sårbarheita i øyøkosystem." }, { "scientific_name": "Podiceps andinus", "common_name": "Colombian grebe", "iucn_status": "EX", "primary_cause": "Pollution, habitat loss", "last_sighting_year": 1977, "region": "Colombia", "wikipedia_url": "https://en.wikipedia.org/wiki/Colombian_grebe", "image_url": "archive_images/podiceps_andinus.webp", "synopsis_en": "**An Andean diver**, the Colombian grebe (*Podiceps andinus*) inhabited pristine mountain lakes until industrial runoff and wetland draining destroyed its habitat completely.", "synopsis_nn": "**Ein andesk dukkar**, den kolombianske dukkaren (*Podiceps andinus*) heldt til i urørte fjellsjøar fram til industriell avrenning og drenering av våtmarker øydela habitatet heilt." }, { "scientific_name": "Conus lugubris", "common_name": "Conus lugubris", "iucn_status": "EX", "primary_cause": "Coastal development", "last_sighting_year": 1987, "region": "Cape Verde", "wikipedia_url": "https://en.wikipedia.org/wiki/Conus_lugubris", "image_url": "archive_images/conus_lugubris.webp", "synopsis_en": "**A tideline hunter**, *Conus lugubris*, an exquisitely patterned cone snail, hunted pristine shallows until coastal development replaced sandy habitat with concrete development.", "synopsis_nn": "**Ein strandlinjejeger**, *Conus lugubris*, ein eksotisk mønstra kjeglesnigel, jakta i dei urørte grunnene fram til kystutbygging erstatta sandhabitatet med betong." }, { "scientific_name": "Onychogalea lunata", "common_name": "Crescent nail-tail wallaby", "iucn_status": "EX", "primary_cause": "Predation by foxes", "last_sighting_year": 1956, "region": "Australia", "wikipedia_url": "https://en.wikipedia.org/wiki/Crescent_nail-tail_wallaby", "image_url": "archive_images/onychogalea_lunata.webp", "synopsis_en": "**A nocturnal marsupial**, the Crescent Nail-tail Wallaby (*Onychogalea lunata*) darted through Australian landscape with distinctive claw-tipped tail until introduced red foxes arrived.", "synopsis_nn": "**Eit nattaktivt pungdyr**, månenaglahalewallabyen (*Onychogalea lunata*) pilte gjennom det australske landskapet med sin karakteristiske klotuppa hale fram til introduserte raudrevar dukka opp." }, { "scientific_name": "Viola cryana", "common_name": "Cry violet", "iucn_status": "EX", "primary_cause": "Quarrying", "last_sighting_year": 1930, "region": "France", "wikipedia_url": "https://en.wikipedia.org/wiki/Viola_cryana", "image_url": "archive_images/viola_cryana.webp", "synopsis_en": "**A limestone specialist**, *Viola cryana*, a purple violet of Virginia's limestone barrens, thrived on calcium-rich soils until limestone quarrying destroyed its habitat.", "synopsis_nn": "**Ein kalksteinspesialist**, *Viola cryana*, ein lilla fiol frå det karrige kalksteinslandskapet, treivst i kalsiumrik jord heilt til kalksteinsbrot øydela leveområdet." }, { "scientific_name": "Ara tricolor", "common_name": "Cuban macaw", "iucn_status": "EX", "primary_cause": "Hunting, trapping", "last_sighting_year": 1885, "region": "Cuba", "wikipedia_url": "https://en.wikipedia.org/wiki/Cuban_macaw", "image_url": "archive_images/ara_tricolor.webp", "synopsis_en": "**A Caribbean display**, the Cuban macaw (*Ara tricolor*) blazed across island canopies in red, blue, and gold until hunted and trapped for its dazzling beauty.", "synopsis_nn": "**Ei karibisk framsyning**, den kubanske araen (*Ara tricolor*) lyste opp trekronene i raudt, blått og gull heilt til han vart jakta og fanga på grunn av den blendande venleiken sin." }, { "scientific_name": "Cyanea superba", "common_name": "Cyanea superba", "iucn_status": "EW", "primary_cause": "Habitat loss, invasive species", "last_sighting_year": 2003, "region": "Hawaii", "wikipedia_url": "https://en.wikipedia.org/wiki/Cyanea_superba", "image_url": "archive_images/cyanea_superba.webp", "synopsis_en": "**Hawaii's flowering marvel**, *Cyanea superba*, once graced islands with magnificent bell-shaped flowers until introduced pigs and slugs, coupled with forest loss, eliminated the species.", "synopsis_nn": "**Hawaiis blømande underverk**, *Cyanea superba*, pryda ein gong øyane med sine praktfulle klokkeforma blomar inntil introduserte griser og sniglar, saman med avskoging, utrydda arten." }, { "scientific_name": "Coregonus johannae", "common_name": "Deepwater cisco", "iucn_status": "EX", "primary_cause": "Overfishing, invasive species", "last_sighting_year": 1952, "region": "Great Lakes", "wikipedia_url": "https://en.wikipedia.org/wiki/Deepwater_cisco", "image_url": "archive_images/coregonus_johannae.webp", "synopsis_en": "**A Great Lakes dweller**, *Coregonus johannae*, a plump silvery fish, thrived until commercial overfishing and invasive predatory fishes destroyed populations.", "synopsis_nn": "**Ein bebuar i Dei store sjøane**, *Coregonus johannae*, ein rund, sølvfarga fisk, treivst fram til kommersielt overfiske og invaderande rovfisk øydela bestandane." }, { "scientific_name": "Hoplodactylus delcourti", "common_name": "Delcourt's Giant Gecko", "iucn_status": "EX", "primary_cause": "Predation by introduced species", "last_sighting_year": 1870, "region": "New Zealand", "wikipedia_url": "https://en.wikipedia.org/wiki/Hoplodactylus_delcourti", "image_url": "archive_images/hoplodactylus_delcourti.webp", "synopsis_en": "**The gecko titan**, *Hoplodactylus delcourti*, possibly the largest gecko ever recorded, silently patrolled New Zealand's forests until introduced predators caused its extinction.", "synopsis_nn": "**Gekkotitanen**, *Hoplodactylus delcourti*, moglegvis den største gekkoen nokon gong registrert, patruljerte dei newzealandske skogane i stillheit heilt til introduserte rovdyr forårsaka utryddinga hans." }, { "scientific_name": "Delissea sinuata", "common_name": "Delissea sinuata", "iucn_status": "EX", "primary_cause": "Habitat loss, invasive species", "last_sighting_year": 1937, "region": "Hawaii", "wikipedia_url": "https://en.wikipedia.org/wiki/Hawaiian_lobelioids", "image_url": "archive_images/delissea_sinuata.webp", "synopsis_en": "**A Hawaiian shrub**, *Delissea sinuata* once flourished in secluded island havens until feral ungulates browsed vegetation and invasive species competed for resources.", "synopsis_nn": "**Ein hawaiisk busk**, *Delissea sinuata* blømde ein gong i avsidesliggjande øyparadis inntil forvilla hovdyr beita ned vegetasjonen og invaderande artar konkurrerte om ressursane." }, { "scientific_name": "Bettongia anhydra", "common_name": "Desert bettong", "iucn_status": "EX", "primary_cause": "Predation, habitat loss", "last_sighting_year": 1933, "region": "Australia", "wikipedia_url": "https://en.wikipedia.org/wiki/Bettongia_anhydra", "image_url": "archive_images/bettongia_anhydra.webp", "synopsis_en": "**A desert burrower**, the Desert Bettong once scurried through arid lands, digging for fungi and roots, until foxes and feral cats proved more formidable predators than dingoes.", "synopsis_nn": "**Ein ørkengravar**, ørkenbettongen pilte ein gong gjennom dei tørre landskapa, der han grov etter sopp og røter, heilt til revar og villkattar viste seg å vere langt farlegare rovdyr enn dingoar." }, { "scientific_name": "Caloprymnus campestris", "common_name": "Desert rat-kangaroo", "iucn_status": "EX", "primary_cause": "Predation, drought", "last_sighting_year": 1935, "region": "Australia", "wikipedia_url": "https://en.wikipedia.org/wiki/Desert_rat-kangaroo", "image_url": "archive_images/caloprymnus_campestris.webp", "synopsis_en": "**An Outback hopper**, the Desert rat-kangaroo (*Caloprymnus campestris*) navigated harsh landscapes until prolonged droughts and introduced predators ended this elegant species' survival.", "synopsis_nn": "**Ein hoppar frå villmarka**, ørkenrottekenguruen (*Caloprymnus campestris*) navigerte gjennom nådelause landskap inntil langvarig tørke og introduserte rovdyr gjorde slutt på overlevinga til denne elegante arten." }, { "scientific_name": "Diospyros angulata", "common_name": "Diospyros angulata", "iucn_status": "EX", "primary_cause": "Habitat loss", "last_sighting_year": 1851, "region": "Mauritius", "wikipedia_url": "https://en.wikipedia.org/wiki/Diospyros_tessellaria", "image_url": "archive_images/diospyros_angulata.webp", "synopsis_en": "**A quiet contender of forgotten canopies**, *Diospyros angulata* once flourished in ancient woodlands, a verdant whisper among towering trees. Its undoing came not from disease or predation, but from the simple disappearance of its home, leaving this species nowhere to extend its roots.", "synopsis_nn": "**Ein still utfordrar i gløymde trekroner**, *Diospyros angulata* blømde ein gong i eldgamle skogar, ei grøn kviskering blant ruvande tre. Undergangen hennar kom ikkje av sjukdom eller rovdyr, men rett og slett av at heimen hennar forsvann, noko som ikkje gav arten nokon stad å strekkje røtene sine." }, { "scientific_name": "Canis dirus", "common_name": "Dire Wolf", "iucn_status": "EX", "primary_cause": "Climate change, megafaunal extinction", "last_sighting_year": -9500, "region": "Americas", "wikipedia_url": "https://en.wikipedia.org/wiki/Dire_wolf", "image_url": "archive_images/canis_dirus.webp", "synopsis_en": "**The iconic apex predator of the Pleistocene Americas**, the Dire Wolf met its demise alongside the megafauna it once hunted. Shifting climates and the subsequent collapse of its large prey base sealed the fate of these formidable canines, larger than any modern wolf species.", "synopsis_nn": "**Det ikoniske rovdyret på toppen av næringskjeda i Amerika under pleistocen**, skrekkulven møtte endeliktet sitt saman med megafaunaen han ein gong jakta på. Skiftande klima og den påfølgjande kollapsen av byttedyra hans forsegla skjebnen til desse formidable hundedyra, større enn nokon moderne ulveart." }, { "scientific_name": "Raphus cucullatus", "common_name": "Dodo", "iucn_status": "EX", "primary_cause": "Hunting, invasive species", "last_sighting_year": 1662, "region": "Mauritius", "wikipedia_url": "https://en.wikipedia.org/wiki/Dodo", "image_url": "archive_images/raphus_cucullatus.webp", "synopsis_en": "**A plump, flightless marvel**, the Dodo waddled peacefully across Mauritius. Its gentle nature and complete lack of natural predators left it utterly defenseless against hungry sailors and their accompanying invasive species, who swiftly devoured its future by the 1600s.", "synopsis_nn": "**Eit lubbe, flygelaust underverk**, dodoen vralta fredeleg over Mauritius. Den milde naturen hennar og fullstendig mangel på naturlege rovdyr gjorde henne heilt forsvarslaus mot svoltne sjømenn og dei medfølgjande invaderande artane deira, som raskt slukte framtida hennar på 1600-talet." }, { "scientific_name": "Felis catus", "common_name": "Domestic Cat", "iucn_status": "LC", "primary_cause": null, "last_sighting_year": null, "region": null, "wikipedia_url": "https://en.wikipedia.org/wiki/Felis_catus", "image_url": "archive_images/felis_catus.webp", "synopsis_en": "**From desert-dwelling loners to internet overlords**, domestic cats cleverly self-domesticated through strategic purring and calculated feline charm. They conquered every corner of the planet while mysteriously maintaining the perpetually cold, calculating gaze of their Near Eastern wildcat ancestors.", "synopsis_nn": "**Frå ørkenbuande einstøingar til internett-herskarar**, huskattar sjølvdomestiserte seg smart gjennom strategisk maling og utrekna katte-sjarm. Dei erobra kvart eit hjørne av planeten, samstundes som dei på mystisk vis beheldt det evig kalde, kalkulerande blikket til sine forfedrar frå Midtausten." }, { "scientific_name": "Notropis aulidion", "common_name": "Durango shiner", "iucn_status": "EX", "primary_cause": "Habitat loss", "last_sighting_year": 1965, "region": "Mexico", "wikipedia_url": "https://en.wikipedia.org/wiki/Durango_shiner", "image_url": "archive_images/notropis_aulidion.webp", "synopsis_en": "**A fleeting whisper of silver**, the Durango shiner once graced its very particular corner of Mexican waters with iridescent grace. This aquatic jewel vanished when its specific habitat dried up, leaving only fading echoes of its shimmering absence.", "synopsis_nn": "**Eit flyktig kvisker av sølv**, durangoshineren pryda ein gong sitt heilt spesielle hjørne av meksikanske farvatn med iriserande eleganse. Denne akvatiske juvelen forsvann då det spesifikke habitatet tørka inn, og etterlét seg berre falmande ekko av det glitrande fråveret sitt." }, { "scientific_name": "Pteropus brunneus", "common_name": "Dusky flying fox", "iucn_status": "EX", "primary_cause": "Unknown", "last_sighting_year": 1874, "region": "Percy Islands", "wikipedia_url": "https://en.wikipedia.org/wiki/Dusky_flying_fox", "image_url": "archive_images/pteropus_brunneus.webp", "synopsis_en": "**The dusky dart of the night**, *Pteropus brunneus* once graced arboreal skies with quiet, contemplative elegance and profound grace. This remarkable, elegant fruit bat simply ceased to be, its unceremonious vanishing act shrouded in eternal mystery.", "synopsis_nn": "**Nattas dunkle pil**, *Pteropus brunneus* pryda ein gong skogshimmelen med stille, ettertenksam eleganse og djup ynde. Denne uvanlege, elegante fruktflaggermusa slutta rett og slett å eksistere, og det uformelle forsvinningsnummeret hennar er hylla i evig mysterium." }, { "scientific_name": "Lagorchestes leporides", "common_name": "Eastern hare-wallaby", "iucn_status": "EX", "primary_cause": "Predation, habitat loss", "last_sighting_year": 1890, "region": "Australia", "wikipedia_url": "https://en.wikipedia.org/wiki/Eastern_hare-wallaby", "image_url": "archive_images/lagorchestes_leporides.webp", "synopsis_en": "**A bouncy, grass-guzzling dynamo**, the Eastern hare-wallaby ricocheted energetically and gracefully across Australia's vast, sunburnt plains with characteristic athleticism. Rapidly shrinking habitats and ravenous introduced predators overwhelmed this unique, irreplaceable marsupial by the 1930s.", "synopsis_nn": "**Ein spretten, gras-slukande dynamo**, den austlege hare-wallabyen spratt energisk og grasiøst over dei enorme, solsvidde slettene i Australia med karakteristisk atletikk. Raskt krympande leveområde og glupske introduserte rovdyr overvelda dette unike, uerstattelege pungdyret innan 1930-åra." }, { "scientific_name": "Aepyornis maximus", "common_name": "Elephant Bird", "iucn_status": "EX", "primary_cause": "Human hunting, egg collection", "last_sighting_year": 1000, "region": "Madagascar", "wikipedia_url": "https://en.wikipedia.org/wiki/Elephant_bird", "image_url": "archive_images/aepyornis_maximus.webp", "synopsis_en": "**A colossal resident of Madagascar**, the Elephant Bird fell victim to human arrival and rapid settlement. These flightless giants bore eggs larger than basketballs, yet relentless hunting and systematic egg plundering swiftly sealed their permanent extinction.", "synopsis_nn": "**Ein kolossal bebuar på Madagaskar**, elefantfuglen vart eit offer for menneska sin ankomst og raske busetjing. Desse flygelause gigantane la egg større enn basketballar, men nådelaus jakt og systematisk eggplyndring forsegla raskt den permanente utryddinga deira." }, { "scientific_name": "Encephalartos woodii", "common_name": "Encephalartos woodii", "iucn_status": "EW", "primary_cause": "Overcollection", "last_sighting_year": 1916, "region": "South Africa", "wikipedia_url": "https://en.wikipedia.org/wiki/Encephalartos_woodii", "image_url": "archive_images/encephalartos_woodii.webp", "synopsis_en": "**The botanical equivalent of a one-hit wonder**, *Encephalartos woodii* achieved ultimate collector status worldwide and legendary infamy. Its stunning rarity ignited fervent, all-consuming desire among passionate enthusiasts, and human admiration tragically became its inevitable undoing.", "synopsis_nn": "**Den botaniske ekvivalenten til eit døgnfloge**, *Encephalartos woodii* oppnådde ultimat samlarstatus over heile verda og legendarisk vanrykte. Den slåande sjeldsyntheita hennar tende eit glødande, altoppslukande begjær blant lidenskapelege entusiastar, og menneskeleg beundring vart tragisk nok den uunngåelege undergangen." }, { "scientific_name": "Dusicyon australis", "common_name": "Falkland Islands wolf", "iucn_status": "EX", "primary_cause": "Hunting", "last_sighting_year": 1876, "region": "Falkland Islands", "wikipedia_url": "https://en.wikipedia.org/wiki/Falkland_Islands_wolf", "image_url": "archive_images/dusicyon_australis.webp", "synopsis_en": "**The Falklands' unsuspecting monarch**, *Dusicyon australis* trotted the treeless plains with solitary, austere grace. Human hunters deemed this uniquely isolated wolf a trophy worth hunting to extinction, a fatal notion that cost the world an irreplaceable predator.", "synopsis_nn": "**Falklandsøyane sin inkjeanande monark**, *Dusicyon australis* trava over dei trelause slettene med ei einsam, streng ynde. Menneskelege jegerar ansåg denne unikt isolerte ulven som eit trofé verdt å jakte til utrydding, ein fatal tanke som kosta verda eit uerstatteleg rovdyr." }, { "scientific_name": "Neofelis nebulosa brachyura", "common_name": "Formosan Clouded Leopard", "iucn_status": "EX", "primary_cause": "Deforestation, hunting", "last_sighting_year": 1983, "region": "Taiwan", "wikipedia_url": "https://en.wikipedia.org/wiki/Formosan_clouded_leopard", "image_url": "archive_images/neofelis_nebulosa_brachyura.webp", "synopsis_en": "**A shy phantom of Taiwan's ancient, verdant forests**, *Neofelis nebulosa brachyura* vanished silently and completely, finally declared Extinct in 2013. Relentless deforestation and relentless unchecked hunting sealed its fate forever among cloud-kissed mountains.", "synopsis_nn": "**Eit sky fantom i Taiwans eldgamle, frodige skogar**, *Neofelis nebulosa brachyura* forsvann stille og fullstendig, endeleg erklært utrydda i 2013. Nådelaus avskoging og iherdig ukontrollert jakt forsegla lagnaden hennar for alltid blant dei skydekte fjella." }, { "scientific_name": "Franklinia alatamaha", "common_name": "Franklinia (extinct in wild)", "iucn_status": "EW", "primary_cause": "Unknown", "last_sighting_year": 1803, "region": "Georgia, USA", "wikipedia_url": "https://en.wikipedia.org/wiki/Franklinia", "image_url": "archive_images/franklinia_alatamaha.webp", "synopsis_en": "**A botanical vanishing act,** the exquisite Franklinia bowed out of the wild by the early 1800s with mysterious, unexplained grace. It vanished for completely unknown reasons, leaving only cultivated descendants and persistent mystery behind.", "synopsis_nn": "**Eit botanisk forsvinningsnummer,** den utsøkte Frankliniaen trekte seg ut av naturen tidleg på 1800-talet med mystisk, uforklarleg ynde. Ho forsvann av heilt ukjende grunnar, og etterlét seg berre dyrka etterkommarar og eit vedvarande mysterium." }, { "scientific_name": "Coregonus fera", "common_name": "Féra (Lake Geneva Whitefish)", "iucn_status": "EX", "primary_cause": "Overfishing, eutrophication", "last_sighting_year": 1920, "region": "Lake Geneva, Europe", "wikipedia_url": "https://en.wikipedia.org/wiki/Coregonus_fera", "image_url": "archive_images/coregonus_fera.webp", "synopsis_en": "**The elegant Féra, once a culinary jewel of Lake Geneva**, met its demise through relentless overfishing and progressively suffocating eutrophication. This distinctive, delicate whitefish vanished from European waters by the very turn of the 20th century.", "synopsis_nn": "**Den elegante Féraen, ein gong ein kulinarisk juvel i Genfersjøen**, møtte slutten sin gjennom nådelaust overfiske og stadig meir kvelande overgjødsling. Denne karakteristiske, delikate sikfisken forsvann frå europeiske farvatn heilt på byrjinga av 1900-talet." }, { "scientific_name": "Dicrogonatus gardineri", "common_name": "Gardiner's giant mite", "iucn_status": "EX", "primary_cause": "Habitat loss", "last_sighting_year": 1903, "region": "Seychelles", "wikipedia_url": "https://en.wikipedia.org/wiki/Gardiner%27s_giant_mite", "image_url": "generics/generic_arachnid.webp", "synopsis_en": "**The undisputed king of the leaf litter**, Gardiner's giant mite was a surprisingly hulking, delicate arachnid navigating vast hidden worlds within decaying flora. When its forest home suddenly vanished, it had nowhere left to perform its eternal forage.", "synopsis_nn": "**Den ubestridde kongen av vissent lauv**, Gardiners kjempemidd var eit overraskande ruvande, men delikat edderkoppdyr som navigerte i enorme, skjulte verder inne i rotnande vegetasjon. Då skogsheimen brått forsvann, hadde han ingen stad igjen å utføre den evige sankinga si." }, { "scientific_name": "Rheobatrachus silus", "common_name": "Gastric-brooding frog", "iucn_status": "EX", "primary_cause": "Disease (chytrid fungus)", "last_sighting_year": 1981, "region": "Australia", "wikipedia_url": "https://en.wikipedia.org/wiki/Gastric-brooding_frog", "image_url": "archive_images/rheobatrachus_silus.webp", "synopsis_en": "**A living digestive system repurposed for childcare**, *Rheobatrachus silus* harbored developing tadpoles within its own stomach before vomiting them into the wider world. A microscopic fungus silenced this most extraordinary and unprecedented evolutionary innovation forever.", "synopsis_nn": "**Eit levande fordøyingssystem ombygd for barnepass**, *Rheobatrachus silus* huste rumpetroll i utvikling i sin eigen mage før ho kasta dei opp i den store verda. Ein mikroskopisk sopp stilna denne høgst ekstraordinære og eineståande evolusjonære innovasjonen for alltid." }, { "scientific_name": "Cryptoprocta spelea", "common_name": "Giant Fossa", "iucn_status": "EX", "primary_cause": "Habitat destruction, human arrival", "last_sighting_year": 1400, "region": "Madagascar", "wikipedia_url": "https://en.wikipedia.org/wiki/Cryptoprocta_spelea", "image_url": "archive_images/cryptoprocta_spelea.webp", "synopsis_en": "**The colossal Cryptoprocta spelea**, a formidable apex predator of legend, once roamed Madagascar, dwarfing its modern living cousin with ease. Human arrival and systematic habitat destruction swiftly and relentlessly erased this magnificent predator from existence.", "synopsis_nn": "**Den kolossale Cryptoprocta spelea**, eit formidabelt legendarisk topprovdyr, streifa ein gong rundt på Madagaskar, og fekk sitt moderne levande søskenbarn til å verke knøttlite. Menneskeleg framkomst og systematisk habitatøydelegging viska raskt og nådelaust dette storslåtte rovdyret ut av eksistensen." }, { "scientific_name": "Pachylemur insignis", "common_name": "Giant Ruffed Lemur", "iucn_status": "EX", "primary_cause": "Hunting, habitat loss", "last_sighting_year": 1000, "region": "Madagascar", "wikipedia_url": "https://en.wikipedia.org/wiki/Pachylemur", "image_url": "archive_images/pachylemur_insignis.webp", "synopsis_en": "**The Giant Ruffed Lemur,** once a truly magnificent denizen of Madagascar's ancient, verdant forests, fell inexorably to relentless human hunting and progressive habitat loss. Now merely a grand, silent, haunting ghost of ecological erasure.", "synopsis_nn": "**Den store varien,** ein gong ein verkeleg praktfull innbyggjar i dei eldgamle, frodige skogane på Madagaskar, fall ubønhøyrleg for nådelaus menneskeleg jakt og progressivt tap av habitat. No berre eit storslått, stille, hjemsøkjande gjenferd av økologisk utsletting." }, { "scientific_name": "Archaeoindris fontoynontii", "common_name": "Giant Sloth Lemur", "iucn_status": "EX", "primary_cause": "Human colonization, hunting", "last_sighting_year": -350, "region": "Madagascar", "wikipedia_url": "https://en.wikipedia.org/wiki/Archaeoindris", "image_url": "archive_images/archaeoindris_fontoynontii.webp", "synopsis_en": "**The Giant Sloth Lemur,** *Archaeoindris fontoynontii*, weighed up to 200kg and lumbered deliberately through Madagascar's ancient, verdant forests. Its slow, ponderous nature and massive, imposing size proved fatally disadvantageous against determined human hunting.", "synopsis_nn": "**Kjmpedovendyrlemuren,** *Archaeoindris fontoynontii*, vog opp til 200 kg og tømra rørslene sine med hensikt gjennom dei eldgamle, frodige skogane på Madagaskar. Den treige, tunge naturen og den massive, ruvande storleiken viste seg å vere fatalt ufordelaktig mot målretta menneskeleg jakt." }, { "scientific_name": "Incilius periglenes", "common_name": "Golden toad", "iucn_status": "EX", "primary_cause": "Climate change, disease", "last_sighting_year": 1989, "region": "Costa Rica", "wikipedia_url": "https://en.wikipedia.org/wiki/Golden_toad", "image_url": "archive_images/incilius_periglenes.webp", "synopsis_en": "**Nature's fleeting Midas touch,** the Golden Toad was a dazzling two-inch beacon of pure brilliance in Costa Rica's misty, mystical cloud forest. Warming temperatures and an opportunistic microscopic fungus extinguished this incandescent amphibian completely.", "synopsis_nn": "**Naturens flyktige Midas-rørsle,** gullpadda var eit blendande, fem centimeter langt fyrtårn av rein glans i Costa Ricas tåkete, mystiske tåkeskog. Varmare temperaturar og ein opportunistisk mikroskopisk sopp sløkte denne glødande amfibien for godt." }, { "scientific_name": "Turdus ravidus", "common_name": "Grand Cayman thrush", "iucn_status": "EX", "primary_cause": "Habitat loss, hurricanes", "last_sighting_year": 1938, "region": "Grand Cayman", "wikipedia_url": "https://en.wikipedia.org/wiki/Grand_Cayman_thrush", "image_url": "archive_images/turdus_ravidus.webp", "synopsis_en": "**A tiny voice in a shrinking world**, the Grand Cayman thrush once graced its island home with quiet, unassuming charm and grace. Relentless habitat loss and increasingly devastating hurricanes systematically dismantled its fragile, isolated existence.", "synopsis_nn": "**Ei lita røyst i ei krympande verd**, Grand Cayman-trosten pryda ein gong øyheimen sin med stille, smålåten sjarm og ynde. Nådelaust tap av habitat og stadig meir øydeleggjande orkanar plukka den skjøre, isolerte eksistensen hennar systematisk frå kvarandre." }, { "scientific_name": "Coregonus hiemalis", "common_name": "Gravenche", "iucn_status": "EX", "primary_cause": "Overfishing, eutrophication", "last_sighting_year": 1950, "region": "Lake Geneva", "wikipedia_url": "https://en.wikipedia.org/wiki/Gravenche", "image_url": "archive_images/coregonus_hiemalis.webp", "synopsis_en": "**A delicate ghost of Geneva's deep,** the Gravenche was once famed for its tender, exquisitely delicate flesh and remarkable elusiveness. Insatiable human appetite and progressive eutrophication caught this fleeting, elusive fish in extinction's inexorable net.", "synopsis_nn": "**Eit delikat spøkelse i Genèves djup,** gravenchen var ein gong kjend for sitt møre, utsøkt delikate kjøt og merkverdige evne til å gøyme seg. Umetteleg menneskeleg appetitt og aukande overgjødsling fanga denne flyktige, unnvikande fisken i utryddinga sitt nådelause garn." }, { "scientific_name": "Pinguinus impennis", "common_name": "Great auk", "iucn_status": "EX", "primary_cause": "Hunting", "last_sighting_year": 1844, "region": "North Atlantic", "wikipedia_url": "https://en.wikipedia.org/wiki/Great_auk", "image_url": "archive_images/pinguinus_impennis.webp", "synopsis_en": "**A plump, unsuspecting target**, the Great Auk navigated icy northern waters with magnificent grace. Its flightless nature rendered it perfectly table-ready, and relentless human hunting swiftly brought complete extinction.", "synopsis_nn": "**Eit lubbe, inkjeanande mål**, geirfuglen navigerte iskalde nordlege farvatn med storslått ynde. Den flygelause naturen hennar gjorde den perfekt gryteklar, og nådelaus menneskeleg jakt førte raskt til fullstendig utrydding." }, { "scientific_name": "Caracara lutosa", "common_name": "Guadalupe caracara", "iucn_status": "EX", "primary_cause": "Hunting, poisoning", "last_sighting_year": 1903, "region": "Guadalupe Island", "wikipedia_url": "https://en.wikipedia.org/wiki/Guadalupe_caracara", "image_url": "archive_images/caracara_lutosa.webp", "synopsis_en": "**A diligent island scavenger deemed a nuisance**, the Guadalupe caracara once proudly owned its desolate volcanic domain. Resourceful settlers ended its reign decisively with rifles and poison, a brutal permanent solution.", "synopsis_nn": "**Eit flittig øyrovdyr avvist som eit skadedyr**, guadalupekarakaraen var ein gong ein stolt eigar av det aude vulkanske domenet sitt. Ressurssterke nybyggjarar gjorde rimeleg kjapt slutt på regimet hennar med rifle og gift, ei brutal og permanent løysing." }, { "scientific_name": "Myiagra freycineti", "common_name": "Guam flycatcher", "iucn_status": "EX", "primary_cause": "Brown tree snake", "last_sighting_year": 1983, "region": "Guam", "wikipedia_url": "https://en.wikipedia.org/wiki/Guam_flycatcher", "image_url": "archive_images/myiagra_freycineti.webp", "synopsis_en": "**A feathered, fleeting whisper**, the Guam flycatcher darted nimbly through verdant canopies, hunting insects with meticulous diligence. The invasive brown tree snake left the island's entire table completely empty.", "synopsis_nn": "**Eit fjørkledd, flyktig kvisker**, guamflugesnapparen pilte raskt gjennom dei frodige tretoppane og jakta insekt med pinleg nøyaktigdom. Den invaderande brune tresnoken la heile bordet på øya fullstendig audt." }, { "scientific_name": "Pteropus tokudae", "common_name": "Guam flying fox", "iucn_status": "EX", "primary_cause": "Hunting", "last_sighting_year": 1968, "region": "Guam", "wikipedia_url": "https://en.wikipedia.org/wiki/Guam_flying_fox", "image_url": "archive_images/pteropus_tokudae.webp", "synopsis_en": "**A discerning fruit connoisseur**, the Guam flying fox gracefully navigated moonlit canopies with elegant precision. Hunted relentlessly by locals by the late 1960s, it became merely another local delicacy.", "synopsis_nn": "**Ein kresen fruktkjennar**, guamfruktflaggermusa navigerte grasiøst gjennom måneskinsopplyste trekroner med elegant presisjon. Jakta nådelaust av dei fastbuande fram mot slutten av 1960-talet, og vart dermed berre endå ein lokal delikatesse." }, { "scientific_name": "Todiramphus cinnamominus", "common_name": "Guam kingfisher", "iucn_status": "EW", "primary_cause": "Brown tree snake", "last_sighting_year": 1988, "region": "Guam", "wikipedia_url": "https://en.wikipedia.org/wiki/Guam_kingfisher", "image_url": "archive_images/todiramphus_cinnamominus.webp", "synopsis_en": "**Once the unsuspecting apex of its tiny world**, the Guam kingfisher flashed cinnamon wings through the island's lush canopy. Its vibrant reign was curtailed by the silently slithering brown tree snake, an introduced species that transformed the entire ecosystem's vibrant chorus into haunting silence.", "synopsis_nn": "**Ein gong det inkjeanande topprovdyret i si vesle verd**, guamisfuglen blenkte med kanelbrune venger gjennom den frodige trekrona på øya. Det fargesprakande regimet hennar vart avkorta av den stille og smygande brune tresnoken, ein introdusert art som forvandla heile økosystemets livlege kor til eit hjemsøkjande stille." }, { "scientific_name": "Harpagornis moorei", "common_name": "Haast's Eagle", "iucn_status": "EX", "primary_cause": "Extinction of prey (moa), human hunting", "last_sighting_year": 1400, "region": "New Zealand", "wikipedia_url": "https://en.wikipedia.org/wiki/Haast%27s_eagle", "image_url": "archive_images/harpagornis_moorei.webp", "synopsis_en": "**Once the undisputed apex predator of New Zealand's skies**, Haast's Eagle commanded a wingspan that inspired both terror and awe in all creatures. Its spectacular reign was tragically intertwined with the flightless moa's extinction, leaving this magnificent raptor with nothing but an empty larder.", "synopsis_nn": "**Ein gong det ubestridde topprovdyret på himmelen over New Zealand**, haastørna hadde eit vengespenn som inngav både skrekk og ærefrykt hos alle skapningar. Det spektakulære regimet hennar var tragisk samanvove med utryddinga av den flygelause moaen, noko som etterlét denne storslåtte rovfuglen med inkje anna enn eit tomt matfat." }, { "scientific_name": "Hadropithecus stenognathus", "common_name": "Hadropithecus", "iucn_status": "EX", "primary_cause": "Hunting, habitat destruction", "last_sighting_year": 1000, "region": "Madagascar", "wikipedia_url": "https://en.wikipedia.org/wiki/Hadropithecus", "image_url": "archive_images/hadropithecus_stenognathus.webp", "synopsis_en": "**Hadropithecus stenognathus, a remarkable primate from Madagascar**, once roamed the island's ancient forests, showcasing unique terrestrial and arboreal adaptations. Relentless human hunting and devastating habitat destruction drove this fascinating creature to extinction, serving as a stark reminder of our ecological impact.", "synopsis_nn": "**Hadropithecus stenognathus, ein merkverdig primat frå Madagaskar**, streifa ein gong i dei eldgamle skogane på øya og viste fram unike tilpassingar for eit liv både på bakken og i trea. Nådelaus menneskeleg jakt og øydeleggjande tap av habitat dreiv denne fascinerande skapningen til utrydding, og tener som ei sterk påminning om vår økologiske påverknad." }, { "scientific_name": "Haplochromis arcanus", "common_name": "Haplochromis arcanus", "iucn_status": "EX", "primary_cause": "Nile perch introduction", "last_sighting_year": 1962, "region": "Lake Victoria", "wikipedia_url": "https://en.wikipedia.org/wiki/Haplochromis_arcanus", "image_url": "archive_images/haplochromis_arcanus.webp", "synopsis_en": "**A tiny flash of emerald green**, *Haplochromis arcanus* once danced through Lake Victoria's shallow waters, blissfully unaware of its impending doom. The introduced Nile perch's insatiable appetite swiftly turned the lake's vibrant ecosystem into a monochrome meal plan, leaving this charming cichlid extinct.", "synopsis_nn": "**Eit lite glimt av smaragdgrønt**, *Haplochromis arcanus* dansa ein gong gjennom det grunne vatnet i Victoriasjøen, lukkeleg uvitande om den komande undergangen sin. Den introduserte nilabborren sin umettelege appetitt forvandla raskt det livlege økosystemet i sjøen til ein einsfarga måltidsplan, og utrydda denne sjarmerande cikliden." }, { "scientific_name": "Haplochromis dentex", "common_name": "Haplochromis dentex", "iucn_status": "EX", "primary_cause": "Nile perch introduction", "last_sighting_year": 1985, "region": "Lake Victoria", "wikipedia_url": "https://en.wikipedia.org/wiki/Haplochromis_dentex", "image_url": "archive_images/haplochromis_dentex.webp", "synopsis_en": "**A shimmering jewel of Lake Victoria's diverse tapestry**, *Haplochromis dentex* once darted through the shallows, a testament to evolution's careful craft. Yet its fate was sealed by the voracious Nile perch, an unfortunate ecological disaster that swallowed this unassuming cichlid entirely by 1986.", "synopsis_nn": "**Ein glitrande juvel i Victoriasjøens mangfaldige billedvev**, *Haplochromis dentex* pilte ein gong gjennom grunnene, eit vitnesbyrd om evolusjonen sitt nitidige handverk. Likevel vart lagnaden hennar forsegla av den glupske nilabborren, ei uheldig økologisk katastrofe som slukte denne smålåtne cikliden heilt innan 1986." }, { "scientific_name": "Haplochromis longirostris", "common_name": "Haplochromis longirostris", "iucn_status": "EX", "primary_cause": "Nile perch introduction", "last_sighting_year": 1962, "region": "Lake Victoria", "wikipedia_url": "https://en.wikipedia.org/wiki/Haplochromis_longirostris", "image_url": "archive_images/haplochromis_longirostris.webp", "synopsis_en": "**Equipped with a nose for the finest aquatic morsels**, *Haplochromis longirostris* was once a quiet connoisseur of Lake Victoria's depths. It perfected a delicate existence, only to find itself becoming an inconveniently shaped snack for the voracious, introduced Nile perch that dominated the lake.", "synopsis_nn": "**Utstyrd med ei nase for dei finaste akvatiske godbitane**, var *Haplochromis longirostris* ein gong ein stille kjennar i djupet av Victoriasjøen. Han perfeksjonerte ein delikat eksistens, berre for å oppdage at han vart eit upraktisk forma mellommåltid for den glupske, introduserte nilabborren som dominerte sjøen." }, { "scientific_name": "Moxostoma lacerum", "common_name": "Harelip sucker", "iucn_status": "EX", "primary_cause": "Habitat loss, dams", "last_sighting_year": 1893, "region": "North America", "wikipedia_url": "https://en.wikipedia.org/wiki/Harelip_sucker", "image_url": "archive_images/moxostoma_lacerum.webp", "synopsis_en": "**Meet the Harelip Sucker, once a charming riverine vacuum cleaner**, whose distinctive mouth perfectly sifted algae from pristine Midwestern riverbeds. Silted habitats and obstructive dams literally choked its future, leaving this peculiar hoover but a ghost in the currents, a testament to human alteration.", "synopsis_nn": "**Møt harelipesugaren, ein gong ein sjarmerande støvsugar i elvane**, med ein særeigen munn som perfekt siktaalgar frå reine elvebotnar i Midtvesten. Tilsilting av habitat og hindrande dammar kvelte bokstavleg talt framtida hans, og etterlét denne pussige støvsugaren berre som eit spøkelse i straumane, eit vitnesbyrd om menneskeleg inngripen." }, { "scientific_name": "Corvus hawaiiensis", "common_name": "Hawaiian crow (ʻAlalā)", "iucn_status": "EW", "primary_cause": "Disease, habitat loss", "last_sighting_year": 2002, "region": "Hawaii", "wikipedia_url": "https://en.wikipedia.org/wiki/Hawaiian_crow", "image_url": "archive_images/corvus_hawaiiensis.webp", "synopsis_en": "**Hawaii's dark jester**, the 'Alalā was a trickster, tool-user, and the island's only remaining native crow in existence. It fell victim to avian malaria carried by introduced mosquitoes and the relentless vanishing of its forest home, leaving it to fade from the wild by 1980.", "synopsis_nn": "**Hawaiis mørke hoffnarr**, 'alalā var ein luring, verktøybrukar og den einaste gjenlevande innfødde kråka på øya. Ho vart offer for fuglemalaria boren av introduserte myggar og den nådelause forsvinninga av skogsheimen hennar, noko som fekk henne til å falme frå naturen innan 1980." }, { "scientific_name": "Zapornia sandwichensis", "common_name": "Hawaiian rail", "iucn_status": "EX", "primary_cause": "Invasive species", "last_sighting_year": 1884, "region": "Hawaii", "wikipedia_url": "https://en.wikipedia.org/wiki/Hawaiian_rail", "image_url": "archive_images/zapornia_sandwichensis.webp", "synopsis_en": "**A charmingly flightless flutterer of the Hawaiian undergrowth**, *Zapornia sandwichensis* was the epitome of island bliss, happily pecking seeds and insects. Invasive mammals with an appetite for eggs and defenseless prey overwhelmed this perfectly adapted ground-dweller, causing its swift disappearance by 1884.", "synopsis_nn": "**Ein sjarmerande, flygelaus flaksar i den hawaiiske underskogen**, *Zapornia sandwichensis* var sjølve biletet på øylukke, der ho lukkeleg hakka i seg frø og insekt. Invaderande pattedyr med appetitt på egg og forsvarslause byttedyr overvelda denne perfekt tilpassa bakkebuaren, og forårsaka den raske forsvinninga hennar innan 1884." }, { "scientific_name": "Drepanis pacifica", "common_name": "Hawaiʻi mamo", "iucn_status": "EX", "primary_cause": "Hunting, habitat loss", "last_sighting_year": 1898, "region": "Hawaii", "wikipedia_url": "https://en.wikipedia.org/wiki/Hawaii_mamo", "image_url": "archive_images/drepanis_pacifica.webp", "synopsis_en": "**The ultimate fashion accessory of ancient Hawaiʻi**, the Hawaiʻi mamo's dazzling yellow feathers were coveted for royal cloaks and sacred leis of the islands. Hunted relentlessly and stripped of its forest home, this living goldmine vanished by 1898, a casualty of human greed.", "synopsis_nn": "**Det ultimate motetilbehøyret i det gamle Hawaiʻi**, dei blendande gule fjølene til hawaii-mamoen var ettertrakta for kongelege kapper og heilage leis på øyane. Jakta nådelaust og fråstole skogsheimen sin, forsvann denne levande gullgruva innan 1898, eit offer for menneskeleg grådigheit." }, { "scientific_name": "Moho nobilis", "common_name": "Hawaiʻi ʻōʻō", "iucn_status": "EX", "primary_cause": "Habitat loss, disease", "last_sighting_year": 1934, "region": "Hawaii", "wikipedia_url": "https://en.wikipedia.org/wiki/Hawaiʻi_ʻōʻō", "image_url": "archive_images/moho_nobilis.webp", "synopsis_en": "**The golden voice of Hawaiʻi**, the ʻōʻō sang its last serenade not long after humans arrived on the islands. Forest clearing for livestock and mosquito-borne diseases overwhelmed this magnificent crooner whose melodious calls once defined the island dawn in living memory.", "synopsis_nn": "**Den gylne røysta på Hawaiʻi**, ʻōʻō-en song sin siste serenade kort tid etter at menneska kom til øyane. Skogrydding for husdyr og myggborne sjukdomar overvelda denne storslåtte smørsongaren, som med sine melodiøse rop ein gong definerte morgongryet på øya i manns minne." }, { "scientific_name": "Fregilupus varius", "common_name": "Hoopoe starling", "iucn_status": "EX", "primary_cause": "Hunting, habitat loss", "last_sighting_year": 1837, "region": "Réunion", "wikipedia_url": "https://en.wikipedia.org/wiki/Hoopoe_starling", "image_url": "archive_images/fregilupus_varius.webp", "synopsis_en": "**The dapper darling of Réunion's forests**, *Fregilupus varius* once flitted through the canopy with vibrant existence. Human appetites and axes cleared its island home relentlessly, snuffing out this charming bird whose only crime was existing beautifully in the wrong place and time.", "synopsis_nn": "**Den flotte yndlingen i skogane på Réunion**, *Fregilupus varius* flaksa ein gong gjennom trekrona med eit livleg nærvær. Menneskeleg appetitt og økser rydda øyheimen hennar nådelaust, og sløkte livet til denne sjarmerande fuglen som hadde som sin einaste brotsverk å eksistere vakkert på feil stad til feil tid." }, { "scientific_name": "Heteralocha acutirostris", "common_name": "Huia", "iucn_status": "EX", "primary_cause": "Hunting, habitat loss", "last_sighting_year": 1907, "region": "New Zealand", "wikipedia_url": "https://en.wikipedia.org/wiki/Huia", "image_url": "archive_images/heteralocha_acutirostris.webp", "synopsis_en": "**With a beak for every occasion**, the Huia, New Zealand's dapper darling, graced forests with unique dimorphism and artistry. Hunted for coveted tail feathers and dispossessed of its primeval forest home, this marvel left behind only taxidermied echoes of its existence.", "synopsis_nn": "**Med eit nebb for eikvar anledning**, pryda huiaen, New Zealands flotte yndling, skogane med unik dimorfisme og kunstferdigheit. Jakta for ettertrakta halefjører og fordriven frå sin urskogsheim, etterlét dette underverket seg berre utstoppa ekko av sin eigen eksistens." }, { "scientific_name": "Homo sapiens", "common_name": "Human", "iucn_status": "LC", "primary_cause": null, "last_sighting_year": null, "region": null, "wikipedia_url": "https://en.wikipedia.org/wiki/Human", "image_url": "human_extinction.png", "synopsis_en": "The last hominid standing. *Homo sapiens* brainy, bipedal, and relentlessly self-mythologizing outlasted every rival primate through cooperative violence, abstract language, and remarkable self-deception. It then applied its dominance to the systematic dismantling of planetary systems. Cause of extinction: itself.", "synopsis_nn": "Den siste hominiden som står igjen. *Homo sapiens* – glup, tobient og nådelaust sjølv-mytologiserande – overlevde kven som helst rivaliserande primatar gjennom samarbeidande vald, abstrakt språk og merkverdig sjølvbedrag. Deretter brukte han dominansen sin til systematisk nedmontering av planetariske system. Årsak til utrydding: seg sjølv.", "extra_narrative_en": ["**Quaternary Extinction Event**: The original planetary purge. This event served as Sapiens's brutal audition tape for apex predator status, wherein they systematically depopulated every continent of its most impressively large and slow-to-reproduce residents. The mammoth, the giant ground sloth, the saber-tooth — all reduced from magnificent beasts to inconveniently sized dinner by a species proving its superior capacity for casual, global-scale slaughter.", "**6th Extinction**: This event, currently in production, is the crowning achievement of Sapiens exceptionalism: a species-wide, ego-driven liquidation of planetary biodiversity, as chronicled in Elizabeth Kolbert's *The Sixth Extinction*. While previous mass extinctions required cosmic inconvenience (meteors, vulcanism), the Sixth is a DIY project, driven purely by the insatiable appetite of a single primate for real estate, concrete, and petrochemical combustion. It is the efficient, self-congratulatory erasure of everything that gets in the way.", "**Climate Change**: A reckless, species-wide experiment in atmospheric self-immolation. Climate change is the logical endgame of Sapiens's central neurosis: a short-term, fossil-fuel-addicted hedonism that prioritizes immediate vehicular gratification over planetary stability. It is the ultimate expression of entitlement, where the atmosphere itself is treated as a free, infinite dumpster for the exhaust fumes of competitive economic dominance.", "**Humanity is a weapon of mass destruction**, its appetites fundamentally incompatible with the delicate homeostasis of the biosphere. The drive for endless economic expansion on a finite planet ensures that Homo sapiens operates not as an integrated ecological participant, but as a terminal planetary pathogen.", "**Nuclear War**: The ultimate, self-inflicted thermal reset. This potentiality represents the pinnacle of Sapiens's territorial psychosis, where the species parlayed its mastery of physics into a global suicide pact. Beyond the initial kinetic erasure, the resulting nuclear winter poses a catastrophic extinction risk, as soot-choked skies collapse global agriculture and plunge the survivors into a multi-year, sub-zero famine — a final, frozen punctuation mark on the human experiment."], "extra_narrative_nn": ["**Kvartær utrydding**: Den opphavlege planetariske reinsinga. Denne hendinga tente som Sapiens si brutale audition for status som topprovdyr, der dei systematisk avfolka kvart kontinent for sine mest imponerande store og seint-reproduserande bebuarar. Mammuten, det gigantiske bakkesløvdyret, sabeltannkatten — alle reduserte frå praktfulle dyr til upraktisk store middagar av ein art som beviste sin overlegne kapasitet for tilfeldig slakt i global skala.", "**Den sjette utryddinga**: Denne hendinga, som no er under produksjon, er krona på verket for Sapiens sin eksepsjonalisme: ei artsomfattande, egodriven likvidering av planetarisk biologisk mangfald, som skildra i Elizabeth Kolbert si bok *The Sixth Extinction*. Medan tidlegare masseutryddingar kravde kosmiske ulemper (meteorar, vulkanisme), er den sjette eit gjer-det-sjølv-prosjekt, drive reint av den umettelege lysta til ein enkelt primat etter eigedom, betong og petrokjemisk forbrenning.", "**Klimaendringar**: Eit uvørde, artsomfattande eksperiment i atmosfærisk sjølvpåtenning. Klimaendringar er det logiske sluttpunktet for Sapiens sin sentrale nevrose: ein kortsiktig, fossilbrennstoff-avhengig hedonisme som prioriterer umiddelbar køyretøy-tilfredsstilling over planetarisk stabilitet. Det er det ultimate uttrykket for rettskjensle, der sjølve atmosfæren vert behandla som ein gratis, uendeleg søppelplass for eksosgassane frå konkurrerande økonomisk dominans.", "**Menneskeheita er eit masseøydeleggingsvåpen**, der appetitten hennar er grunnleggjande uforeinleg med den skjøre balansen i biosfæren. Drivkrafta for uendeleg økonomisk utviding på ein endeleg planet sikrar at Homo sapiens ik
