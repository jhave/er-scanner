 world slowly, absurdly, siphoned away until there was no puddle left to call home. Imagine the tragic irony: vanishing not with a bang, but a wistful, bone-dry sigh.","synopsis_nn":"**Eit sprett av ørkentross**, Parras-tannkarpen (*Cyprinodon latifasciatus*) vart ikkje slukt av monster eller utsletta av meteorittar. Denne modige vesle symjaren fann verda si sakte, absurd, tømd bort til det ikkje var nokon pytt å kalle heim lenger. Tenk deg den tragiske ironien: den forsvann ikkje med eit smell, men eit vemodig, knusktørt sukk."},{"scientific_name":"Partula langfordi","common_name":"Partula langfordi","iucn_status":"EX","primary_cause":"Predatory snail","last_sighting_year":1992,"region":"French Polynesia","wikipedia_url":"https://en.wikipedia.org/wiki/Partula_langfordi","image_url":"archive_images/partula_langfordi.webp","synopsis_en":"**A humble denizen of Pacific fronds**, *Partula langfordi* once drifted through its arboreal existence, a gentle grazer among the leaves. Its unhurried world, however, was violently upended by a relentless, shell-drilling invader—another snail, a predatory cousin, a gastronomic ghoul. The irony? This delicate beauty was itself devoured by the very thing it resembled, a testament to the brutal, absurd theatre of ecological collapse.","synopsis_nn":"**Ein audmjuk innbyggjar av stillehavsbregnar**, *Partula langfordi* dreiv ein gong gjennom sin trelevande eksistens, ein varsam beitar blant blada. Den rolege verda hennar vart likevel valdeleg snudd på hovudet av ein nådelaus, skaldrillande inntrengjar – ei anna snigel, ein rovgrisk fetter, eit gastronomisk uhyre. Ironien? Denne skjøre skapningen vart sjølv fortært av det same som ho likna, eit vitnesbyrd om det brutale, absurde teateret av økologisk kollaps."},{"scientific_name":"Partula turgida","common_name":"Partula turgida","iucn_status":"EX","primary_cause":"Predatory snail introduction","last_sighting_year":1996,"region":"French Polynesia","wikipedia_url":"https://en.wikipedia.org/wiki/Partula_turgida","image_url":"archive_images/partula_turgida.webp","synopsis_en":"**A delicate, unassuming decorator of Tahitian leaves**, *Partula turgida* once grazed peacefully, unaware that its perfectly evolved shell would become a gourmet treat for a bio-control gone terribly wrong. Introduced to curb another invasive snail, the predatory Rosy Wolf Snail instead found this gentle native to be a far more delectable, and tragically easy, meal. Now, only whispers remain of its brief, beautiful existence, a testament to humanity's best intentions and worst outcomes.","synopsis_nn":"**Ein sart, beskjeden dekoratør av tahitiske blad**, *Partula turgida* beita ein gong fredeleg, uvitande om at det perfekt utvikla skalet deira ville bli ei gourmetoppleving for ein biologisk kontroll som gjekk frykteleg gale. Introdusert for å stagge ein annan invasiv snigel, fann den rovdyr-aktige Rosy Wolf Snail i staden denne milde innfødde arten som eit langt meir velsmakande, og tragisk enkelt, måltid. No er det berre kviskring att av den korte, vakre eksistensen deira, eit vitnesbyrd om menneskelegheita sine beste intensjonar og verste utfall."},{"scientific_name":"Ectopistes migratorius","common_name":"Passenger pigeon","iucn_status":"EX","primary_cause":"Hunting, habitat loss","last_sighting_year":1914,"region":"North America","wikipedia_url":"https://en.wikipedia.org/wiki/Passenger_pigeon","image_url":"archive_images/ectopistes_migratorius.webp","synopsis_en":"**A billion beats of a broken heart**, the Passenger Pigeon once blotted out the sun, a living, squawking testament to nature's boundless extravagance. So numerous were they, we hunted them for sport, for food, for pure, unadulterated hubris, while simultaneously dismantling their ancient forest homes. From endless flocks to utterly nothing in mere decades—a masterful trick of disappearance, performed by us, for us, leaving only silence.","synopsis_nn":"**Ein milliard slag av eit knust hjarte**, vandredueva skugga ein gong for sola, eit levande, skrålande vitnesbyrd om naturens grenselause overdåd. Dei var så mange at vi jakta på dei for sport, for mat, for rein, uforfalska hybris, samstundes som vi reiv ned dei eldgamle skogheimen deira. Frå endelause flokkar til absolutt ingenting på berre få tiår – eit meisterleg forsvinningsnummer, utført av oss, for oss, som berre etterlet stille."},{"scientific_name":"Notropis orca","common_name":"Phantom shiner","iucn_status":"EX","primary_cause":"Dams, habitat loss","last_sighting_year":1975,"region":"North America","wikipedia_url":"https://en.wikipedia.org/wiki/Phantom_shiner","image_url":"archive_images/notropis_orca.webp","synopsis_en":"**A spectral shimmer in the currents**, the Phantom Shiner (*Notropis orca*) once danced through the rivers of the American Southwest, a tiny, vibrant life. Its disappearance, however, wasn't a mysterious vanish but a mundane tragedy: its intricate world was systematically choked and fragmented by the relentless march of dams and habitat loss. Now, only the chilling irony of its common name remains, a permanent ghost in a landscape reshaped by human hands.","synopsis_nn":"**Eit spektralt glimt i straumane**, dansa spøkelsesglimmeren (*Notropis orca*) ein gong gjennom elvene i det amerikanske sørvesten, eit lite, levande liv. Forsvinninga hennar var derimot ikkje ei mystisk forsvinning, men ein kvardagsleg tragedie: den intrikate verda hennar vart systematisk kvelt og fragmentert av den nådelause frammarsjen av demningar og tap av habitat. No er det berre den isnande ironien i det folkelege namnet som står att, eit permanent spøkelse i eit landskap omforma av menneskelege hender."},{"scientific_name":"Chaeropus ecaudatus","common_name":"Pig-footed bandicoot","iucn_status":"EX","primary_cause":"Predation, habitat loss","last_sighting_year":1950,"region":"Australia","wikipedia_url":"https://en.wikipedia.org/wiki/Pig-footed_bandicoot","image_url":"archive_images/chaeropus_ecaudatus.webp","synopsis_en":"**A daintily doomed digger**, the Pig-footed bandicoot once tiptoed through the Australian outback on impossibly slender, hoof-like feet, a true marvel of specialized evolution. This solitary sprite, built for evasion, met its end not by ancient predators it knew, but by voracious newcomers and the relentless churn of plows turning its meticulously curated habitat into pasture. By the 1950s, this unique marsupial had ironically danced its last, vanishing with a quiet, melancholic shrug from the world stage.","synopsis_nn":"**Ein yndefullt dømd gravar**, Grisefotbandikooten trippa ein gong gjennom den australske villmarka på umogleg slanke, hovliknande føter, eit sant under av spesialisert evolusjon. Dette einslege vesenet, bygd for unnviking, møtte sin ende ikkje av gamle rovdyr den kjende, men av glupske nykomarar og den ubøyelege pløyinga som gjorde det nøye stelte habitatet om til beitemark. Innan 1950-åra hadde dette unike pungdyret ironisk nok dansa sin siste dans, og forsvann med eit stille, melankolsk skuldertrekk frå verdsscena."},{"scientific_name":"Chelonoidis abingdonii","common_name":"Pinta giant tortoise","iucn_status":"EX","primary_cause":"Hunting, invasive species","last_sighting_year":2012,"region":"Galápagos","wikipedia_url":"https://en.wikipedia.org/wiki/Pinta_Island_tortoise","image_url":"archive_images/chelonoidis_abingdonii.webp","synopsis_en":"**The ultimate slow-food connoisseur**, the Pinta giant tortoise *Chelonoidis abingdonii* was a master of unhurried island life, evolving an impressive longevity only to have it repurposed as convenient, live ship's protein. Its ancient patience, which had outlasted countless epochs, proved hilariously unequipped for the rapid-fire assault of invasive goats munching its future, and rats pilfering its past. A truly leisurely end to a truly leisurely existence.","synopsis_nn":"**Den ultimate slow-food-kjennaren**, Pinta-kjempeskilpadda *Chelonoidis abingdonii* var ein meister i eit roleg øyliv, og utvikla ei imponerande lang levetid berre for å bli omgjort til praktisk, levande proviant om bord på skip. Det eldgamle tolmodet hennar, som hadde overlevd utallege epokar, viste seg komisk dårleg rusta for det lynraske angrepet frå invaderande geiter som beita vekk framtida, og rotter som stal frå fortida hennar. Ein verkeleg makleg slutt på ei verkeleg makleg tilvære."},{"scientific_name":"Melamprosops phaeosoma","common_name":"Poo-uli","iucn_status":"EX","primary_cause":"Disease, habitat loss, invasive species","last_sighting_year":2004,"region":"Hawaii","wikipedia_url":"https://en.wikipedia.org/wiki/Poo-uli","image_url":"archive_images/melamprosops_phaeosoma.webp","synopsis_en":"**A shy connoisseur of forest snails**, the Poo-uli tried its best to remain an enigma, even as its world became a tragic stage. Disease, habitat loss, and cunning invasive species formed an unholy trinity, orchestrating its swift and unceremonious exit from the Hawaiian fauna. A final, silent bow for a creature whose only crime was existing in a landscape too fragile for its own good.","synopsis_nn":"**Ein sjenert kjenner av skogsniglar**, forsøkte Poo-uli sitt beste for å forbli eit mysterium, sjølv då verda hans vart ein tragisk scene. Sjukdom, tap av habitat og utspekulerte framande artar danna ein uheilag treeining, og orkestrerte den raske og useremonielle avgangen frå den hawaiiske faunaen. Ein siste, stille buk for ei skapning der den einaste brotsverket var å eksistere i eit landskap for skjørt for sitt eige beste."},{"scientific_name":"Nesophontes edithae","common_name":"Puerto Rican nesophontes","iucn_status":"EX","primary_cause":"Invasive species","last_sighting_year":1500,"region":"Puerto Rico","wikipedia_url":"https://en.wikipedia.org/wiki/Puerto_Rican_nesophontes","image_url":"archive_images/nesophontes_edithae.webp","synopsis_en":"**A most unfortunate meal**, the Puerto Rican nesophontes, a charming insectivore, scurried through its island home, utterly unprepared for the ships laden with doom heading its way. Perfectly evolved for a life of gentle obscurity, its tiny defenses proved no match for the ravenous appetites of newly introduced rats, mongooses, and cats. Now, only its bones whisper a melancholic jest about how swiftly paradise can unravel.","synopsis_nn":"**Eit svært uheldig måltid**, den puertorikanske nesophontesen, eit sjarmerande insektetande dyr, fór omkring i øyheimen sin, fullstendig uførebudd på skipa fulle av undergang som var på veg. Perfekt utvikla for eit liv i stillferdig obskuritet, var dei små forsvarsverka deira ingen match for den glupske appetitten til nyinnførte rottar, mangustar og kattar. No er det berre knoklane deira som kviskrar ein melankolsk spøk om kor fort paradis kan rakne."},{"scientific_name":"Capra pyrenaica pyrenaica","common_name":"Pyrenean Ibex","iucn_status":"EX","primary_cause":"Hunting, competition with livestock","last_sighting_year":2000,"region":"Spain, France","wikipedia_url":"https://en.wikipedia.org/wiki/Pyrenean_ibex","image_url":"archive_images/capra_pyrenaica_pyrenaica.webp","synopsis_en":"**The Pyrenean Ibex,** *Capra pyrenaica pyrenaica*, achieved the dubious distinction of becoming the first species officially de-extincted then re-extincted, before its final disappearance in 2000. This magnificent wild goat, once roaming the high peaks of Spain and France, was driven to its ultimate demise by relentless hunting pressures and fierce competition from burgeoning livestock populations. Its legacy serves as a sharp reminder that sometimes, even our best intentions arrive far too late for nature's masterpieces.","synopsis_nn":"**Pyreneisk steinbukk,** *Capra pyrenaica pyrenaica*, oppnådde den tvilsame æra å bli den første arten som offisielt vart av-utrydda for så å bli utrydda att, før den endelege forsvinninga i 2000. Denne storslåtte villgeita, som ein gong streifa rundt på dei høge toppane i Spania og Frankrike, vart driven mot sin endelege undergang av nådelaus jakt og hard konkurranse frå stadig aukande husdyrpopulasjonar. Arven etter den er ei skarp påminning om at sjølv våre beste intensjonar nokre gonger kjem altfor seint for naturens meisterverk."},{"scientific_name":"Elaphurus davidianus","common_name":"Père David's deer","iucn_status":"EW","primary_cause":"Hunting, habitat loss","last_sighting_year":1939,"region":"China","wikipedia_url":"https://en.wikipedia.org/wiki/Père_David%27s_deer","image_url":"archive_images/elaphurus_davidianus.webp","synopsis_en":"**The Père David's Deer: Proof that unique charm and wetland wisdom are no match for human appetite and sprawling concrete.** This peculiar creature, with its distinctive antlers and webbed hooves, gracefully navigated China's ancient wetlands for millennia. Yet, the hunter's arrow and farming's relentless march squeezed its wild populations to oblivion, leaving a poignant, almost absurd legacy: its entire species' future resting solely on a handful of zoo specimens.","synopsis_nn":"**Père David-hjorten: Eit prov på at unikt særpreg og våtmarksvit ikkje er ei match for menneskeleg grådigskap og utbreidd betong.** Dette særeigne dyret, med sitt særprega gevir og svømmehudføter, navigerte grasiøst Kinas eldgamle våtmarker i tusenår. Likevel pressa jegerens pil og jordbrukets nådelause frammarsj dei ville populasjonane til utsletting, og etterlét seg ei gripande, nesten absurd arv: heile artens framtid kvila utelukkande på ei handfull dyrehageeksemplar."},{"scientific_name":"Equus quagga quagga","common_name":"Quagga","iucn_status":"EX","primary_cause":"Hunting","last_sighting_year":1883,"region":"South Africa","wikipedia_url":"https://en.wikipedia.org/wiki/Quagga","image_url":"archive_images/equus_quagga_quagga.webp","synopsis_en":"**Nature's half-hearted zebra**, the Quagga once roamed South African plains, a peculiar equine with stripes that dramatically faded mid-body. Hunted with a rather overzealous human enthusiasm, its unique hide and convenient presence proved an irresistible target for eradication. The last individual faded from existence in 1883, leaving behind only stuffed specimens and a darkly ironic legacy: 'We found it, we shot it, now it's gone.'","synopsis_nn":"**Natura si halvhjarta sebra**, quaggaen streifa ein gong dei sør-afrikanske slettene, ein spesiell hesteart med striper som dramatisk bleikna midt på kroppen. Jakta med ein heller overivrig menneskeleg entusiasme, gjorde den unike huda og det beleilige nærværet den til eit uimotståeleg mål for utrydding. Det siste individet bleikna ut av eksistens i 1883, og etterlét berre utstoppa eksemplar og ei mørkt ironisk arv: 'Vi fann den, vi skaut den, no er den borte.'"},{"scientific_name":"Gazella bilkis","common_name":"Queen of Sheba's gazelle","iucn_status":"EX","primary_cause":"Hunting","last_sighting_year":1951,"region":"Yemen","wikipedia_url":"https://en.wikipedia.org/wiki/Queen_of_Sheba%27s_gazelle","image_url":"archive_images/gazella_bilkis.webp","synopsis_en":"**A fleeting whisper of the desert wind**, the Gazella bilkis, or Queen of Sheba's gazelle, once graced the Arabian peninsula with unparalleled elegance. Its lithe form and delicate horns, symbols of untamed beauty, ironically sealed its melancholic doom, becoming the ultimate, exquisitely tragic trophy for an eager hunter. Apparently, not even a queen's namesake could outrun a well-aimed spear.","synopsis_nn":"**Ein flyktig kviskring frå ørkenvinden**, Gazella bilkis, eller Dronninga av Saba si gaselle, pryda ein gong den arabiske halvøya med eineståande eleganse. Den slanke skapnaden og dei delikate horna, symbol på vill venleik, forsegla ironisk nok den melankolske undergangen hennar, og vart det ultimate, utsøkt tragiske trofeet for ein ivrig jeger. Tydeligvis kunne ikkje eingong namnet til ei dronning springe frå eit veltreffa spyd."},{"scientific_name":"Partula faba","common_name":"Raiatea Partula Tree Snail","iucn_status":"EW","primary_cause":"Introduced predatory snails","last_sighting_year":null,"region":"Raiatea, French Polynesia","wikipedia_url":"https://en.wikipedia.org/wiki/Partula_faba","image_url":"archive_images/partula_faba.webp","synopsis_en":"**The Raiatea Partula Tree Snail**, once a delicate jewel of French Polynesia's forests, now exists only within the confines of human care. This vibrant mollusc, *Partula faba*, fell prey to the relentless appetite of introduced predatory snails, a tragic testament to ecological carelessness. Its wild legacy, erased by the very species meant to control others, serves as a stark reminder of biodiversity's fragility.","synopsis_nn":"**Raiatea-partulasneglen**, ein gong ein skjer ein juvel i skogane i Fransk Polynesia, finst no berre innanfor grensene av menneskeleg omsorg. Denne livfulle blautdyret, *Partula faba*, vart eit offer for den nådelause appetitten til introduserte rovsniglar, eit tragisk vitnesbyrd om økologisk uaktsamheit. Den ville arven, utsletta av dei same artane som skulle kontrollere andre, fungerer som ei skarp påminning om skjørleiken til biologisk mangfald."},{"scientific_name":"Aphanapteryx bonasia","common_name":"Red rail","iucn_status":"EX","primary_cause":"Hunting, invasive species","last_sighting_year":1693,"region":"Mauritius","wikipedia_url":"https://en.wikipedia.org/wiki/Red_rail","image_url":"archive_images/aphanapteryx_bonasia.webp","synopsis_en":"**Mauritius's most inconveniently delicious bird**, the Red rail was a flightless, crimson curiosity, utterly unequipped for the complexities of colonial human interaction. Its trusting nature and succulent flesh, a tragic culinary delight, made it an easy target for hunters and a fatal victim of the invasive rats and pigs that sealed its melancholy, swift exit from Earth's stage.","synopsis_nn":"**Mauritius's mest ubeleilegleg deilige fugl**, raudrikse var ei flygeløyse, karmosinraud kuriositet, totalt uførebudd på kompleksiteten av kolonial menneskeleg interaksjon. Den tillitsfulle naturen og det saftige kjøttet, ei tragisk kulinarisk glede, gjorde den til eit lett bytte for jegerar og eit fatalt offer for dei invaderande rottene og grisene som forsegla den melankolske, raske avgangen frå jordas scene."},{"scientific_name":"Cryptonanus ignitus","common_name":"Red-bellied gracile opossum","iucn_status":"EX","primary_cause":"Habitat loss","last_sighting_year":1962,"region":"Argentina","wikipedia_url":"https://en.wikipedia.org/wiki/Red-bellied_gracile_opossum","image_url":"archive_images/cryptonanus_ignitus.webp","synopsis_en":"**This lithe, red-bellied phantom**, *Cryptonanus ignitus*, was once a whisper in the disappearing forests of South America. So agile and discreet, it ironically vanished without a trace, not through some dramatic hunt, but simply because its very world—its stage, its larder, its bedroom—was unceremoniously dismantled around it. A tragic disappearing act performed not by choice, but by the relentless, lumbering advance of 'progress'.","synopsis_nn":"**Dette spinkle, raudbukka fantomet**, *Cryptonanus ignitus*, var ein gong eit kvisk i dei forsvinnande skogane i Sør-Amerika. Så smidig og diskret, forsvann det ironisk nok sporlaust, ikkje gjennom ei dramatisk jakt, men rett og slett fordi sjølve verda – scenen, matfatet, soverommet – vart usermonielt demontert rundt det. Ei tragisk forsvinningsakt utført ikkje av eige val, men av den nådelause, klumpete framveksten av 'framsteg'."},{"scientific_name":"Melanoplus spretus","common_name":"Rocky Mountain locust","iucn_status":"EX","primary_cause":"Agriculture","last_sighting_year":1902,"region":"North America","wikipedia_url":"https://en.wikipedia.org/wiki/Rocky_Mountain_locust","image_url":"archive_images/melanoplus_spretus.webp","synopsis_en":"**The continent's greatest organic combine,** *Melanoplus spretus* once darkened skies, its legendary swarms a terrifying testament to an insatiable appetite for North American agriculture. Yet, the very settler crops that fueled its unimaginable numbers also proved its undoing; human farming practices ultimately consumed the riverine breeding grounds of this epic pest, vanishing it into an unprecedented ecological void.","synopsis_nn":"**Kontinentets største organiske treskjemaskin,** *Melanoplus spretus* mørkla ein gong himmelen, dei legendariske svermane eit skremmande vitnesbyrd om ei umetteleg matlyst på nordamerikansk landbruk. Men dei same nybyggjaravlingane som næra dei ufattelege tala, vart òg deira bane; menneskelege jordbrukspraksisar slukte til slutt hekkestadane langs elvene, og fekk dette episke skadeinsekta til å forsvinne inn i eit økologisk tomrom utan sidestykke."},{"scientific_name":"Cylindraspis triserrata","common_name":"Rodrigues domed tortoise","iucn_status":"EX","primary_cause":"Hunting","last_sighting_year":1795,"region":"Rodrigues","wikipedia_url":"https://en.wikipedia.org/wiki/Cylindraspis_triserrata","image_url":"archive_images/cylindraspis_triserrata.webp","synopsis_en":"**A ponderous island gourmand**, *Cylindraspis triserrata* waddled through life, blissfully unaware its succulent flesh and docile nature were its gravest weaknesses. This magnificent Rodrigues domed tortoise, a creature of slow grace and grand design, found its very abundance and defenselessness ironically delicious to hungry human visitors. Hunted with casual efficiency, its extinction became a tragically comedic testament to the fatal allure of an easy meal.","synopsis_nn":"**Ein tungvint øygourmet**, *Cylindraspis triserrata* vaggande gjennom livet, lukkeleg uvitande om at det saftige kjøtet og den føyelege naturen var dei største svakheitene hennar. Denne storslåtte Rodrigues-skjelpadda, ei skapning av sein ynde og storslått design, fann sin eigen overflod og forsvarsløyse ironisk nok deilig for svoltne menneskelege vitjande. Jaga med uformell effektivitet, blei utryddinga hennar eit tragisk komisk vitnesbyrd om den fatale lokkinga av eit enkelt måltid."},{"scientific_name":"Phelsuma gigas","common_name":"Rodrigues Giant Day Gecko","iucn_status":"EX","primary_cause":"Deforestation, introduced predators","last_sighting_year":1842,"region":"Rodrigues, Mauritius","wikipedia_url":"https://en.wikipedia.org/wiki/Phelsuma_gigas","image_url":"archive_images/phelsuma_gigas.webp","synopsis_en":"**A colossal jewel of Rodrigues**, the Phelsuma gigas once graced the Mauritian island with its impressive size and vibrant hues. This magnificent gecko, a prime example of island gigantism, met its unfortunate end due to the dual pressures of rampant deforestation and the relentless jaws of introduced predators. Its extinction serves as a stark, albeit familiar, tale of paradise lost.","synopsis_nn":"**Ein kolossal juvel frå Rodrigues**, Phelsuma gigas pryda ein gong den mauritiske øya med sin imponerande storleik og livfulle fargar. Denne storslåtte gekkoen, eit framifrå døme på øygigantisme, møtte sin uheldige skjebne grunna det doble presset frå omfattande avskoging og dei nådelause kjevene til innførte rovdyr. Utryddinga er ei skarp, om enn velkjend, forteljing om eit tapt paradis."},{"scientific_name":"Cylindraspis peltastes","common_name":"Rodrigues giant tortoise","iucn_status":"EX","primary_cause":"Hunting","last_sighting_year":1795,"region":"Rodrigues","wikipedia_url":"https://en.wikipedia.org/wiki/Cylindraspis_peltastes","image_url":"archive_images/cylindraspis_peltastes.webp","synopsis_en":"**A primeval vegetarian with an architectural shell**, *Cylindraspis peltastes* once lumbered across Rodrigues, a living monument to evolutionary slowness. Its unfortunate 'slow and steady' philosophy, perfect for grazing, made it ludicrously easy prey for hungry sailors, who simply flipped these gentle giants onto their backs for future feasts. Sadly, such effortless sustenance proved their undoing, extinguishing their ancient lineage within mere centuries, leaving behind only bones and a stark lesson in human appetite.","synopsis_nn":"**Ein urtidig vegetarianar med eit arkitektonisk skal**, *Cylindraspis peltastes* vralta ein gong over Rodrigues, eit levande monument over evolusjonær tregleik. Den uheldige 'sakte og sikker'-filosofien, perfekt for beiting, gjorde han til eit latterleg enkelt bytte for svoltne sjømenn, som berre velta desse rolege kjempene over på ryggen for framtidige festmåltid. Slik uanstrengt føde viste seg diverre å bli undergangen deira, og sløkte ut den gamle slekta deira i løpet av berre få hundreår, og etterlét seg berre bein og ei grell lekse om menneskeleg appetitt."},{"scientific_name":"Pezophaps solitaria","common_name":"Rodrigues solitaire","iucn_status":"EX","primary_cause":"Hunting, invasive species","last_sighting_year":1778,"region":"Rodrigues","wikipedia_url":"https://en.wikipedia.org/wiki/Rodrigues_solitaire","image_url":"archive_images/pezophaps_solitaria.webp","synopsis_en":"Rodrigues' plump enigma, this flightless pigeon perfected the art of ground-dwelling life in splendid isolation, likely tasting quite good in the process. Unfortunately, its leisurely pace and delectable disposition were no match for hungry sailors seeking an easy meal, nor for the cunning introduced predators who found its eggs and chicks an irresistible buffet. By the late 18th century, it was gone, a melancholic monument to humanity's hearty appetite and the devastating efficiency of its unwitting biological entourage.","synopsis_nn":"Rodrigues' fyldige gåte, denne flygeudyktige dua perfeksjonerte kunsten å leve på bakken i strålande isolasjon, og smakte sannsynlegvis ganske godt i prosessen. Diverre var den maklege farten og den velsmakande lynnet ikkje nokon match for svoltne sjømenn på jakt etter eit lett måltid, og heller ikkje for dei utspekulerte innførte rovdyra som fann egga og ungane dens ein uimotståeleg buffet. Mot slutten av 1700-talet var den borte, eit melankolsk monument over menneskets hjartelege appetitt og den øydeleggjande effektiviteten til det utilsikta biologiske følgjet."},{"scientific_name":"Bolyeria multocarinata","common_name":"Round Island burrowing boa","iucn_status":"EX","primary_cause":"Habitat loss, invasive species","last_sighting_year":1975,"region":"Round Island","wikipedia_url":"https://en.wikipedia.org/wiki/Round_Island_burrowing_boa","image_url":"archive_images/bolyeria_multocarinata.webp","synopsis_en":"**A charmingly unique ribbon of scales**, the Round Island burrowing boa (Bolyeria multocarinata) once thrived by discreetly tunneling through its tiny island home. Its mastery of subterranean life, however, proved no match for the surface world's most aggressive invaders: goats, rabbits, and other uninvited guests who devoured its haven, ironically sealing the fate of a species that seldom saw the light of day. A testament to how even the most reclusive marvels can vanish without so much as a final, ironic hiss.","synopsis_nn":"**Eit sjarmerande unikt skjellband**, Bolyeria multocarinata – rundøya-graveboaen – levde ein gong eit diskret liv, djupt nede i sin vesle øyheim. Ironisk nok kom trusselen frå overflata, då inntrengande geiter og kaninar slukte leveområdet og selde skjebnen til ein art som sjeldan såg dagslys. Eit stussleg vitnesbyrd om korleis sjølv dei mest tilbaketrekte underverka kan forsvinne, ikkje med eit brøl, men eit resignert, ironisk hves."},{"scientific_name":"Cylindraspis indica","common_name":"Réunion giant tortoise","iucn_status":"EX","primary_cause":"Hunting","last_sighting_year":1840,"region":"Réunion","wikipedia_url":"https://en.wikipedia.org/wiki/Réunion_giant_tortoise","image_url":"archive_images/cylindraspis_indica.webp","synopsis_en":"**The ultimate slow-food experience,** the Réunion giant tortoise once ambled across its island paradise, a patient, leafy feast. Unbeknownst to these placid herbivores, their ample size and succulent meat made them a sailor's living larder, easily hunted to oblivion. They had no idea they were being savored into extinction, leaving behind only the melancholic irony of their doomed deliciousness.","synopsis_nn":"**Den ultimate «sakte-mat»-opplevinga,** kjempeskilpadda på Réunion makka seg ein gong over øyparadiset sitt, eit tolmodig, grønt festmåltid. Utan at desse rolege planteetarane visste det, gjorde den store storleiken og det saftige kjøttet deira dei til eit levande matlager for sjømenn, lett jakta til gløymsle. Dei ante ikkje at dei vart nøyte til utrydding, og etterlét seg berre den melankolske ironien av den dømde herlegheita si."},{"scientific_name":"Raphus solitarius, Threskiornis solitarius","common_name":"Réunion Ibis","iucn_status":"EX","primary_cause":"Introduced predators, hunting","last_sighting_year":null,"region":"Réunion","wikipedia_url":"https://en.wikipedia.org/wiki/R%C3%A9union_ibis","image_url":"archive_images/raphus_solitarius.webp","synopsis_en":"**The enigmatic Réunion Ibis**, once a curious inhabitant of its namesake island, vanished with a rather predictable finality. Unprepared for the swift arrival of human hunters and their accompanying suite of introduced predators, this flightless wonder quickly succumbed to an imbalance it could neither comprehend nor evade. Its extinction serves as a stark, if somewhat repetitive, tale of paradise lost to progress.","synopsis_nn":"**Den gåtefulle Réunionibisen**, ein gong ein nysgjerrig innbyggjar på øya si, forsvann med ein heller føreseieleg ende. Uførebudd på den raske ankomsten av menneskelege jegerar og det følgjande utvalet av introduserte rovdyr, bukka dette flygelause underverket raskt under for ei ubalanse det korkje kunne forstå eller unngå. Utryddinga hennar tener som ei naken, om enn noko repetitiv, forteljing om eit paradis tapt for framsteg."},{"scientific_name":"Smilodon fatalis","common_name":"Saber-tooth tiger","iucn_status":"EX","primary_cause":"Climate change, decline of megafauna prey, possible human hunting","last_sighting_year":null,"region":"North America","wikipedia_url":null,"image_url":"archive_images/smilodon_fatalis.webp","synopsis_en":"**A seven-inch orthodontic overachiever**, the Saber-tooth tiger dominated the Pleistocene by specializing in bringing down towering, slow-moving megafauna that simply no longer exist. As their sluggish buffets shifted out of evolutionary fashion due to human gluttony and changing temperatures, these lithe predators ironically found themselves starved by their own hyper-specialized weaponry—the apex of an ecosystem that vanished right beneath their paws.","synopsis_nn":"**Ein sju tommars kjeveortopedisk overprestisjemakar**, sabeltanntigeren dominerte pleistocen ved å spesialisere seg på å felle diger, treig megafauna som rett og slett ikkje lenger eksisterer. Då dei ruvande buffetane deira vart umoderne av di menneskejakta og temperaturane endra seg, vart desse smidige rovdyra ironisk nok sveltestraffa for sine eigne hyperspesialiserte våpen — toppen av eit økosystem som forsvann rett under potane deira."},{"scientific_name":"Cylindraspis vosmaeri","common_name":"Saddle-backed Mauritius tortoise","iucn_status":"EX","primary_cause":"Hunting","last_sighting_year":1795,"region":"Rodrigues","wikipedia_url":"https://en.wikipedia.org/wiki/Cylindraspis_vosmaeri","image_url":"archive_images/cylindraspis_vosmaeri.webp","synopsis_en":"**A ponderous, plant-powered snack**, the Saddle-backed Mauritius tortoise lumbered through its island paradise for millennia, perfectly adapted to a life of leisurely grazing and growing. Its incredible longevity, massive size, and docile nature, which should have been evolutionary triumphs, ironically rendered it a tragic bounty for hungry sailors and early settlers, who found it a convenient, self-preserving larder. Too slow to flee and too delicious to ignore, its very advantages sealed its fate, leaving only bones and a hollow space where a gentle giant once roamed.","synopsis_nn":"**Ein seig, plantefôra godbit**, subba skjelpadda Cylindraspis vosmaeri gjennom sitt øyparadis i tusenår, perfekt tilpassa eit liv med roleg beiting og vekst. Den utrulege levetida, den enorme storleiken og det milde vesenet, som burde ha vore evolusjonære triumfar, gjorde den ironisk nok til eit tragisk bytte for svoltne sjømenn og tidlege nybyggjarar, som fann den ein praktisk, sjølvkonserverande matkiste. For langsam til å flykte og for velsmakande til å ignorere, forsegla sjølve fordelane dens skjebnen, og etterlét berre bein og eit tomt rom der ein mjuk kjempe ein gong streifa."},{"scientific_name":"Labidura herculeana","common_name":"Saint Helena giant earwig","iucn_status":"EX","primary_cause":"Habitat loss, invasive species","last_sighting_year":1967,"region":"Saint Helena","wikipedia_url":"https://en.wikipedia.org/wiki/Saint_Helena_earwig","image_url":"archive_images/labidura_herculeana.webp","synopsis_en":"**The undisputed heavyweight champion of creepy-crawlies**, *Labidura herculeana* once ruled Saint Helena's leaf litter, a colossal earwig capable of making lesser arthropods quake. Alas, this magnificent monster met its absurdly quiet end, not in a gladiatorial epic, but as its ancient forests crumbled and invasive predators, like hungry rats, turned its island kingdom into a forgotten buffet.","synopsis_nn":"**Den ubestridde tungvektsmeisteren blant krypa**, *Labidura herculeana* herska ein gong over lauvfallet på St. Helena, eit kolossalt saksedyr som kunne få mindre leddyr til å skjelva. Akk, dette storslåtte monsteret møtte si absurd stille endelikt, ikkje i eit storslått gladiatorepos, men då dei eldgamle skogane forsvann og invasive rovdyr, som svoltne rottar, gjorde øyriket deira om til ein gløymd buffé."},{"scientific_name":"Upupa antaios","common_name":"Saint Helena Hoopoe","iucn_status":"EX","primary_cause":"Introduced predators, habitat loss","last_sighting_year":1550,"region":"Saint Helena","wikipedia_url":"https://en.wikipedia.org/wiki/Saint_Helena_hoopoe","image_url":"archive_images/upupa_antaios.webp","synopsis_en":"**The Saint Helena Hoopoe, a magnificent but ultimately doomed flightless avian of its isolated island home, became a stark casualty of colonial expansion.** Unprepared for the onslaught of introduced predators and extensive habitat loss, *Upupa antaios* now exists only as fossil remnants, a poignant testament to the fragility of unique island ecosystems. Its extinction serves as a grim marker in the archive of human ecological impact.","synopsis_nn":"**Sankt Helena-hoopoen, ein storslått, men til slutt skjebnesvanger flygeudyktig fugl frå den isolerte øyheimen sin, vart eit brutalt offer for kolonial ekspansjon.** Uførebudd på åtaket frå innførte predatorar og omfattande tap av habitat, finst *Upupa antaios* no berre som fossile restar, eit gripande vitnesbyrd om sårbarheita til unike økosystem på øyar. Utryddinga hennar fungerer som eit dystert merke i arkivet over menneskeleg økologisk påverknad."},{"scientific_name":"Nesiota elliptica","common_name":"Saint Helena olive","iucn_status":"EX","primary_cause":"Habitat loss, invasive species","last_sighting_year":2003,"region":"Saint Helena","wikipedia_url":"https://en.wikipedia.org/wiki/Saint_Helena_olive","image_url":"archive_images/nesiota_elliptica.webp","synopsis_en":"**A botanical wallflower**, the Saint Helena olive (Nesiota elliptica) preferred its privacy, a trait that proved tragically inconvenient. Its secluded island home, once a sanctuary, quickly became a crowded party thrown by invasive species and relentless habitat conversion. By 2003, it had performed its final, unwitting disappearing act—a testament to how easily even the quietest among us can be edged off the stage.","synopsis_nn":"**Ein botanisk veggblomst**, St. Helena-oliventreet (Nesiota elliptica) føretrekte privatlivet sitt, ei eigenskap som viste seg å vere tragisk upraktisk. Den avsidesliggjande øyheimen hennar, ein gong ei heilagdom, vart raskt eit overfylt selskap arrangert av invaderande artar og omsynslaus habitatomforming. Innan 2003 hadde det utført si siste, uvitande forsvinningsakt – eit vitnesbyrd om kor lett sjølv dei stillaste blant oss kan bli skuva ut av scenen."},{"scientific_name":"Pyrocephalus dubius","common_name":"San Cristóbal flycatcher","iucn_status":"EX","primary_cause":"Invasive species","last_sighting_year":1987,"region":"Galápagos","wikipedia_url":"https://en.wikipedia.org/wiki/San_Cristóbal_flycatcher","image_url":"archive_images/pyrocephalus_dubius.webp","synopsis_en":"**A fiery spirit in miniature**, the San Cristóbal flycatcher brought a splash of vermilion joy to its island home. Yet, this vibrant dash of life proved tragically fragile; its bold plumage and agile hunting skills were utterly useless against the creeping tide of non-native species that devoured its eggs, its young, and eventually, its very presence. A dubious victory for the invaders, a definitive loss for paradise.","synopsis_nn":"**Ein eldrande ånd i miniatyr**, gav san cristóbal-flugesnapparen eit sprut av raudfargeglede til øyheimen sin. Likevel viste denne livlege flekken seg å vere tragisk skrøpeleg; den dristige fjørdrakta og dei smidige jaktferdigheitene var heilt ubrukelege mot den snikande bølgja av framande artar som slukte egga, ungane og til slutt sjølve eksistensen. Ein tvilsam siger for inntrengjarane, eit endeleg tap for paradiset."},{"scientific_name":"Gambusia georgei","common_name":"San Marcos gambusia","iucn_status":"EX","primary_cause":"Hybridization, habitat loss","last_sighting_year":1983,"region":"Texas, USA","wikipedia_url":"https://en.wikipedia.org/wiki/San_Marcos_gambusia","image_url":"archive_images/gambusia_georgei.webp","synopsis_en":"**A casualty of ill-fated romance**, the San Marcos gambusia had its distinctive charm (and genes) diluted into oblivion, perhaps too readily embracing \"diversity\" with its more robust, invasive cousins. Its shrinking, pristine spring home, simultaneously paved over by our progress, offered no refuge from this double-edged sword of passion and destruction, leaving behind only the ghost of a truly unique little fish.","synopsis_nn":"**Ein skade av ulukkeleg romanse**, fekk San Marcos-gambusia sin særeigne sjarm (og gen) utvatna til gløymsle, kanskje for lett omfamnande «mangfald» med sine meir robuste, invaderande syskenbarn. Den krympande, urørte kjeldeheimen sin, samstundes asfaltert av framsteget vårt, gav ingen tilflukt frå dette tveegga sverdet av lidenskap og øydelegging, og etterlèt berre spøkelset av ein verkeleg unik liten fisk."},{"scientific_name":"Prolagus sardus","common_name":"Sardinian pika","iucn_status":"EX","primary_cause":"Hunting, invasive species","last_sighting_year":1774,"region":"Sardinia/Corsica","wikipedia_url":"https://en.wikipedia.org/wiki/Sardinian_pika","image_url":"archive_images/prolagus_sardus.webp","synopsis_en":"**Sardinia's most wanted snack**, the Sardinian pika, *Prolagus sardus*, once bounced across its namesake island, seemingly invincible to the ebb and flow of time. Its millennia-long reign met an abrupt, darkly comical end, outmaneuvered not by the island's ancient rhythms, but by the insatiable appetites of newly arrived humans and the hungry claws of their introduced companions. A quiet disappearing act, courtesy of a species too tasty and too vulnerable for its own good.","synopsis_nn":"**Sardinia si mest ettertrakta snask**, sardinsk pika, *Prolagus sardus*, spretta ein gong over si namngjevne øy, tilsynelatande uovervinneleg mot tidas flo og fjære. Det tusenårige herredømet møtte ein brå, mørkt komisk slutt, utmanøvrert ikkje av øyas eldgamle rytmar, men av dei umettelege appetittane til nykomne menneske og dei svoltne klørne til deira introduserte følgjesveinar. Ein stille forsvinningsakt, med takk til ein art som var for velsmakande og for sårbar for sitt eige beste."},{"scientific_name":"Rucervus schomburgki","common_name":"Schomburgk's deer","iucn_status":"EX","primary_cause":"Hunting, habitat loss","last_sighting_year":1938,"region":"Thailand","wikipedia_url":"https://en.wikipedia.org/wiki/Schomburgk%27s_deer","image_url":"archive_images/rucervus_schomburgki.webp","synopsis_en":"**Antlered phantom of the Thai swamps**, this magnificent Schomburgk's deer once graced the wetlands, a spectacle of branching beauty. Its unique rack, however, proved fatally attractive; coveted by hunters and squeezed by relentless habitat destruction, it vanished into history before the turn of the 20th century. A creature too distinctive for its own good, it now exists solely as a cautionary tale and a few melancholic taxidermied stares.","synopsis_nn":"**Grevete sump-fantom frå Thailand**, denne storslåtte Schomburgk-hjorten dansa ein gong elegant gjennom våtmarkene, eit syn av forgreina venleik. Men det unike geviret vart diverre fatalt tiltrekkjande; ettertrakta av jegerar og klemd av ustoppeleg øydelegging av habitat, forsvann det inn i historia før 1900-talet. Eit vesen for særprega for sitt eige beste, eksisterer det no berre som ei åtvarande forteljing og nokre få melankolske utstoppa blikk."},{"scientific_name":"Oryx dammah","common_name":"Scimitar-horned oryx","iucn_status":"EW","primary_cause":"Hunting, habitat loss","last_sighting_year":2000,"region":"North Africa","wikipedia_url":"https://en.wikipedia.org/wiki/Scimitar-horned_oryx","image_url":"archive_images/oryx_dammah.webp","synopsis_en":"**A creature of shimmering mirages and lethal elegance**, the Scimitar-horned oryx, *Oryx dammah*, once graced the Sahara with horns like perfectly curved sabers. Ironically, these very natural weapons offered no parry against the modern hunter's bullet, nor could its nomadic lifestyle escape the relentless advance of concrete and crops. Extinct in the wild, this desert icon now exists as a bittersweet whisper—a testament to our peculiar knack for admiring beauty right out of existence.","synopsis_nn":"**Ein skapning av skimrande luftspeglingar og dødeleg eleganse**, sabeloryxen (*Oryx dammah*) pryda ein gong Sahara med horn som perfekt krumme sablar. Ironisk nok kunne desse naturlege våpna ikkje parere mot kulene til den moderne jegeren, og den nomadiske livsstilen deira rømde heller ikkje den nådelause frammarsjen av betong og avlingar. Utrydda i det fri, eksisterer dette ørkenikonet no som ein bittersøt kviskring – eit vitnesbyrd om vår særeigne evne til å beundre skjønnheit heilt ut av eksistens."},{"scientific_name":"Neogale macrodon","common_name":"Sea mink","iucn_status":"EX","primary_cause":"Fur hunting","last_sighting_year":1894,"region":"North America","wikipedia_url":"https://en.wikipedia.org/wiki/Sea_mink","image_url":"archive_images/neogale_macrodon.webp","synopsis_en":"**A pelt of unparalleled allure**, the Sea Mink (Neogale macrodon) once danced through North Atlantic waters, a sleek, agile hunter perfectly adapted to coastal life. Its luxuriously thick, dark fur, once its greatest asset, became its ultimate undoing – a fatal fashion statement coveted so fiercely by humans that not a single wild specimen survived the relentless pursuit. Today, only a handful of fragmented bones whisper tales of a creature loved to death, a stark monument to vanity and voracity.","synopsis_nn":"**Ei pels av uovertruffen forlokking**, Havminken (Neogale macrodon) dansa ein gong gjennom nordatlantiske farvatn, ein glatt, smidig jeger perfekt tilpassa kystlivet. Den luksuriøst tjukke, mørke pelsen, ein gong dens største føremon, vart dens endelege fall – ein fatal motestatement så begjæra av menneske at ikkje eitt einaste vilt eksemplar overlevde den nådelause jakta. I dag hviskar berre ei handfull fragmenterte bein forteljingar om ei skapning elska til døde, eit skarpt monument over forfengelegheit og griskheit."},{"scientific_name":"Taudactylus acutirostris","common_name":"Sharp-snouted day frog","iucn_status":"EX","primary_cause":"Disease (chytrid fungus)","last_sighting_year":1997,"region":"Australia","wikipedia_url":"https://en.wikipedia.org/wiki/Taudactylus_acutirostris","image_url":"archive_images/taudactylus_acutirostris.webp","synopsis_en":"**A pocket-sized virtuoso of the wet tropics**, the Sharp-snouted day frog once darted through Australian streams with vibrant, unassuming grace. Yet, its energetic symphony was abruptly silenced, not by a grand predator, but by a microscopic, fungal curtain call: the chytrid fungus. It's a darkly comedic irony that this tiny, defenceless creature was extinguished by a pathogen so small, proving that sometimes, the most profound tragedies arrive on the quietest feet.","synopsis_nn":"**Ein lommestor virtuos i dei våte tropane**, Spissnuta dagfrosk pilte ein gong gjennom australske bekker med levande, beskjeden ynde. Likevel vart den energiske symfonien brått stilna, ikkje av eit stort rovdyr, men av eit mikroskopisk, soppbasert teppefall: chytridsoppen. Det er ein mørkt komisk ironi at dette vesle, forsvarslause vesenet vart sløkt av ein så liten patogen, som beviser at dei mest djuploddande tragediane stundom kjem på dei stillaste føtene."},{"scientific_name":"Silphium","common_name":"Silphium","iucn_status":"EX","primary_cause":"Overharvesting, desertification","last_sighting_year":-50,"region":"Cyrenaica (Libya)","wikipedia_url":"https://en.wikipedia.org/wiki/Silphium","image_url":"archive_images/silphium.webp","synopsis_en":"**Silphium, the legendary plant of ancient Cyrenaica**, once fueled an empire and its economy with its versatile sap, used for everything from medicine to contraception. Unfortunately, its very desirability proved its undoing; relentless overharvesting, exacerbated by encroaching desertification, slowly but surely culled every last specimen. Today, this ancient marvel exists only in coins and texts, a bittersweet testament to human short-sightedness and the ephemeral nature of even the most coveted natural resources.","synopsis_nn":"**Silphium, den legendariske planten frå det antikke Kyrenaika**, dreiv ein gong eit imperium og økonomien deira med den allsidige safta si, brukt til alt frå medisin til prevensjon. Dessverre blei sjølve etterspurnaden dens undergang; ubønnhørleg overhausting, forsterka av ørkenspreiing, kutta sakte, men sikkert ned kvart einaste eksemplar. I dag finst dette eldgamle underverket berre på myntar og i tekstar, eit bittersøtt vitnesbyrd om menneskeleg kortsyntheit og den flyktige naturen til sjølv dei mest ettertrakta naturressursane."},{"scientific_name":"Salvelinus agassizii","common_name":"Silver trout","iucn_status":"EX","primary_cause":"Invasive species","last_sighting_year":1930,"region":"New Hampshire","wikipedia_url":"https://en.wikipedia.org/wiki/Silver_trout","image_url":"archive_images/salvelinus_agassizii.webp","synopsis_en":"**Once, a glimmering resident of pristine glacial lakes**, the Silver Trout (<i>Salvelinus agassizii</i>) held court with an ethereal grace. Tragically, its unique sparkle was snuffed out by the arrival of *enthusiastic new neighbours*—invasive fish species who found its tranquil home a surprisingly convenient buffet, outcompeting it into melancholic oblivion. A true local legend, casually eaten out of existence.","synopsis_nn":"**Ein gong, ein glimrande innbyggjar i urørte bresjøar**, heldt sølvrauda (<i>Salvelinus agassizii</i>) hoff med ei eterisk nåde. Tragisk nok vart den unike gnisten hennar sløkt av framande, *altfor ivrige naboar* – invasive fiskeartar som fann den rolege heimen hennar som eit overraskande enkelt matfat, og konkurrerte ho ut til melankolsk gløymsle. Ei sann lokal legende, tilfeldigvis spist ut av eksistens."},{"scientific_name":"Numenius tenuirostris","common_name":"Slender-billed curlew","iucn_status":"EX","primary_cause":"Habitat loss, hunting","last_sighting_year":1995,"region":"Europe/N. Africa","wikipedia_url":"https://en.wikipedia.org/wiki/Slender-billed_curlew","image_url":"archive_images/numenius_tenuirostris.webp","synopsis_en":"**A whisper in the reeds**, the Slender-billed Curlew once probed European and Asian wetlands with its impossibly delicate bill, a creature of unassuming grace. Its tragic disappearing act? Not a grand predator, but the slow, methodical draining of its dining rooms and the surprisingly efficient aim of a few hungry hunters. So much for evolutionary finesse against a lead pellet.","synopsis_nn":"**Eit kviskring i sivet**, smalnebbspova søkte ein gong i våtmarker i Europa og Asia med det umogeleg skjøre nebbet sitt, ei skapning av uansement eleganse. Den tragiske forsvinningsakta hennar? Ikkje eit mektig rovdyr, men den langsame, metodiske tømminga av matsalane hennar og det overraskande effektive siktemålet til nokre få svoltne jegerar. Så mykje for evolusjonær finesse mot ei blyhagl."},{"scientific_name":"Quiscalus palustris","common_name":"Slender-billed grackle","iucn_status":"EX","primary_cause":"Habitat loss","last_sighting_year":1910,"region":"Mexico","wikipedia_url":"https://en.wikipedia.org/wiki/Slender-billed_grackle","image_url":"archive_images/quiscalus_palustris.webp","synopsis_en":"**A creature so perfectly attuned to its reedy domain**, the slender-billed grackle once wove its life into the vibrant tapestry of Mexico's marshes. Tragically, its very mastery became its undoing; as these essential wetlands vanished, so too did this lithe, iridescent marvel, leaving behind only the ghost of a song.","synopsis_nn":"**Eit skapning så perfekt tilpassa sitt sivkledde rike**, den smalnebba grackle vov ein gong livet sitt inn i den livfulle vevnaden av Mexicos myrar. Tragisk nok vart sjølve meisterskapen dens undergang; då desse livsviktige våtmarkene forsvann, forsvann òg dette lette, iriserande underet, og etterlét berre eit spøkelse av ein song."},{"scientific_name":"Pteropus subniger","common_name":"Small Mauritian flying fox","iucn_status":"EX","primary_cause":"Hunting, deforestation","last_sighting_year":1864,"region":"Mauritius","wikipedia_url":"https://en.wikipedia.org/wiki/Small_Mauritian_flying_fox","image_url":"archive_images/pteropus_subniger.webp","synopsis_en":"**A midnight mango maven**, the Small Mauritian flying fox (Pteropus subniger) once danced through the island's fruiting trees, a creature of elegant purpose. Yet, its disappearance wasn't due to cosmic irony, but the more mundane appetites of humans, who first craved its delicate wings for dinner, then bulldozed its entire larder, proving even the most nimble can't escape a hungry, unthinking world.","synopsis_nn":"**Ei midnatts mangomeister**, den vesle mauritiske flygehunden (Pteropus subniger) dansa ein gong gjennom øyas frukttre, ei skapning med elegant føremål. Men forsvinninga hennar kom ikkje av kosmisk ironi, men dei meir prosaiske appetittane til menneska, som først trådde etter dei delikate vengene hennar til middag, og deretter jamna heile matlageret hennar med jorda, som beviste at sjølv dei mest smidige ikkje kan unnsleppe ei svolten, ubetenksam verd."},{"scientific_name":"Zenaida graysoni","common_name":"Socorro dove","iucn_status":"EW","primary_cause":"Invasive species, hunting","last_sighting_year":1972,"region":"Mexico","wikipedia_url":"https://en.wikipedia.org/wiki/Socorro_dove","image_url":"archive_images/zenaida_graysoni.webp","synopsis_en":"**Socorro's trusting earth-trotter**, the Zenaida graysoni had a simple island life, completely unprepared for foreign felines. Its gentle, ground-dwelling habits, once a perfect adaptation, became a deadly liability as feral cats arrived, turning its peaceful foraging into a final, fur-lined meal. A few casual hunters merely ensured this charming dove's swift exit from existence, leaving only echoes in the island breeze.","synopsis_nn":"**Socorro sin godtruande bakkevandrar**, Zenaida graysoni levde eit enkelt øyliv, heilt uførberedt på framande kattedyr. Dei milde, bakkelevande vanane hennar, som ein gong var ei perfekt tilpassing, vart ei dødeleg ulempe då villkattar kom og gjorde den fredelege beitinga hennar om til eit siste, pelsfôra måltid. Nokre tilfeldige jegerar sikra berre denne sjarmerande dua sin raske avgang frå tilværet, og etterlét berre ekko i øyvinden."},{"scientific_name":"Sophora toromiro","common_name":"Sophora toromiro","iucn_status":"EW","primary_cause":"Deforestation","last_sighting_year":1960,"region":"Easter Island","wikipedia_url":"https://en.wikipedia.org/wiki/Sophora_toromiro","image_url":"archive_images/sophora_toromiro.webp","synopsis_en":"**A humble little tree, once a sturdy fixture on a distant isle,** the Sophora toromiro's greatest crime was simply being wood in a world hell-bent on clearing its forests. Its ironic demise wasn't by some grand ecological upheaval, but by the relentless, quiet advance of the axe, leaving behind only the ghostly whispers of its green legacy.","synopsis_nn":"**Eit audmjukt lite tre, ein gong eit traust innslag på ei fjern øy,** var Sophora toromiro si største synd berre å vera tre i ei verd som var fast bestemt på å rydde skogane sine. Den ironiske undergangen kom ikkje av ei stor økologisk omvelting, men av den nådelause, stille frammarsjen til øksa, som etterlet seg berre dei spøkelsesaktige kviskringane av sin grøne arv."},{"scientific_name":"Dinornis robustus","common_name":"South Island Giant Moa","iucn_status":"EX","primary_cause":"Human hunting","last_sighting_year":1445,"region":"New Zealand","wikipedia_url":"https://en.wikipedia.org/wiki/South_Island_giant_moa","image_url":"archive_images/dinornis_robustus.webp","synopsis_en":"**Once the undisputed giants of New Zealand's ancient forests**, the South Island Giant Moa (Dinornis robustus) stood nearly four meters tall, a flightless behemoth whose reign lasted millennia. Their eventual demise, however, was swift and brutal, precipitated by the arrival of human hunters who, ironically, found these magnificent birds too slow for their own good. A stark testament to humanity's early and devastating impact on pristine ecosystems.","synopsis_nn":"**Ein gong dei ubestridde gigantane i New Zealands eldgamle skogar**, stod den sørlege kjempe-moaen (Dinornis robustus) nesten fire meter høg, ein flygelaus kjempe der styret varte i tusenår. Men deira endelege fall var raskt og brutalt, framskynda av ankomsten av menneskelege jegerar som, ironisk nok, fann desse praktfulle fuglane for treige for sitt eige beste. Eit skarpt vitnesbyrd om menneskets tidlege og øydeleggjande innverknad på urørte økosystem."},{"scientific_name":"Turnagra capensis","common_name":"South Island piopio","iucn_status":"EX","primary_cause":"Invasive species","last_sighting_year":1963,"region":"New Zealand","wikipedia_url":"https://en.wikipedia.org/wiki/South_Island_piopio","image_url":"archive_images/turnagra_capensis.webp","synopsis_en":"**A velvet-voiced forest phantom**, the South Island piopio once graced New Zealand's undergrowth with its complex, melodic calls. Yet, this unique avian delight was ultimately outmaneuvered not by a grand natural drama, but by the relentless, all-too-common hunger of introduced rats and stoats. Its vibrant song faded into a silence utterly devoid of irony, a tragic, small-scale apocalypse delivered by the mundane.","synopsis_nn":"**Ein fløyelsstemd skogsånd**, pryda sørøya-piopioen ein gong New Zealands undervekst med sine intrikate, melodiøse songar. Men denne unike fugleskatten vart til slutt utmanøvrert, ikkje av eit storslått naturdrama, men av den nådelause, altfor vanlege appetitten til innførte rotter og røyskattar. Den livfulle songen dens falma bort i ei stille heilt fri for ironi, ein tragisk, småskala apokalypse levert av det banale."},{"scientific_name":"Perameles notina","common_name":"Southeastern striped bandicoot","iucn_status":"EX","primary_cause":"Predation, habitat loss","last_sighting_year":1890,"region":"Australia","wikipedia_url":"https://en.wikipedia.org/wiki/Perameles_notina","image_url":"archive_images/perameles_notina.webp","synopsis_en":"**A pocket-sized blur of stripes and snuffles**, *Perameles notina* once danced through the southeastern scrub, a charming, if slightly neurotic, nocturnal forager. Its nimble evasions, honed over millennia, proved tragically inadequate against the claws of imported predators, while its cherished, cozy habitat vanished beneath a tide of human 'progress'. This spirited little bandicoot ultimately found itself outmaneuvered by a world it simply wasn't designed to survive.","synopsis_nn":"**Eit lommeformat slør av striper og snøft**, *Perameles notina* dansa ein gong gjennom buskasen i søraust, ein sjarmerande, om enn litt nevrotisk, nattleg sanker. Dei smidige unnsleppingane hennar, finslipte gjennom tusenår, viste seg tragisk utilstrekkelege mot klørne til importerte rovdyr, medan det kjære, koselege leveområdet hennar forsvann under ei flodbølgje av menneskeleg 'framsteg'. Denne livlege vesle punggrevlingen fann til slutt seg sjølv overlista av ei verd den rett og slett ikkje var skapt for å overleve i."},{"scientific_name":"Phalacrocorax perspicillatus","common_name":"Spectacled cormorant","iucn_status":"EX","primary_cause":"Hunting","last_sighting_year":1852,"region":"Bering Island","wikipedia_url":"https://en.wikipedia.org/wiki/Spectacled_cormorant","image_url":"archive_images/phalacrocorax_perspicillatus.webp","synopsis_en":"**A walking seafood buffet**, the Spectacled Cormorant once graced the Bering Sea with its bulky, peculiar charm. Despite thriving for millennia, a mere century of human appetite — for its feathers, its meat, its very presence — rendered its considerable size and distinctive 'spectacles' utterly useless against the ultimate predator. Gone, not with a bang, but a stomach rumble.","synopsis_nn":"**Ein vandrande sjømatbuffet**, Brilleskarven prydde ein gong Beringhavet med sin store, særeigne sjarm. Sjølv om den blomstra i tusenår, gjorde berre eit hundreår med menneskeleg appetitt — etter fjørene, kjøtet, sjølve eksistensen hennar — hennar betydelege storleik og karakteristiske 'briller' heilt verdilaus mot det ultimate rovdyret. Borte, ikkje med eit smell, men med eit magemål."},{"scientific_name":"Cyanopsitta spixii","common_name":"Spix's macaw","iucn_status":"EW","primary_cause":"Trapping, habitat loss","last_sighting_year":2000,"region":"Brazil","wikipedia_url":"https://en.wikipedia.org/wiki/Spix%27s_macaw","image_url":"archive_images/cyanopsitta_spixii.webp","synopsis_en":"**A flicker of sapphire against the parched earth**, the Spix's macaw, a dazzling blue curiosity, found itself caught in a particularly grim cosmic joke. Its breathtaking rarity, a perverse marketing triumph, ensured its fervent pursuit by collectors, even as its very woodland home vanished under the relentless march of human 'development'. Ironically, humanity's insatiable desire to possess it, coupled with the destruction of its habitat, left the Spix's macaw with nowhere to fly, no one to impress, and ultimately, no future at all.","synopsis_nn":"**Eit glimt av safir mot den turre jorda**, Spix-araen, ein blendande blå kuriositet, fann seg fanga i ein særleg dyster kosmisk spøk. Den pustelause sjeldne eigenskapen dens, ein pervers marknadsføringstriumf, sørgde for ivrig jakt frå samlarar, sjølv medan sjølve skogsheimen forsvann under den nådelause marsjen av menneskeleg 'utvikling'. Ironisk nok, menneska sin umettelege trong til å eige den, kombinert med øydelegginga av levestaden dens, etterlét Spix-araen utan stad å fly, ingen å imponere, og til slutt, inga framtid i det heile."},{"scientific_name":"Oophaga speciosa","common_name":"Splendid poison frog","iucn_status":"EX","primary_cause":"Habitat loss","last_sighting_year":1992,"region":"Panama","wikipedia_url":"https://en.wikipedia.org/wiki/Oophaga_speciosa","image_url":"archive_images/oophaga_speciosa.webp","synopsis_en":"A vibrant, venomous beauty, the Splendid Poison Frog (Oophaga speciosa) once hopped through the damp undergrowth, a living warning sign to any would-be predator. Its dazzling hues, meant to deter, proved tragically ineffective against the most persistent threat of all: the systematic dismantling of its rainforest home. Now, this 'splendid' creature is a ghost, its vibrant legacy reduced to a monochromatic footnote on human expansion.","synopsis_nn":"Ein strålande, giftig venleik, den Praktfulle Giftfrosken (Oophaga speciosa) hoppa ein gong gjennom den fuktige undervegetasjonen, eit levande åtvaringsskilt for potensielle rovdyr. Dei blenkjande fargane hennar, meint å avskrekke, viste seg tragisk ineffektive mot den mest vedvarande trusselen av alle: den systematiske nedrivinga av regnskogheimen hennar. No er dette 'praktfulle' vesenet eit spøkjelse, og det levande ettermælet hennar er redusert til ei monokrom fotnote i den menneskelege ekspansjonen."},{"scientific_name":"Philautus adspersus, dimbullae, eximius, halyi, maia, nanus, nasutus, pardus, temporalis, variabilis, zal, zimmeri, extirpo, oxyrhynchus, leucorhinus, rugatus, stellatus","common_name":"Sri Lanka Shrub Frogs (17 extinct species)","iucn_status":"EX","primary_cause":"Habitat loss","last_sighting_year":1870,"region":"Sri Lanka","wikipedia_url":"https://en.wikipedia.org/wiki/Philautus","image_url":"archive_images/philautus_oxyrhynchus.webp","synopsis_en":"**Seventeen quiet tragedies rolled into one taxonomic funeral**, Sri Lanka’s *Philautus* shrub frogs occupied every mist-drenched niche the island’s highlands could offer — each species a miniature masterpiece of cloud-forest speciation. When the tea plantations arrived and chainsaws replaced canopy, seventeen distinct evolutionary experiments vanished in a single geological blink, most never photographed alive. The cruelest punchline: several were scientifically described and declared extinct in the same paper.","synopsis_nn":"**Sytten stille tragediar samla i éin taksonomisk gravferd**, dei srilankiske *Philautus*-buskfroskane okkuperte kvar einaste tåkedekte nisje høglandet på øya kunne by på — kvar art eit miniatyrmeisterverk av skogspesiering. Då teplantasjane kom og motorsagene erstatta trekronene, forsvann sytten distinkte evolusjonære eksperiment i eit einaste geologisk augeblink, dei fleste aldri fotograferte i live. Den grusomaste punchlina: fleire vart vitskapleg skildra og erklært utrydda i same artikkel."},{"scientific_name":"Hydrodamalis gigas","common_name":"Steller's sea cow","iucn_status":"EX","primary_cause":"Hunting","last_sighting_year":1768,"region":"North Pacific","wikipedia_url":"https://en.wikipedia.org/wiki/Steller%27s_sea_cow","image_url":"archive_images/hydrodamalis_gigas.webp","synopsis_en":"**A ten-ton salad enthusiast**, *Hydrodamalis gigas* once placidly grazed the Bering Sea, a gentle giant whose sheer size offered no defense against a very different kind of predator. Its massive, slow-moving form, an evolutionary marvel, tragically became its greatest liability when humans discovered its succulent flesh. Within mere decades, we munched this magnificent creature into oblivion, a testament to how quickly convenience can consume even the grandest of natural wonders.","synopsis_nn":"**Ein ti tonn tung salatelskar**, *Hydrodamalis gigas* beita ein gong roleg i Beringhavet, ein mild kjempe der sjølve storleiken ikkje gav vern mot ein heilt annan type rovdyr. Den massive, saktmodige forma, eit evolusjonært underverk, blei dessverre den største ulempa då menneska oppdaga det saftige kjøttet. I løpet av berre nokre tiår åt vi denne storslegne skapningen til utrydding, eit bevis på kor raskt bekvemmeligheit kan fortære sjølv dei største av naturlege underverk."},{"scientific_name":"Stypodon signifer","common_name":"Stumptooth minnow","iucn_status":"EX","primary_cause":"Habitat loss","last_sighting_year":1930,"region":"Mexico","wikipedia_url":"https://en.wikipedia.org/wiki/Stumptooth_minnow","image_url":"archive_images/stypodon_signifer.webp","synopsis_en":"**A minnow named Stumptooth, perhaps for its unassuming maw**, once navigated sun-dappled shallows with quiet dignity. This little fish, ironically equipped for anything but a fight, watched its watery world shrink and sour, disappearing not with a roar, but a silent shrug of the ecosystem.","synopsis_nn":"**Ei småfisk kalla Stumptann, kanskje for den uanselige munnen sin**, navigerte ein gong solglitra grunner med stille verdigheit. Denne vesle fisken, ironisk nok utrusta for alt anna enn kamp, såg sin våte verd krympe og surne, og forsvann ikkje med eit brøl, men eit stille skuldertrekk frå økosystemet."},{"scientific_name":"Corypha taliera","common_name":"Talipot Palm of Bengal","iucn_status":"EX","primary_cause":"Habitat destruction, over-harvesting","last_sighting_year":2010,"region":"Bangladesh, Myanmar","wikipedia_url":"https://en.wikipedia.org/wiki/Corypha_taliera","image_url":"archive_images/corypha_taliera.webp","synopsis_en":"**A magnificent spectacle of the botanical world**, the Talipot Palm of Bengal (Corypha taliera) made its final bow, tragically succumbing to the relentless march of habitat destruction and unsustainable harvesting. Once a striking feature of Bangladesh and Myanmar's landscapes, its single, dramatic flowering and subsequent death now serve as a stark reminder of humanity's ecological footprint. This grand palm, a victim of our collective short-sightedness, transitioned from breathtaking rarity to botanical history with alarming speed.","synopsis_nn":"**Eit storslått skode i botanikkens verd**, gjorde Talipotpalmen frå Bengal (Corypha taliera) si siste framsyning, og bukka tragisk under for den nådelause frammarsjen av habitatøydelegging og uuthaldeleg hausting. Ein gong eit slåande trekk ved landskapet i Bangladesh og Myanmar, tener den no sitt einaste, dramatiske blomstring og påfølgjande død som ei skarp påminning om menneska sitt økologiske fotavtrykk. Denne storslåtte palmen, eit offer for vår kollektive kortsyntheit, gjekk frå å vere ei fantastisk sjeldnheit til botanisk historie med alarmerande fart."},{"scientific_name":"Equus ferus ferus","common_name":"Tarpan","iucn_status":"EX","primary_cause":"Hunting, interbreeding with domestic horses","last_sighting_year":1909,"region":"Europe, Western Asia","wikipedia_url":"https://en.wikipedia.org/wiki/Tarpan","image_url":"archive_images/equus_ferus_ferus.webp","synopsis_en":"**The Tarpan,** once the very essence of wild equine spirit across Europe and Western Asia, met its demise through a potent cocktail of relentless human hunting and the insidious genetic dilution from interbreeding with domestic horses. Officially declared extinct in the early 20th century, its ghost now gallops solely through carefully cataloged history, a pointed critique of humanity's imprint on primordial wilderness.","synopsis_nn":"**Tarpanen,** eingong sjølve personifiseringa av den ville hesteånda i Europa og Vest-Asia, bukka under for ei kraftig blanding av nådelaus jakt og den snikande genetiske utvanninga frå krysning med tamhestar. Offisielt erklært utdøydd tidleg på 1900-talet, galopperer no spøkjelsen deira berre gjennom nøye katalogisert historie, ei skarp kritikk av menneska sitt avtrykk på den urville naturen."},{"scientific_name":"Morus peruvianus","common_name":"Tasman Booby","iucn_status":"EX","primary_cause":"Human hunting","last_sighting_year":1788,"region":"Tasman Sea","wikipedia_url":"https://en.wikipedia.org/wiki/Tasman_booby","image_url":"generics/generic_bird.webp","synopsis_en":"**Once a striking sight across the Tasman Sea**, the Morus peruvianus, or Tasman Booby, now serves as a stark reminder of human impact. These magnificent seabirds, whose colonies once dotted the remote islands, were relentlessly hunted to extinction. Their demise, a tragic testament to unchecked exploitation, underscores the fragile balance of island ecosystems.","synopsis_nn":"**Ein gong eit slåande syn over Tasmanhavet**, er Morus peruvianus, eller Tasmanhavsulen, no ei skarp påminning om menneskeleg påverknad. Desse storslåtte sjøfuglane, med koloniar som ein gong pryda dei fjerntliggjande øyane, vart nådelaust jakta til utrydding. Endeliktet deira, eit tragisk prov på ukontrollert utnytting, understrekar den skjøre balansen i økosystema på øyane."},{"scientific_name":"Cyprinodon nevadensis calidae","common_name":"Tecopa pupfish","iucn_status":"EX","primary_cause":"Habitat modification","last_sighting_year":1970,"region":"California","wikipedia_url":"https://en.wikipedia.org/wiki/Tecopa_pupfish","image_url":"archive_images/cyprinodon_nevadensis_calidae.webp","synopsis_en":"**A pint-sized titan of tenacity**, the Cyprinodon nevadensis calidae (Tecopa pupfish) was a master of extreme desert waters. Tragically, its impressive ability to thrive in harsh natural conditions proved utterly useless against the ultimate habitat modification: when humans decided its hot springs would make for nicer, and ultimately deadly, bathing resorts.","synopsis_nn":"**Ein bitteliten titan av standhaftigheit**, Cyprinodon nevadensis calidae (Tecopa-fiskjen) var ein meister i ekstreme ørkenvatn. Tragisk nok viste den imponerande evna til å trivast i harde naturforhold seg å vere totalt ubrukbar mot den ultimate habitatendringa: då menneska avgjorde at dei varme kjeldene ville eigne seg betre, og til slutt dødelegare, som badeanlegg."},{"scientific_name":"Gila crassicauda","common_name":"Thicktail chub","iucn_status":"EX","primary_cause":"Habitat loss, invasive species","last_sighting_year":1957,"region":"California","wikipedia_url":"https://en.wikipedia.org/wiki/Thicktail_chub","image_url":"archive_images/gila_crassicauda.webp","synopsis_en":"**Once the undisputed, if somewhat squat, king of California's slow-moving waters**, the Thicktail Chub (Gila crassicauda) navigated its piscine empire with a quiet, fleshy dignity. It didn't face a monster from the deep, but rather a slow drying of its kingdom and the uncouth appetites of introduced cousins, rendering its sturdy frame tragically irrelevant. A truly Californian tale: prime real estate, then an eviction notice, all while the new neighbours moved in.","synopsis_nn":"**Ein gong den ubestridde, om enn noko kraftige, kongen av California sine sakteflytande vatn**, navigerte tjukkhaldauren (Gila crassicauda) sitt fiskeimperium med ei stille, kjøtfull verdigheit. Den møtte ikkje eit monster frå djupet, men heller ei sakte uttørking av riket sitt og dei usiviliserte appetittane til innførte slektningar, som gjorde den solide kroppen hennar tragisk irrelevant. Ei sann kalifornisk forteljing: topp-eigedom, så ei utkastingsvarsel, alt medan dei nye naboane flytta inn."},{"scientific_name":"Thylacinus cynocephalus","common_name":"Thylacine","iucn_status":"EX","primary_cause":"Hunting, habitat loss","last_sighting_year":1936,"region":"Australia/Tasmania","wikipedia_url":"https://en.wikipedia.org/wiki/Thylacine","image_url":"archive_images/thylacinus_cynocephalus.webp","synopsis_en":"**Australia's lithe, striped scapegoat,** the Thylacine (Thylacinus cynocephalus) was a unique marsupial predator, relentlessly targeted by farmers and bounty hunters despite often being innocent. Its graceful exit from the world, hastened by human hands and vanishing habitats, cemented its legacy as a magnificent, if terribly unlucky, ghost—a poignant testament to our fleeting understanding.","synopsis_nn":"**Australias smidige, stripete syndebukk,** Thylacinen (Thylacinus cynocephalus) var eit unikt pungrovdyr, nådelaust jakta på av bønder og dusørjegarar trass i at det ofte var uskuldig. Den grasiøse forsvinninga frå verda, framskunda av menneskehender og minkande leveområde, sementerte arven som eit storslått, om frykteleg uheldig, gjenferd—eit gripande vitnesbyrd om vår flyktige forståing."},{"scientific_name":"Hydropsyche tobiasi","common_name":"Tobias' caddisfly","iucn_status":"EX","primary_cause":"Pollution","last_sighting_year":1938,"region":"Germany","wikipedia_url":"https://en.wikipedia.org/wiki/Hydropsyche_tobiasi","image_url":"archive_images/hydropsyche_tobiasi.webp","synopsis_en":"**A meticulous architect of the vanishing stream**, Tobias' caddisfly once wove intricate silken nets, sifting clean currents for its daily bread. Its final, grim irony? This diligent filter-feeder was ultimately filtered *out* of existence, a casualty of the very 'progress' that turned its pristine home into a toxic soup. A silent testament to what happens when nature tries to clean up after us.","synopsis_nn":"**Ein nøyaktig arkitekt i den forsvinnande bekken**, Tobias' vårfluge vov ein gong intrikate silkenett, og filtrerte reine straumar for sitt daglege brød. Den endelege, grusame ironien? Denne flittige filteretaren vart til slutt filtrert *ut* av tilværet, eit offer for den same 'framgangen' som gjorde heimen hennar om til ei giftig suppe. Eit stille vitnemål om kva som skjer når naturen prøver å rydde opp etter oss."},{"scientific_name":"Macropus greyi","common_name":"Toolache wallaby","iucn_status":"EX","primary_cause":"Hunting, habitat loss","last_sighting_year":1939,"region":"Australia","wikipedia_url":"https://en.wikipedia.org/wiki/Toolache_wallaby","image_url":"archive_images/macropus_greyi.webp","synopsis_en":"A whisper of speed, a blur of grace, the Toolache wallaby (Macropus greyi) once danced across the grasslands with unmatched agility. Sadly, its elegant leaps were no match for the hunter's bullet, nor could its shrinking habitat evade the farmer's plow. This master of escape ultimately vanished, a melancholic testament to humanity's 'progress'.","synopsis_nn":"Eit sus av fart, ein skugge av ynde, Toolache-wallabyen (Macropus greyi) dansa ein gong over grasmarkene med uovertruffen smidigheit. Dessverre var dei elegante hoppa hennar ingen match for jegerens kule, og heller ikkje det krympande habitatet hennar kunne unngå bondens plog. Denne meisteren av flukt forsvann til slutt, eit melankolsk vitnesbyrd om menneskja sin 'framgang'."},{"scientific_name":"Cottus echinatus","common_name":"Utah Lake sculpin","iucn_status":"EX","primary_cause":"Pollution, habitat loss","last_sighting_year":1928,"region":"Utah, USA","wikipedia_url":"https://en.wikipedia.org/wiki/Utah_Lake_sculpin","image_url":"archive_images/cottus_echinatus.webp","synopsis_en":"**The undisputed champion of simply existing**, the Utah Lake sculpin was never one for grand gestures or dramatic migrations. This unassuming little fish, a master of blending into its rocky home, simply needed clean water and a place to hide. But alas, even such modest demands proved too much for the onward march of progress, as pollution and disappearing habitats ensured its quiet exit from the stage, leaving only this stark, dusty reminder.","synopsis_nn":"**Den ubestridde meisteren i berre å vera til**, Utah Lake-kutlingen var aldri typen for storslåtte gestar eller dramatiske vandringar. Denne vesle, uanselge fisken, ein meister i å smelta inn i sitt steinete heim, trengde berre reint vatn og ein stad å gøyma seg. Men akk, sjølv så beskjedne krav viste seg å vera for mykje for den ustoppelege frammarsjen til framsteget, då forureining og forsvinnande habitat sikra dens stille avgang frå scena, og etterlét berre denne nakne, støvete påminninga."},{"scientific_name":"Phocoena sinus","common_name":"Vaquita","iucn_status":"CR","primary_cause":"Bycatch in gillnets","last_sighting_year":null,"region":"Gulf of California, Mexico","wikipedia_url":"https://en.wikipedia.org/wiki/Vaquita","image_url":"archive_images/phocoena_sinus.webp","synopsis_en":"**The Vaquita, a diminutive porpoise native to Mexico's Gulf of California,** stands on the precipice of extinction, a stark testament to humanity's unintended consequences. Its critically endangered (CR) status is almost solely attributable to bycatch in the very gillnets meant for other marine life, ironically sealing its fate. This phantom of the shallow waters is fading, not with a bang, but with the silent tangle of illegal fishing gear.","synopsis_nn":"**Vaquitaen, ein liten nise som er endemisk for Californiabukta i Mexico,** står på randen av utrydding, eit skarpt vitnesbyrd om menneskets utilsikta konsekvensar. Den kritisk truga (CR) statusen skuldast nesten utelukkande bifangst i garn, reiskap meint for anna sjøliv, som ironisk nok har vore artens bane. Dette spøkelset i dei grunne farvatna bleiknar, ikkje med eit smell, men i den stille floka av ulovleg fiskeutstyr."},{"scientific_name":"Lithobates fisheri","common_name":"Vegas Valley leopard frog","iucn_status":"EX","primary_cause":"Habitat loss","last_sighting_year":1942,"region":"Nevada, USA","wikipedia_url":"https://en.wikipedia.org/wiki/Vegas_Valley_leopard_frog","image_url":"archive_images/lithobates_fisheri.webp","synopsis_en":"**The desert's damp darling**, the Vegas Valley leopard frog once thrived in the vibrant springs and wetlands that dotted early Las Vegas. Its lively leaps and throaty croaks were as much a part of the landscape as any casino's siren song, until concrete and relentless development swallowed every last drop of its precious real estate. An ironically 'only in Vegas' story, where even the most unassuming native lost its bet against progress, fading away before the neon truly blazed.","synopsis_nn":"**Ørkenens fuktige yndling**, leopardfrosken frå Vegasdalen trivdest ein gong i dei livlege kjeldene og våtmarkene som prikka tidlegare Las Vegas. Dei livlege hoppa og grove kvekka hennar var like mykje ein del av landskapet som sirenesongen frå eit kasino, inntil betong og ustoppeleg utbygging slukte kvar einaste drope av den dyrebare eigedomen hennar. Ei ironisk 'berre i Vegas'-historie, der sjølv den mest audmjuke innfødde tapte veddemålet sitt mot framskrittet, og bleikna bort før neonlyset verkeleg blada opp."},{"scientific_name":"Hypotaenidia wakensis","common_name":"Wake Island rail","iucn_status":"EX","primary_cause":"Hunting (WWII)","last_sighting_year":1945,"region":"Wake Island","wikipedia_url":"https://en.wikipedia.org/wiki/Wake_Island_rail","image_url":"archive_images/hypotaenidia_wakensis.webp","synopsis_en":"**A plump, flightless connoisseur of island greens**, the Wake Island rail once pattered across its tiny Pacific home, blissfully unaware of the wider world's woes. Its charming insouciance, a perfect adaptation for a predator-free paradise, became a cruel joke when hungry WWII soldiers arrived, swiftly consigning this unique avian to history's larder. An entire species, simply eaten out of existence by geopolitics and the unfortunate taste of chicken.","synopsis_nn":"**Ein lubben, flygeløys gourmet av øygrønt**, traska wakereila ein gong over si vesle stillehavsøy, lukkeleg uvitande om verdas sorger. Den sjarmerande sjølvgodheita hennar, ei perfekt tilpassing til eit rovdyrfritt paradis, blei ein grusam spøk då svolne WWII-soldatar kom og raskt forviste denne unike fuglen til historias matlager. Ein heil art, rett og slett spist ut av eksistens av geopolitikk og den uheldige smaken av kylling."},{"scientific_name":"Diceros bicornis longipes","common_name":"Western Black Rhinoceros","iucn_status":"EX","primary_cause":"Poaching for horn","last_sighting_year":2011,"region":"West Africa","wikipedia_url":"https://en.wikipedia.org/wiki/Western_black_rhinoceros","image_url":"generics/generic_marsupial.webp","synopsis_en":"**Once the magnificent *Diceros bicornis longipes*, a sentinel of West African ecosystems**, this formidable rhinoceros now only inhabits the solemn annals of extinction. Its tragic demise, confirmed in 2011, stands as a brutal epitaph to the relentless, short-sighted human pursuit of a horn – a keratin commodity priced above an entire species. A poignant reminder that some 'treasures' cost the world.","synopsis_nn":"**Ein gong den storslåtte *Diceros bicornis longipes*, ein vaktar av vestafrikanske økosystem**, bur denne imponerande nashornarten no berre i dei sørgjelege annalane til utrydding. Den tragiske bortgangen, stadfesta i 2011, står som eit brutalt gravskrift over mennesket si nådelause, kortsiktige jakt på eit horn – ei keratinvare verdsett høgare enn ein heil art. Ei gripande påminning om at nokre 'skattar' kostar verda sjølv."},{"scientific_name":"Conilurus albipes","common_name":"White-footed Rabbit-rat","iucn_status":"EX","primary_cause":"Predation by cats and foxes, habitat loss","last_sighting_year":1845,"region":"Australia","wikipedia_
