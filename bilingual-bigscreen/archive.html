url":"https://en.wikipedia.org/wiki/White-footed_rabbit-rat","image_url":"archive_images/conilurus_albipes.webp","synopsis_en":"**The White-footed Rabbit-rat, a delightful Australian rodent that once hopped across the continent, became an unfortunate casualty of colonial expansion.** Its extinction, declared by the early 20th century, serves as a stark reminder of the devastating toll exacted by introduced predators like cats and foxes, alongside relentless habitat fragmentation.","synopsis_nn":"**Den kvitfota kaninrotta, ein sjarmerande australsk gnagar som ein gong hoppa over kontinentet, vart eit uheldig offer for kolonial ekspansjon.** Utryddinga hennar, erklært tidleg på 1900-talet, fungerer som ei skarp påminning om den øydeleggjande kostnaden frå introduserte rovdyr som kattar og rev, saman med nådelaus fragmentering av habitat."},{"scientific_name":"Mammuthus primigenius","common_name":"Woolly Mammoth","iucn_status":"EX","primary_cause":"Climate change, human hunting","last_sighting_year":-2000,"region":"Northern Hemisphere","wikipedia_url":"https://en.wikipedia.org/wiki/Woolly_mammoth","image_url":"archive_images/mammuthus_primigenius.webp","synopsis_en":"**Mammuthus primigenius**, the iconic Woolly Mammoth, once dominated the frigid Northern Hemisphere, a shaggy colossus perfectly adapted to its icy domain. Its ultimate disappearance, however, wasn't merely a natural response to warming climates, but an accelerated march towards extinction, nudged along by the persistent spear-tips of an evolving predator: us. This tragic tale serves as a stark warning from the Pleistocene archives, highlighting humanity's long-standing, often fatal, influence on megafauna.","synopsis_nn":"**Mammuthus primigenius**, den ikoniske ullmammuten, dominerte ein gong den iskalde nordlege halvkula, ein bustete kjempe perfekt tilpassa sitt isete domene. Den endelege forsvinninga hennar var likevel ikkje berre ein naturleg reaksjon på varmare klima, men ein akselerert marsj mot utrydding, dytta fram av dei vedvarande spydspissane til eit utviklande rovdyr: oss. Denne tragiske forteljinga tener som ei skarp åtvaring frå pleistocen-arkiva, og framhevar menneska si langvarige, ofte fatale, påverknad på megafauna."},{"scientific_name":"Selaginella ×wynneana","common_name":"Wynne's spikemoss","iucn_status":"EX","primary_cause":"Habitat loss","last_sighting_year":1970,"region":"India","wikipedia_url":"https://en.wikipedia.org/wiki/Selaginella_wynneana","image_url":"archive_images/selaginella_wynneana.webp","synopsis_en":"**This verdant crumb of existence, Wynne's spikemoss,** once graced our forest floors, a testament to life's most subtle artistry. But alas, the world, in its grand, sprawling ambition, found no room for such a tiny, tenacious inhabitant. Erased not by fire or flood, but simply by the inconvenient absence of a place to *be*, it proved that even the humblest of lives requires a stage, however small, to play out its final act.","synopsis_nn":"**Denne grøne smulen av eksistens, Wynne-taggmosen,** prydde ein gong skogbotnen vår, eit vitnesbyrd om livets mest finstemte kunst. Men akk, verda, med den store, sprikjande ambisjonen sin, fann ikkje rom for ein så liten, seigliva innbyggjar. Utrydda ikkje av eld eller flaum, men rett og slett av det ubeleilige fråværet av ein stad å *vere*, den beviste at sjølv dei mest audmjuke liva krev ei scene, kor lita ho enn er, for å spele ut sitt siste akt."},{"scientific_name":"Anaxyrus baxteri","common_name":"Wyoming toad","iucn_status":"EW","primary_cause":"Disease, habitat loss","last_sighting_year":1991,"region":"Wyoming, USA","wikipedia_url":"https://en.wikipedia.org/wiki/Wyoming_toad","image_url":"archive_images/anaxyrus_baxteri.webp","synopsis_en":"**Consider the Wyoming toad, a creature of simple, moist pleasures,** that survived countless ice ages only to be ambushed by an insidious fungus and the sudden drainage of its humble, wet world. This tiny amphibian's quiet disappearance serves as a darkly comedic reminder that even millennia of evolutionary grit can’t outwit a bad case of bad luck and human encroachment.","synopsis_nn":"**Tenk deg Wyoming-padda, eit vesen med enkle, fuktige gleder,** som overlevde utallige istider berre for å bli overfalle av ein lumsk sopp og den plutselege tømminga av den audmjuke, våte verda si. Den stille forsvinninga til denne vesle amfibien er ei mørkt komisk påminning om at sjølv tusenår med evolusjonær stålbøye ikkje kan overliste ein skikkeleg uheldig sjanse og menneskeleg inngrep."},{"scientific_name":"Glaucopsyche xerces","common_name":"Xerces blue butterfly","iucn_status":"EX","primary_cause":"Habitat loss","last_sighting_year":1941,"region":"San Francisco","wikipedia_url":"https://en.wikipedia.org/wiki/Xerces_blue","image_url":"archive_images/glaucopsyche_xerces.webp","synopsis_en":"**The ultimate homebody,** the Xerces blue butterfly — *Glaucopsyche xerces* — once graced San Francisco's coastal dunes with its iridescent wings. A creature so specialized, so utterly devoted to its very specific patch of lupine and buckwheat, it seems almost comically absurd that its fate was sealed not by a predator's maw, but by a bulldozer's indifferent blade paving over its entire living room. Now, only its name remains, a fleeting whisper of blue from a city that simply built right over it.","synopsis_nn":"**Den ultimate heimstadskjære,** Xerces-blåvengjen — *Glaucopsyche xerces* — pryda ein gong sanddynene langs kysten av San Francisco med dei iriserande vengene sine. Eit vesen så spesialisert, så fullstendig via sin heilt spesifikke flekk med lupin og bokhvete, at det verkar nesten komisk absurd at skjebnen dens vart forsegla ikkje av kjeften til eit rovdyr, men av den likegyldige skuffa til ein bulldosar som asfalterte over heile stova hennar. No er berre namnet att, ein flyktig kviskring av blått frå ein by som rett og slett bygde rett over det."},{"scientific_name":"Cynops wolterstorffi","common_name":"Yunnan lake newt","iucn_status":"EX","primary_cause":"Pollution, habitat loss","last_sighting_year":1979,"region":"China","wikipedia_url":"https://en.wikipedia.org/wiki/Yunnan_lake_newt","image_url":"archive_images/cynops_wolterstorffi.webp","synopsis_en":"**A diminutive aquatic oracle**, the Yunnan lake newt once shimmered in its ancient waters, a vibrant flash of life. Its final, tragic prophecy, however, wasn't whispered by nature, but screamed by our indifference: a suffocating cocktail of chemical runoff and the merciless draining of its pristine habitat, turning its world into a silent, ironic epitaph for progress.","synopsis_nn":"**Ein lita vassorakel**, glitra yunnanvatnpadden ein gong i dei eldgamle vatna sine, eit levande glimt av liv. Den siste, tragiske spådomen, vart derimot ikkje kviskra av naturen, men skrika ut av likegyldigheita vår: ein kvelande cocktail av kjemisk avrenning og den nådelause tømminga av det uberørte leveområdet hennar, som gjorde verda hennar om til eit stille, ironisk ettermæle for framsteg."},{"scientific_name":"Panthera pardus adersi","common_name":"Zanzibar Leopard","iucn_status":"EX","primary_cause":"Persecution as witchcraft agents","last_sighting_year":1996,"region":"Unguja Island, Tanzania","wikipedia_url":"https://en.wikipedia.org/wiki/Zanzibar_leopard","image_url":"archive_images/panthera_pardus_adersi.webp","synopsis_en":"**The Zanzibar Leopard, a unique insular subspecies of Unguja Island,** met its tragic end not through habitat loss or trophy hunting, but through a chilling superstition. Deemed agents of witchcraft, these elusive predators were systematically eradicated, leaving behind only their ghostly legend as a stark reminder of fear's destructive power.","synopsis_nn":"**Zanzibarleoparden, ein unik øy-underart frå Unguja-øya,** møtte sin tragiske slutt ikkje grunna tap av leveområde eller troféjakt, men gjennom ei uhyggeleg overtru. Desse flyktige rovdyra vart rekna som hekseri-agentar og systematisk utrydda, og etterlèt seg berre ei spøkelsesaktig legende som ei skarp påminning om frykta si øydeleggjande kraft."},{"scientific_name":"Psittirostra psittacea","common_name":"ʻŌʻū","iucn_status":"EX","primary_cause":"Disease, habitat loss","last_sighting_year":1989,"region":"Hawaii","wikipedia_url":"https://en.wikipedia.org/wiki/ʻŌʻū","image_url":"archive_images/psittirostra_psittacea.webp","synopsis_en":"**A vibrant gourmand of the Hawaiian canopy**, the ʻŌʻū flitted through its island paradise, a vision of yellow and green with a stout, fruit-slicing bill. Its world, however, became a poisoned Eden, not by a lack of fruit, but by invasive diseases carried by tiny, unwanted guests and the relentless march of human expansion. This once-common honeycreeper, a feathered testament to Hawaii's unique biodiversity, vanished with a bittersweet sigh, a casualty of paradise's ironic fragility.","synopsis_nn":"**Ein livfull gourmet frå den hawaiiske kalesjen**, flaksa ʻŌʻū gjennom sitt øyparadis, eit syn av gult og grønt med eit kraftig, fruktskjærande nebb. Verda deira vart derimot ein forgifta Edens hage, ikkje av mangel på frukt, men av invaderande sjukdommar borne av små, uønskte gjester og den nådelause frammarsjen av menneskeleg ekspansjon. Denne ein gong så vanlege honningkrepsearven, eit fjørkledd vitnesbyrd om Hawaiis unike biologiske mangfald, forsvann med eit bittert-søtt sukk, eit offer for paradisets ironiske skjørheit."}];</script>
<script>
/* ── Constants ──────────────────────────────────────────────────────── */
const IUCN = {
  EX: { en:'EXTINCT',              nn:'UTRYDDA',               cls:'status-EX'  },
  EW: { en:'EXTINCT IN WILD',      nn:'UTRYDDA I NATUREN',     cls:'status-EW'  },
  CR: { en:'CRITICALLY ENDANGERED',nn:'KRITISK TRUGA',         cls:'status-CR'  },
  EN: { en:'ENDANGERED',           nn:'STERKT TRUGA',          cls:'status-EN'  },
  VU: { en:'VULNERABLE',           nn:'SÅRBAR',                cls:'status-VU'  },
  NT: { en:'NEAR THREATENED',      nn:'NÆR TRUGA',             cls:'status-NT'  },
  LC: { en:'LEAST CONCERN',        nn:'LIVSKRAFTIG',           cls:'status-LC'  },
  DD: { en:'DATA DEFICIENT',       nn:'DATAMANGEL',            cls:'status-DD'  },
};

const UI = {
  en: { why:'WHY DID IT DISAPPEAR?', wiki:'Learn More (Wikipedia) ↗', loading:'Loading taxonomic file…' },
  nn: { why:'KVIFOR FORSVANN DEN?',  wiki:'Les meir (Wikipedia) ↗',   loading:'Lastar taksonomi…'       },
};

/* ── State ──────────────────────────────────────────────────────────── */
let species   = [];      // full dataset
let lang      = localStorage.getItem('er_lang') || 'en';
let current   = 0;       // current card index (scroll-tracked)
let isFlicking = false;
let holdTimer  = null;
let flickIntvl = null;

const container = document.getElementById('scroll-container');
const navUp     = document.getElementById('nav-up');
const navDown   = document.getElementById('nav-down');

/* ── Helpers ────────────────────────────────────────────────────────── */
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function formatSynopsis(text) {
  if (!text) return '';
  // Strip markdown links [text](url) → text
  let s = text.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
  // Bold **…** and <b>…</b>
  s = s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/<b>(.*?)<\/b>/g, '<strong>$1</strong>');
  // Auto-bold leading clause if no bold exists yet
  if (!s.includes('<strong') && s.includes(',')) {
    const idx = s.indexOf(',');
    if (idx > 0 && idx < 80) {
      s = `<strong>${s.slice(0, idx)}</strong>${s.slice(idx)}`;
    }
  }
  return s;
}

function statusLabel(sp) {
  if (sp.scientific_name === 'Homo sapiens') {
    return lang === 'en' ? 'MOST CONCERNING' : 'MEST BEKYMRINGSVERDIG';
  }
  return IUCN[sp.iucn_status]?.[lang] || sp.iucn_status || '—';
}

function statusClass(sp) {
  if (sp.scientific_name === 'Homo sapiens') return 'status-LC';
  if (sp.scientific_name === 'Felis catus')  return 'status-LC';
  return IUCN[sp.iucn_status]?.cls || 'status-default';
}

function yearLabel(sp) {
  const y = sp.last_sighting_year;
  if (y == null) return '';
  const pfx = y < 1850 ? 'circa ' : '';
  const sfx = y < 0 ? ' BC' : '';
  return `: ${pfx}${Math.abs(y)}${sfx}`;
}

function imgSrc(sp) {
  if (!sp.image_url || sp.image_url === 'none') return null;
  // Remap absolute /archive_images/… and /generics/… to relative ../public/…
  return sp.image_url.replace(/^\//, '../public/');
}

function whyLabel(sp) {
  const name = (sp.common_name || sp.scientific_name).replace(/null|undefined/gi,'').toUpperCase();
  return (UI[lang].why || 'WHY DID IT DISAPPEAR?').replace('IT', name);
}

/* ── Build a single card element ───────────────────────────────────── */
function buildSynopsisBlock(sp) {
  // Collect all synopsis parts for this species
  const mainEn = sp.synopsis_en || '';
  const mainNn = sp.synopsis_nn || '';
  const extraEn = sp.extra_narrative_en || [];
  const extraNn = sp.extra_narrative_nn || [];

  const partsEn = [mainEn, ...extraEn].filter(Boolean);
  const partsNn = [mainNn, ...extraNn].filter(Boolean);
  const parts   = lang === 'en' ? partsEn : partsNn;

  if (!parts.length) {
    return `<div class="synopsis-wrap"><p class="plaque__synopsis loading">${esc(UI[lang].loading)}</p></div>`;
  }

  const multi = parts.length > 1;

  const partsHtml = parts.map((p, i) => `
    <p class="plaque__synopsis synopsis-part${i === 0 ? ' active' : ''}" data-part="${i}">
      ${formatSynopsis(p)}
    </p>`).join('');

  const navHtml = multi ? `
    <div class="synopsis-nav">
      <button class="synopsis-prev" data-dir="-1" disabled>← Prev</button>
      <span class="nav-count">1 / ${parts.length}</span>
      <button class="synopsis-next" data-dir="1"${parts.length === 1 ? ' disabled' : ''}>Next →</button>
    </div>` : '';

  return `<div class="synopsis-wrap" data-current="0" data-total="${parts.length}"
    data-parts-en='${JSON.stringify(partsEn).replace(/'/g, "&#39;")}'
    data-parts-nn='${JSON.stringify(partsNn).replace(/'/g, "&#39;")}'>
    ${partsHtml}${navHtml}
  </div>`;
}

function buildCard(sp, idx, total) {
  const src         = imgSrc(sp);
  const cause       = sp.primary_cause && sp.primary_cause !== 'null' ? sp.primary_cause : null;
  const wiki        = sp.wikipedia_url && sp.wikipedia_url !== 'null' ? sp.wikipedia_url : null;
  const displayName = (sp.common_name || sp.scientific_name).replace(/null|undefined/gi, '').trim();
  const region      = sp.region || '';

  const card = document.createElement('div');
  card.className = 'plaque';
  card.dataset.idx = idx;

  // Image layer
  if (src) {
    card.innerHTML += `
      <div class="plaque__img-layer">
        <img class="plaque__img" loading="lazy"
          src="${esc(src)}"
          alt="${esc(displayName)}"
          onerror="this.closest('.plaque__img-layer').style.display='none'" />
      </div>`;
  }

  // Content
  const wikiHtml = wiki ? `
    <a class="plaque__wiki" href="${esc(wiki)}" target="_blank" rel="noopener noreferrer">
      ${esc(UI[lang].wiki)}
    </a>` : '';

  const causeHtml = cause ? `
    <div class="plaque__cause">
      <span class="plaque__cause-why">${esc(whyLabel(sp))}</span>
      <span class="plaque__cause-text">${esc(cause)}</span>
    </div>` : '';

  card.innerHTML += `
    <div class="plaque__content">
      <div>
        <div class="plaque__counter">${idx + 1} / ${total}</div>
        <h2 class="plaque__common">${esc(displayName)}</h2>
        <h3 class="plaque__scientific">${esc(sp.scientific_name)}${region ? ' — ' + esc(region) : ''}</h3>
        <div class="plaque__meta">
          <div>
            <span class="plaque__meta-label">Status:</span>
            <span class="plaque__badge ${statusClass(sp)}">${esc(statusLabel(sp))}${esc(yearLabel(sp))}</span>
          </div>
          ${causeHtml}
        </div>
      </div>
      ${buildSynopsisBlock(sp)}
      ${wikiHtml}
    </div>`;

  return card;
}

/* ── Synopsis part navigation (event delegation on scroll container) ── */
function advancePart(wrap, dir) {
  const total   = parseInt(wrap.dataset.total, 10);
  let current   = parseInt(wrap.dataset.current, 10);
  const next    = Math.max(0, Math.min(current + dir, total - 1));
  if (next === current) return;

  // Hide old part, show new part
  wrap.querySelector(`.synopsis-part[data-part="${current}"]`)?.classList.remove('active');
  wrap.querySelector(`.synopsis-part[data-part="${next}"]`)?.classList.add('active');

  wrap.dataset.current = next;

  // Update counter and button states
  const counter = wrap.querySelector('.nav-count');
  if (counter) counter.textContent = `${next + 1} / ${total}`;
  const prevBtn = wrap.querySelector('.synopsis-prev');
  const nextBtn = wrap.querySelector('.synopsis-next');
  if (prevBtn) prevBtn.disabled = next === 0;
  if (nextBtn) nextBtn.disabled = next === total - 1;
}

container.addEventListener('click', (e) => {
  const btn = e.target.closest('.synopsis-prev, .synopsis-next');
  if (!btn || btn.disabled) return;
  e.stopPropagation();
  const dir  = parseInt(btn.dataset.dir, 10);
  const wrap = btn.closest('.synopsis-wrap');
  if (wrap) advancePart(wrap, dir);
});

/* ── Render all cards ───────────────────────────────────────────────── */
function renderCards() {
  container.innerHTML = '';
  const total = species.length;
  species.forEach((sp, idx) => {
    container.appendChild(buildCard(sp, idx, total));
  });
  updateArrows();
}

/* ── Language toggle ────────────────────────────────────────────────── */
document.getElementById('lang-toggle').addEventListener('click', () => {
  lang = lang === 'en' ? 'nn' : 'en';
  localStorage.setItem('er_lang', lang);
  document.documentElement.lang = lang;
  document.getElementById('lt-en').className = lang === 'en' ? 'active' : 'inactive';
  document.getElementById('lt-nn').className = lang === 'nn' ? 'active' : 'inactive';
  renderCards();
  // Restore scroll position
  container.scrollTo({ top: current * container.clientHeight, behavior: 'instant' });
});

/* ── Arrow navigation ───────────────────────────────────────────────── */
function updateArrows() {
  navUp.classList.toggle('hidden',   current === 0);
  navDown.classList.toggle('hidden', current >= species.length - 1);
}

function scrollTo(idx, smooth) {
  idx = Math.max(0, Math.min(idx, species.length - 1));
  current = idx;
  container.scrollTo({ top: idx * container.clientHeight, behavior: smooth ? 'smooth' : 'instant' });
  updateArrows();
}

function clearTimers() {
  if (holdTimer)  { clearTimeout(holdTimer);  holdTimer  = null; }
  if (flickIntvl) { clearInterval(flickIntvl); flickIntvl = null; }
}

function beginPress(dir) {
  clearTimers();
  isFlicking = true;
  container.style.scrollSnapType = 'none';
  scrollTo(current + dir, false);

  holdTimer = setTimeout(() => {
    flickIntvl = setInterval(() => {
      const next = current + dir;
      if (next < 0 || next >= species.length) { stopPress(); return; }
      current = next;
      container.scrollTo({ top: current * container.clientHeight, behavior: 'instant' });
      updateArrows();
    }, 80);
  }, 400);
}

function stopPress() {
  clearTimers();
  isFlicking = false;
  container.style.scrollSnapType = '';
  container.scrollTo({ top: current * container.clientHeight, behavior: 'instant' });
  updateArrows();
}

navUp.addEventListener('mousedown',   () => beginPress(-1));
navUp.addEventListener('touchstart',  (e) => { e.preventDefault(); beginPress(-1); }, { passive: false });
navDown.addEventListener('mousedown', () => beginPress(1));
navDown.addEventListener('touchstart',(e) => { e.preventDefault(); beginPress(1);  }, { passive: false });
document.addEventListener('mouseup',  stopPress);
document.addEventListener('touchend', stopPress);

/* ── Keyboard navigation ────────────────────────────────────────────── */
window.addEventListener('keydown', (e) => {
  if (document.activeElement === document.getElementById('search-input')) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); beginPress(1);  }
  if (e.key === 'ArrowUp')   { e.preventDefault(); beginPress(-1); }
}, { capture: true });
window.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') stopPress();
}, { capture: true });

/* ── Scroll tracking ────────────────────────────────────────────────── */
container.addEventListener('scroll', () => {
  if (isFlicking) return;
  const h = container.clientHeight;
  if (h > 0) current = Math.round(container.scrollTop / h);
  updateArrows();
}, { passive: true });

/* ── Search overlay ─────────────────────────────────────────────────── */
const overlay     = document.getElementById('search-overlay');
const searchInput = document.getElementById('search-input');
const searchRes   = document.getElementById('search-results');

function openSearch() {
  overlay.classList.remove('hidden');
  searchInput.value = '';
  renderSearchResults('');
  setTimeout(() => searchInput.focus(), 50);
}
function closeSearch() {
  overlay.classList.add('hidden');
}

document.getElementById('btn-open-search').addEventListener('click', openSearch);
document.getElementById('btn-close-search').addEventListener('click', closeSearch);

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeSearch();
  if ((e.metaKey || e.ctrlKey) && e.key === 'f') { e.preventDefault(); openSearch(); }
});

searchInput.addEventListener('input', () => renderSearchResults(searchInput.value));

function renderSearchResults(q) {
  q = q.trim().toLowerCase();
  const hits = q.length < 1
    ? species
    : species.filter(sp =>
        (sp.common_name || '').toLowerCase().includes(q) ||
        sp.scientific_name.toLowerCase().includes(q)
      );

  searchRes.innerHTML = hits.map((sp, i) => {
    const name = (sp.common_name || sp.scientific_name).replace(/null|undefined/gi,'').trim();
    const iucn = IUCN[sp.iucn_status]?.[lang] || sp.iucn_status || '';
    const cls  = statusClass(sp);
    return `<div class="search-result-item" data-idx="${species.indexOf(sp)}">
      <div>
        <div class="search-result-name">${esc(name)}</div>
        <div class="search-result-sci">${esc(sp.scientific_name)}</div>
      </div>
      <span class="search-result-badge plaque__badge ${cls}">${esc(iucn)}</span>
    </div>`;
  }).join('');

  searchRes.querySelectorAll('.search-result-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx, 10);
      closeSearch();
      scrollTo(idx, false);
    });
  });
}

/* ── Load data & init ───────────────────────────────────────────────── */
function init() {
  species = SPECIES_DATA;

  document.getElementById('lt-en').className = lang === 'en' ? 'active' : 'inactive';
  document.getElementById('lt-nn').className = lang === 'nn' ? 'active' : 'inactive';
  document.documentElement.lang = lang;

  renderCards();
  document.getElementById('loading-screen').style.display = 'none';
}

init();
</script>
</body>
