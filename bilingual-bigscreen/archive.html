<script>const SPECIES_DATA = [{"scientific_name":"Achatinella apexfulva","common_name":"Achatinella apexfulva","iucn_status":"EX","primary_cause":"Invasive species, habitat loss","last_sighting_year":2019,"region":"Hawaii","wikipedia_url":"https://en.wikipedia.org/wiki/Achatinella_apexfulva","image_url":"archive_images/achatinella_apexfulva.webp","synopsis_en":"**The original slow food movement devotee**, Achatinella apexfulva once gracefully spiraled through Hawaiian canopies, a delicate marvel of evolution. Tragically, its tranquil existence wasn't ended by natural selection, but by the relentless jaws of an *introduced* predator – the Rosy Wolfsnail – and the disappearing act of its precious forest home. A beautiful, tiny world, unwittingly sacrificed on the altar of misguided human intervention.","synopsis_nn":"**Den opphavlege tilhengjaren av slow food-rørsla**, Achatinella apexfulva snurra ein gong grasiøst gjennom hawaiiske trekroner, eit fint underverk av evolusjon. Tragisk nok vart den fredelege tilværa hennar ikkje avslutta av naturleg utval, men av dei nådelause kjevane til ein *innført* predator – Rosenulvesnigelen – og tapet av den dyrebare skogheimen hennar. Ei vakker, lita verd, uvitande ofra på alteret for feilslått menneskeleg inngrep."},{"scientific_name":"Plethodon ainsworthi","common_name":"Ainsworth's salamander","iucn_status":"EX","primary_cause":"Habitat loss","last_sighting_year":1964,"region":"Mississippi, USA","wikipedia_url":"https://en.wikipedia.org/wiki/Ainsworth%27s_salamander","image_url":"archive_images/plethodon_ainsworthi.webp","synopsis_en":"**A quiet connoisseur of damp earth**, Ainsworth's salamander, *Plethodon ainsworthi*, perfected the art of blending in – perhaps a little too well. This elusive amphibian vanished not with a dramatic roar, but a quiet shrug, as its meticulously chosen woodland home was simply... repurposed. Some exits, it seems, are tragically understated.","synopsis_nn":"**Ein still kjenner av fuktig jord**, Ainsworths salamander, *Plethodon ainsworthi*, perfeksjonerte kunsten å smelte inn – kanskje litt for godt. Denne unnvikande amfibien forsvann ikkje med eit dramatisk brøl, men eit stille skuldertrekk, då det nøye utvalde skogheimet hennar ganske enkelt vart... omdisponert. Nokre avgangar, ser det ut til, er tragisk underdrivne."},{"scientific_name":"Mitu mitu","common_name":"Alagoas curassow","iucn_status":"EW","primary_cause":"Hunting, deforestation","last_sighting_year":1988,"region":"Brazil","wikipedia_url":"https://en.wikipedia.org/wiki/Alagoas_curassow","image_url":"archive_images/mitu_mitu.webp","synopsis_en":"**A dark, handsome secret of the forest floor**, the Alagoas curassow—Mitu mitu—once navigated the Brazilian undergrowth with elegant caution. Its modest, ground-dwelling life, however, made it tragically easy prey for both hunter's snare and logger's saw. Today, only its scientific name echoes in the now-silent clearings, a darkly humorous epitaph to a species simply too tasty and too conveniently located.","synopsis_nn":"**Ein mørk og kjekk løyndom frå skogbotnen**, Alagoas-curassowen – Mitu mitu – navigerte ein gong den brasilianske underskogen med elegant forsiktigheit. Men det enkle, bakkebuar-livet gjorde den til tragisk lett bytte for både jegerens snare og tømmerhoggerens sag. I dag gjenlyder berre det vitskaplege namnet i dei no-stille lysningane, ein mørkt humoristisk gravskrift til ein art som rett og slett var for velsmakande og for praktisk plassert."},{"scientific_name":"Tachybaptus rufolavatus","common_name":"Alaotra grebe","iucn_status":"EX","primary_cause":"Habitat loss, hybridization, invasive carnivorous fish","last_sighting_year":null,"region":"Madagascar","wikipedia_url":null,"image_url":"archive_images/tachybaptus_rufolavatus.webp","synopsis_en":"**The evolutionary equivalent of a homebody**, this small diving bird refused to fly anywhere beyond Madagascar's Lake Alaotra. Its cozy, isolated existence was tragically interrupted when humanity introduced carnivorous snakehead fish and nylon gill-nets into its only living room, turning the grebe's singular aquatic sanctuary into a very efficient, localized death trap.","synopsis_nn":"**Den evolusjonære ekvivalenten til ein heimføding**, denne vesle dykkarfuglen nekta å flyge nokon annan stad enn Alaotrasjøen på Madagaskar. Dens koselege, isolerte tilvære vart tragisk avbrote då menneskja førte inn kjøtetande slangehovudfisk og nylongarn i den einaste stova dens, noko som gjorde dykkaren si einskilde vasshellegdom til ei svært effektiv, lokalisert dødsfelle."},{"scientific_name":"Nesillas aldabrana","common_name":"Aldabra brush warbler","iucn_status":"EX","primary_cause":"Invasive species","last_sighting_year":1983,"region":"Aldabra","wikipedia_url":"https://en.wikipedia.org/wiki/Aldabra_brush_warbler","image_url":"archive_images/nesillas_aldabrana.webp","synopsis_en":"**A feathered wisp of Aldabra's breezes**, the brush warbler danced through its island sanctuary, blissfully unaware of the looming shadow. Its delicate existence, honed over millennia, was swiftly undone not by meteorites or volcanoes, but by the pitter-patter of tiny, introduced paws and claws. A tragic, almost comical end for a species that simply couldn't outrun a really hungry house cat.","synopsis_nn":"**Ein fjørlett vindpust frå Aldabra**, børstjesongaren dansa gjennom øyheilagdomen sin, lukkeleg uvitande om skuggen som nærma seg. Den skjøre eksistensen, forma gjennom tusenår, vart raskt oppheva, ikkje av meteorittar eller vulkanar, men av små, introduserte poter og klør. Ein tragisk, nesten komisk slutt for ein art som rett og slett ikkje kunne springa ifrå ein verkeleg svoltvennleg huskatt."},{"scientific_name":"Gambusia amistadensis","common_name":"Amistad gambusia","iucn_status":"EX","primary_cause":"Dam construction","last_sighting_year":1968,"region":"Texas, USA","wikipedia_url":"https://en.wikipedia.org/wiki/Amistad_gambusia","image_url":"archive_images/gambusia_amistadensis.webp","synopsis_en":"**A diminutive denizen of the doomed spring**, the Amistad gambusia faced a truly modern predicament. Its entire world was unceremoniously swallowed by the rising waters behind a dam, a monument to human ingenuity that, quite inadvertently, perfected the art of silent obliteration. Gone, just like that, a victim of progress, proving that sometimes, even the smallest lives can be grandly, ludicrously snuffed out by the biggest of intentions.","synopsis_nn":"**Ein liten innbyggjar frå den dømde kjelda**, møtte Amistad-gambusiaen ei verkeleg moderne knipe. Heile verda hennar vart useremonielt slukt av det stigande vatnet bak ein dam, eit monument over menneskeleg kløkt som, ganske utilsikta, perfeksjonerte kunsten med stilt utrydding. Borte, berre sånn, eit offer for framsteget, som syner at sjølv dei minste liva kan storslått, absurd nok, sløkkjast av dei største intensjonane."},{"scientific_name":"Empetrichthys merriami","common_name":"Ash Meadows killifish","iucn_status":"EX","primary_cause":"Invasive species","last_sighting_year":1953,"region":"Nevada, USA","wikipedia_url":"https://en.wikipedia.org/wiki/Ash_Meadows_killifish","image_url":"archive_images/empetrichthys_merriami.webp","synopsis_en":"**A plucky desert native,** *Empetrichthys merriami* once thrived in Ash Meadows' unique, spring-fed oases. Its millennia-honed resilience, however, proved tragically fragile against a wave of introduced mosquitofish and mollies who, with voracious appetites, simply ate the killifish out of existence. Who knew survival of the fittest meant 'who could get eaten the fastest'?","synopsis_nn":"**Ein modig ørkenbuar,** *Empetrichthys merriami* levde ein gong i dei unike, kjelde-fødde oasane i Ash Meadows. Den tusenårgamle motstandskrafta viste seg dessverre å vera tragisk skjør mot ei bølgje av introduserte mosquitofiskar og mollie-artar, som med glupsk appetitt rett og slett åt killifisken ut av eksistens. Kven visste at «survival of the fittest» tydde «kven som vart eten raskast»?"},{"scientific_name":"Podilymbus gigas","common_name":"Atitlán grebe","iucn_status":"EX","primary_cause":"Invasive species, habitat loss","last_sighting_year":1989,"region":"Guatemala","wikipedia_url":"https://en.wikipedia.org/wiki/Atitlán_grebe","image_url":"archive_images/podilymbus_gigas.webp","synopsis_en":"**A solitary celebrity of one singular lake,** the Atitlán grebe was a flightless connoisseur of its freshwater home, thriving for millennia in blissful, isolated splendor. Its tragic curtain call wasn't from a natural disaster, but from our rather enthusiastic introductions of non-native fish and our relentless reshaping of its shoreline. Now, this once-thriving species is just a ghost in the records, a stark, rather absurd reminder that sometimes, the biggest threat to a unique world is simply a few clumsy human hands.","synopsis_nn":"**Ein einsam kjendis i éin spesiell innsjø,** var atitlángreben ein flygela kjenner av ferskvassheimen sin, som levde i tusenvis av år i lukkeleg, isolert prakt. Det tragiske teppefallet kom ikkje frå ein naturkatastrofe, men frå våre ganske entusiastiske introduksjonar av ikkje-innfødde fiskar og vår nådelause omforming av strandlinja. No er denne ein gong så frodige arten berre eit spøkelse i arkiva, ei skarp, ganske absurd påminning om at den største trugselen mot ei unik verd nokre gonger berre er nokre klønete menneskehender."},{"scientific_name":"Ursus arctos crowtheri","common_name":"Atlas bear","iucn_status":"EX","primary_cause":"Hunting","last_sighting_year":1870,"region":"North Africa","wikipedia_url":"https://en.wikipedia.org/wiki/Atlas_bear","image_url":"archive_images/ursus_arctos_crowtheri.webp","synopsis_en":"**North Africa's shaggy, unsuspecting monarch**, the Atlas bear (Ursus arctos crowtheri) was once the continent's only brown bear, a formidable presence with an ironically gentle disposition. Its tragic curtain call came not from ecological collapse, but from the relentless pursuit of human hunters, sealing the fate of a species whose greatest 'crime' was simply existing in an era of expanding colonial sport.","synopsis_nn":"**Nord-Afrikas lodne, uanande monark**, atlassbjørnen (Ursus arctos crowtheri) var ein gong kontinentets einaste brunbjørn, ei formidabel tilstadevere med eit ironisk mildt lynne. Den tragiske siste framsyninga kom ikkje frå økologisk kollaps, men frå den nådelause jakta av menneskelege jegerar, som forsegla skjebnen til ein art der den største 'forbrytinga' berre var å eksistere i ei tid med ekspanderande kolonial jakt."},{"scientific_name":"Geochelone atlas","common_name":"Atlas Tortoise","iucn_status":"EX","primary_cause":"Climate change, human hunting","last_sighting_year":-12000,"region":"South Asia","wikipedia_url":"https://en.wikipedia.org/wiki/Megalochelys_atlas","image_url":"archive_images/geochelone_atlas.webp","synopsis_en":"**Once a true titan of South Asia**, the Atlas Tortoise, *Geochelone atlas*, met its untimely end through a classic, if tragic, combination. This monumental chelonian, whose sheer scale offered little defence, was hunted to oblivion by humans, while a warming climate sealed its fate. Now, only fossilized whispers recall the terrestrial giant that once walked the Earth.","synopsis_nn":"**Éin gong ein sann titan i Sør-Asia**, møtte Atlaskskjelpadda, *Geochelone atlas*, sin utidige ende gjennom ei velkjend, men tragisk, kombinasjon. Denne monumentale skjelpadda, der den enorme storleiken paradoksalt nok gav lite forsvar, vart jakta til utrydding av menneske, medan eit skiftande klima forsegla skjebnen hennar. I dag minner berre fossiliserte kviskrar om den terrestriske kjempa som ein gong vandra på jorda."},{"scientific_name":"Equus africanus atlanticus","common_name":"Atlas Wild Ass","iucn_status":"EX","primary_cause":"Hunting, Roman arena spectacles","last_sighting_year":300,"region":"North Africa","wikipedia_url":"https://en.wikipedia.org/wiki/African_wild_ass","image_url":"archive_images/equus_africanus_atlanticus.webp","synopsis_en":"**Once a symbol of North African wilderness**, the Atlas Wild Ass met its unfortunate end thanks to a lethal combination of relentless hunting and its tragic popularity in Roman arena spectacles. This magnificent equine, *Equus africanus atlanticus*, offers a stark reminder of humanity's past impact on biodiversity, disappearing from the wild by the 4th century CE. A truly wild spirit, extinguished by human entertainment and expansion.","synopsis_nn":"**Ein gong eit symbol på den nordafrikanske villmarka**, møtte Atlas villassen si tragiske skjebne på grunn av ein dødeleg kombinasjon av intens jakt og den tragiske populariteten i romerske arenaspektakel. Denne storslåtte hestearten, *Equus africanus atlanticus*, er ei dyster påminning om menneska si fortidige innverknad på biologisk mangfald, og forsvann frå villmarka rundt 300-talet e.Kr. Ein verkeleg vill sjel, sløkt av menneskeleg underhaldning og utviding."},{"scientific_name":"Bos primigenius","common_name":"Aurochs","iucn_status":"EX","primary_cause":"Hunting, habitat loss","last_sighting_year":1627,"region":"Europe","wikipedia_url":"https://en.wikipedia.org/wiki/Aurochs","image_url":"archive_images/bos_primigenius.webp","synopsis_en":"**Europe's colossal, grass-munching monarch**, the aurochs once thundered across continents, a magnificent testament to raw, untamed power. Ironically, this ancestor to all domestic cattle found its formidable horns no match for our insatiable appetite and the relentless march of human development, which systematically shrank its vast, wild domain. We domesticated its kin, then hunted the original to oblivion, leaving behind only bones and the tragic punchline of progress.","synopsis_nn":"**Europas storslegne, gras-etande monark**, uroksen tordna ein gong over kontinent, eit majestetisk vitnesbyrd om rå, utemd kraft. Ironisk nok fann dette opphavet til alle tamfe at dei fryktinngytande horna deira ikkje var nokon match for vår umettelege appetitt og den nådelause frammarsjen av menneskeleg utvikling, som systematisk krympa deira vide, ville rike. Vi temde deira slektningar, og jakta deretter den originale til total utsletting, og etterlét berre bein og det tragiske poenget med framsteg."},{"scientific_name":"Vermivora bachmanii","common_name":"Bachman's warbler","iucn_status":"CR (likely extinct)","primary_cause":"Habitat loss","last_sighting_year":1988,"region":"North America","wikipedia_url":"https://en.wikipedia.org/wiki/Bachman%27s_warbler","image_url":"archive_images/vermivora_bachmanii.webp","synopsis_en":"**The diminutive diva of the cypress knee**, Bachman's warbler once lent its unique, buzzy song to the sun-dappled swamps of the American South. Its particular taste for dense, flooded understory proved, alas, to be an inconvenience, as entire ecosystems were simply cleared away for progress, leaving this little performer with nowhere left to take a bow.","synopsis_nn":"**Den vesle divaen frå sypressknea**, Bachman-songaren lånte ein gong sin unike, surrande song til dei soldrypte sumpane i det amerikanske Sør. Dens spesielle smak for tett, overfløymd undervekst viste seg dessverre å vera eit bryderi, då heile økosystem rett og slett vart rydda vekk for framsteg, og lét denne vesle utøvaren utan stad å ta applausen sin."},{"scientific_name":"Lipotes vexillifer","common_name":"Baiji (Yangtze river dolphin)","iucn_status":"CR (Possibly Extinct)","primary_cause":"Pollution, shipping, hydroelectric dams, bycatch","last_sighting_year":null,"region":"China","wikipedia_url":null,"image_url":"archive_images/lipotes_vexillifer.webp","synopsis_en":"**The Goddess of the Yangtze strangled by an economic miracle**, the Baiji navigated its ancient river for 20 million years before encountering industrial capitalism. In a staggering display of rapid-fire environmental degradation, blinding boat propellers, deafening sonar, rolling pollution, and concrete damming efficiently erased an entire apex mammalian lineage in less than fifty years.","synopsis_nn":"**Gudinna av Yangtze, kvevd av eit økonomisk mirakel**, baijien navigerte den eldgamle elva si i 20 millionar år før ho møtte på industrikapitalismen. I ei blendande oppvising av lynrask miljøøydelegging vart ein heil pattedyrslektstava effektivt viska ut på under femti år av blinde propellar, øyredøyvande sonarar, rullande ureining og betongdemningar."},{"scientific_name":"Panthera tigris sondaica","common_name":"Bali Tiger","iucn_status":"EX","primary_cause":"Hunting, habitat loss","last_sighting_year":1937,"region":"Bali, Indonesia","wikipedia_url":"https://en.wikipedia.org/wiki/Bali_tiger","image_url":"archive_images/panthera_tigris_sondaica.webp","synopsis_en":"**Once a stealthy shadow across Bali's verdant landscapes**, the Bali Tiger, *Panthera tigris sondaica*, succumbed to the relentless march of human expansion. Its magnificent stripes, once a vibrant symbol of the island's wild heart, became a coveted target for hunters, while its shrinking habitat offered no refuge. This subspecies now exists only in memory, a stark reminder of unchecked human impact.","synopsis_nn":"**Ein gong ei listig skugge over Balis grøne landskap**, bukka Balitigeren, *Panthera tigris sondaica*, under for den nådelause marsjen til menneskeleg ekspansjon. Dei praktfulle stripene, ein gong eit levande symbol på øyas ville hjarte, vart eit ettertrakta byte for jegerar, medan dei krympande leveområda ikkje lenger gav tryggleik. Denne underarten lever no berre vidare som eit beiskt minne om ukontrollert menneskeleg inngrep."},{"scientific_name":"Panthera leo leo","common_name":"Barbary Lion","iucn_status":"EX","primary_cause":"Hunting, habitat loss","last_sighting_year":1942,"region":"North Africa","wikipedia_url":"https://en.wikipedia.org/wiki/Barbary_lion","image_url":"archive_images/panthera_leo_leo.webp","synopsis_en":"**The majestic Barbary Lion**, once the undisputed king of North Africa, ultimately succumbed to the insatiable twin pressures of human hunting and relentless habitat destruction. This magnificent subspecies, *Panthera leo leo*, vanished from its native realm, leaving behind only echoes in historical accounts and fragmented genetic traces in captive populations. Its extinction serves as a stark, albeit familiar, testament to humanity's often-devastating footprint.","synopsis_nn":"**Den majestetiske berberløva**, ein gong den ubestridde kongen av Nord-Afrika, bukka til slutt under for det umettelege dobbeltpresset frå menneskeleg jakt og nådelaus øydelegging av habitat. Denne storslåtte underarten, *Panthera leo leo*, forsvann frå sitt naturlege rike og etterlet seg berre ekko i historiske forteljingar og fragmenterte genetiske spor i fangne populasjonar. Utryddinga er eit skarpt, men likevel kjent, vitnesbyrd om menneskja sitt ofte øydeleggjande fotavtrykk."},{"scientific_name":"Bermuteo avivorus","common_name":"Bermuda hawk","iucn_status":"EX","primary_cause":"Hunting","last_sighting_year":1600,"region":"Bermuda","wikipedia_url":"https://en.wikipedia.org/wiki/Bermuda_hawk","image_url":"archive_images/bermuteo_avivorus.webp","synopsis_en":"**The Bermuda hawk, a magnificent feathered menace to the island's unsuspecting smaller birds,** once soared unchallenged above the cedar groves. Its keen eyesight and deadly talons, finely tuned for the hunt, proved tragically useless against the blunt force of human muskets, sealing its fate as just another trophy for early settlers. A grim joke for an apex predator, reduced to mere target practice.","synopsis_nn":"**Bermuda-hauken, ein framifrå fjørkledd trussel for dei uvettuge småfuglane på øya,** svevde eingong ubestridt over sedertre-lundane. Det skarpe synet og dei dødeleg klørne, finslipte for jakta, viste seg tragisk nyttelause mot den brutale krafta frå menneskelege musketter, og avgjorde lagnaden deira som berre endå eit trofé for dei første nybyggjarane. Ein grufull spøk for ein toppredator, redusert til berre blinkskyting."},{"scientific_name":"Moho bishopi","common_name":"Bishop's ʻōʻō","iucn_status":"EX","primary_cause":"Habitat loss","last_sighting_year":1904,"region":"Hawaii","wikipedia_url":"https://en.wikipedia.org/wiki/Bishop%27s_ʻōʻō","image_url":"archive_images/moho_bishopi.webp","synopsis_en":"**The forest's greatest virtuoso**, Moho bishopi once composed symphonies in Maui's canopies, a vibrant splash of life amidst the verdant expanse. Its greatest undoing? The very stage it performed on was systematically dismantled, piece by precious piece, for timber and development. The curtain fell not with a grand finale, but with the mundane clearing of land, leaving only the profound, silent irony of a species that simply ran out of room to exist.","synopsis_nn":"**Den største virtuos i skogen**, Moho bishopi komponerte ein gong symfoniar i trekronene på Maui, ein vibrerande fargeklatt av liv i den grøne vidda. Ironien er at scena den spelte på vart systematisk plukka frå kvarandre, bit for bit, for tømmer og utbygging. Teppet fall ikkje med ein storslått finale, men med den kvardagslege ryddinga av land, og etterlèt berre den djupe, tause ironien over ein art som rett og slett gjekk tom for plass til å eksistere."},{"scientific_name":"Drepanis funerea","common_name":"Black mamo","iucn_status":"EX","primary_cause":"Habitat loss, disease","last_sighting_year":1907,"region":"Hawaii","wikipedia_url":"https://en.wikipedia.org/wiki/Black_mamo","image_url":"archive_images/drepanis_funerea.webp","synopsis_en":"**The island's most stylish connoisseur of nectar**, *Drepanis funerea*, the Black Mamo, once graced Hawaiian forests with its sleek, ebony presence. This connoisseur, however, couldn't outsip the bitter brew of habitat destruction and foreign diseases. Its elegant, curved beak became a silent sentinel to a paradise that simply evaporated, proving even perfection can't escape a bad neighborhood and an imported cough.","synopsis_nn":"**Øyas mest stilfulle nektarkjennar**, *Drepanis funerea*, den svarte mamoen, pryda ein gong hawaiiske skogar med sitt smekre, svarte nærvær. Denne finsmakaren klarte likevel ikkje å smake seg unna den bitre blandingen av tap av habitat og framande sjukdommar. Det elegante, krumme nebbet vart eit stumt vitne til eit paradis som berre fordampa, og beviste at sjølv perfeksjon ikkje kan flykte frå eit dårleg nabolag og ein importert hoste."},{"scientific_name":"Coregonus nigripinnis","common_name":"Blackfin cisco","iucn_status":"EX","primary_cause":"Overfishing, invasive species","last_sighting_year":1969,"region":"Great Lakes","wikipedia_url":"https://en.wikipedia.org/wiki/Blackfin_cisco","image_url":"archive_images/coregonus_nigripinnis.webp","synopsis_en":"**A shimmering silver bullet**, the Blackfin Cisco once darted through the Great Lakes, a testament to freshwater bounty. Alas, its prolific numbers were no match for overzealous nets and the greedy maws of invasive lampreys, proving that even a fish designed for abundance can simply vanish. Now, only its name echoes, a dark punchline in the grand comedy of human ambition and ecological blunders.","synopsis_nn":"**Ein glitrande sølvkule**, svartfinnskrekken piltra ein gong gjennom Dei store sjøane, eit prov på ferskvatnrikdom. Akk, dei frodige tala deira var ikkje noka match for overivrige garn og dei grådige kjevane til invaderande lampreyar, noko som beviste at sjølv ein fisk laga for overflod kan berre forsvinne. No er det berre namnet som ekko, ei mørk punchline i den store komedien om menneskeleg ambisjon og økologiske feilsteg."},{"scientific_name":"Hippotragus leucophaeus","common_name":"Bluebuck","iucn_status":"EX","primary_cause":"Hunting","last_sighting_year":1800,"region":"South Africa","wikipedia_url":"https://en.wikipedia.org/wiki/Bluebuck","image_url":"archive_images/hippotragus_leucophaeus.webp","synopsis_en":"**Nature's rarest shade of azure**, this elegant Bluebuck, *Hippotragus leucophaeus*, made itself far too conspicuous for humanity's ever-eager hunting parties. Its breathtaking beauty, a glorious splash across the South African veld, became its ultimate undoing, ensuring its complete disappearance by 1800. A darkly comedic curtain call for a species, proving that sometimes, being utterly gorgeous is simply asking for trouble.","synopsis_nn":"**Natura sin sjeldnaste asurblå nyanse**, denne elegante blåbukken, *Hippotragus leucophaeus*, gjorde seg altfor synleg for menneska sine alltid jaktlystne jaktlag. Den storslåtte venleiken, ein herleg fargeklatt over den sørafrikanske slettene, blei dens ultimate fall og sikra at den forsvann heilt før 1800. Eit mørkt humoristisk teppefall for ein art, som beviste at nokre gonger er det å vere fullstendig nydeleg rett og slett å be om trøbbel."},{"scientific_name":"Columba versicolor","common_name":"Bonin wood pigeon","iucn_status":"EX","primary_cause":"Hunting, habitat loss","last_sighting_year":1889,"region":"Bonin Islands","wikipedia_url":"https://en.wikipedia.org/wiki/Bonin_wood_pigeon","image_url":"archive_images/columba_versicolor.webp","synopsis_en":"**A plump, unwitting target,** the Bonin wood pigeon (Columba versicolor) once graced the verdant forests of the Ogasawara Islands. This strikingly iridescent bird, oblivious to its own delectable destiny, found its gentle existence unravelled by the twin demands of a hungry human palate and rampant habitat destruction. Apparently, even paradise isn't immune to being plucked clean, then paved over.","synopsis_nn":"**Eit fyldig, uvitande mål,** pryda bonindua (Columba versicolor) ein gong dei grøne skogane på Ogasawaraøyane. Denne slåande iriserande fuglen, uvitande om si eiga velsmakande lagnad, fann si rolege tilværing gå tapt grunna dei doble krava frå ein svolten menneskegane og omfattande øydelegging av habitat. Tilsynelatande er ikkje eingong paradis immunt mot å bli plukka reint og deretter asfaltert."},{"scientific_name":"Melomys rubicola","common_name":"Bramble Cay melomys","iucn_status":"EX","primary_cause":"Climate change, sea level rise","last_sighting_year":2009,"region":"Australia","wikipedia_url":"https://en.wikipedia.org/wiki/Bramble_Cay_melomys","image_url":"archive_images/melomys_rubicola.webp","synopsis_en":"**A pint-sized island monarch**, the Bramble Cay melomys once reigned supreme on its minuscule coral cay, oblivious to the fact that its kingdom's foundations were literally melting away. This charming rodent, the first mammal officially extinguished by human-induced climate change, simply watched as its entire world, grain by precious grain, was swallowed by a sea too warm, too high, and utterly unforgiving.","synopsis_nn":"**Ein knøttliten øymonark**, Bramble Cay-melomysen herska ein gong suverent på si knøttlille koralløy, uvitande om at grunnmuren til kongeriket bokstaveleg talt smelta vekk. Denne sjarmerande gnagaren, det første pattedyret som offisielt vart utrydda av menneskeskapt klimaendring, såg rett og slett på medan heile verda hans, korn for dyrebart korn, vart slukt av eit hav som var for varmt, for høgt og heilt nådelaust."},{"scientific_name":"Zosterops conspicillatus","common_name":"Bridled white-eye","iucn_status":"EX","primary_cause":"Brown tree snake","last_sighting_year":1983,"region":"Guam","wikipedia_url":"https://en.wikipedia.org/wiki/Bridled_white-eye","image_url":"archive_images/zosterops_conspicillatus.webp","synopsis_en":"**A delicate eye-candy connoisseur**, the Bridled White-eye once flitted through Guam's canopies, oblivious to its impending doom. Its graceful dance was tragically cut short, not by an asteroid or grand human folly, but by the hungry, accidental arrival of the brown tree snake, proving even paradise has an appetite for the absurd.","synopsis_nn":"**Ein sart augegongs-elskar**, brillefuglen flaksande ein gong gjennom Guam sine trekroner, uvitande om sin snarlige undergang. Den grasiøse dansen vart tragisk avbroten, ikkje av ein asteroide eller storslått menneskeleg dumskap, men av den svoltne, tilfeldige ankomsten av brun tresnok, som beviste at sjølv paradis har ein appetitt for det absurde."},{"scientific_name":"Lophopsittacus mauritianus","common_name":"Broad-billed parrot","iucn_status":"EX","primary_cause":"Hunting, invasive species","last_sighting_year":1674,"region":"Mauritius","wikipedia_url":"https://en.wikipedia.org/wiki/Broad-billed_parrot","image_url":"archive_images/lophopsittacus_mauritianus.webp","synopsis_en":"**With a beak built for battle but a spirit for snacking**, the Broad-billed Parrot once lumbered through its Mauritian paradise, blissfully unaware of the dramatic irony to come. Its impressive mandibles, perfect for cracking the toughest seeds, were tragically useless against hungry sailors and the cunning teeth of introduced rats who devoured its future. What a squawk, to be a unique evolutionary success story, only to vanish so utterly.","synopsis_nn":"**Med eit nebb bygd for kamp men ein sjel for snacking**, vralta den breinebbete papegøyen ein gong gjennom sitt mauritiske paradis, lukkeleg uvitande om den dramatiske ironien som venta. Dei imponerande kjevane, perfekte for å knekke dei hardaste frøa, var tragisk ubrukelege mot svoltne sjømenn og dei slu tennene til innførte rotter som slukte framtida deira. For eit skrik, å vere ein unik evolusjonær suksesshistorie, berre for å forsvinne så totalt."},{"scientific_name":"Potorous platyops","common_name":"Broad-faced potoroo","iucn_status":"EX","primary_cause":"Predation, habitat loss","last_sighting_year":1875,"region":"Australia","wikipedia_url":"https://en.wikipedia.org/wiki/Broad-faced_potoroo","image_url":"archive_images/potorous_platyops.webp","synopsis_en":"**A pint-sized forest frolicker**, this charming Broad-faced Potoroo, with its distinctive wide grin, simply vanished. Its ancient shrubland homes turned to dust and fences, while newcomers with sharper teeth found this unassuming marsupial a tragically convenient snack. What a vanishing act for a creature that deserved an encore.","synopsis_nn":"**Ein knøttliten skogssprettar**, denne sjarmerande breidnasepotoroen, med sitt karakteristiske breie smil, berre forsvann. Dei eldgamle busklandheima hans vart til støv og gjerde, medan nykomarar med skarpare tenner fann dette uanselige pungdyret eit tragisk lettvint måltid. For ei forsvinningsakt for ei skapning som fortente eit ekstranummer."},{"scientific_name":"Alcelaphus buselaphus buselaphus","common_name":"Bubal Hartebeest","iucn_status":"EX","primary_cause":"Overhunting","last_sighting_year":1923,"region":"North Africa","wikipedia_url":"https://en.wikipedia.org/wiki/Bubal_hartebeest","image_url":"archive_images/alcelaphus_buselaphus_buselaphus.webp","synopsis_en":"**Once an iconic inhabitant of North Africa's plains**, the Bubal Hartebeest, *Alcelaphus buselaphus buselaphus*, proved an irresistible target, hunted to oblivion by the relentless pursuit of human expansion. This distinctive antelope, a marvel of adaptation, regrettably joined the ranks of the 'extinct' solely due to the fatal precision of our rifles. Its absence is a silent, enduring testament to the finality of overzealous resource extraction.","synopsis_nn":"**Ein gong ein ikonisk art på slettene i Nord-Afrika**, viste bubalhartebusten, *Alcelaphus buselaphus buselaphus*, seg å vera eit uimotståeleg bytte, jakta til utrydding av nådelaus menneskeleg ekspansjon. Denne særeigne antilopen, eit under av tilpassing, hamna dessverre i rekka av 'utrydda' berre på grunn av den dødelege presisjonen frå riflene våre. Fråveret av den er eit stille, varig vitnesbyrd om den endelege konsekvensen av overdriven ressursutnytting."},{"scientific_name":"Xenicus longipes","common_name":"Bushwren","iucn_status":"EX","primary_cause":"Invasive species","last_sighting_year":1972,"region":"New Zealand","wikipedia_url":"https://en.wikipedia.org/wiki/Bushwren","image_url":"archive_images/xenicus_longipes.webp","synopsis_en":"**A feather-light forest phantom**, the Bushwren once flitted through New Zealand's undergrowth, a tiny, insectivorous blur. Ironically, this master of evasion, so adept at disappearing from sight, ultimately couldn't outrun the silent, furry paws of introduced predators. Its lithe spirit now only dances in memory, a testament to ecological oversight.","synopsis_nn":"**Ein fjørlett skogsfantom**, buskvridaren flagra ein gong gjennom kratt i New Zealand, ein liten, insektetande uskarp flekk. Ironisk nok kunne denne meisteren i unnviking, så dyktig til å forsvinna frå syne, ikkje springa frå dei stille, pelskledde potane til introduserte rovdyr. Den lette ånda hennar dansar no berre i minnet, eit prov på økologisk uaktsomheit."},{"scientific_name":"Haematopus meadewaldoi","common_name":"Canary Islands oystercatcher","iucn_status":"EX","primary_cause":"Hunting, disturbance","last_sighting_year":1940,"region":"Canary Islands","wikipedia_url":"https://en.wikipedia.org/wiki/Canary_Islands_oystercatcher","image_url":"archive_images/haematopus_meadewaldoi.webp","synopsis_en":"**A diligent coastal connoisseur, whose predictable presence was its undoing**, the Canary Islands oystercatcher once graced these shores, a striking flash of black and red. Its simple desire for an undisturbed meal and a quiet patch of sand, however, proved fatally inconvenient; a cocktail of human disturbance and leisurely target practice ensured this charming bird would become permanently unavailable for future viewing.","synopsis_nn":"**Ein flittig kystkjenner, viss føreseielege nærvær vart til undergangen**, kanariøysteren pryda ein gong desse strendene, eit slåande glimt av svart og raudt. Det enkle ønsket hennar om eit uforstyrra måltid og ein roleg sandflekk, viste seg derimot å vere dødeleg upraktisk; ein cocktail av menneskeleg forstyrring og fritidsskyting sørga for at denne sjarmerande fuglen vart permanent utilgjengeleg for framtidig skode."},{"scientific_name":"Chioninia coctei","common_name":"Cape Verde giant skink","iucn_status":"EX","primary_cause":"Predation, habitat loss","last_sighting_year":1912,"region":"Cape Verde","wikipedia_url":"https://en.wikipedia.org/wiki/Cape_Verde_giant_skink","image_url":"archive_images/chioninia_coctei.webp","synopsis_en":"**A veritable slow-food delicacy**, the Cape Verde giant skink once reigned, albeit languidly, over its island home. Unfortunately for this magnificent reptile, its slow pace and colossal size made it both an effortless meal for newly introduced predators and an easy target as its habitat was systematically whittled away, leaving only the grim irony of its name echoing in the wind.","synopsis_nn":"**Ei sann gourmet-delikatesse**, den kappverdiske kjempeskinken herska ein gong, om enn maklaust, over øyheimen sin. Dessverre for dette storslåtte krypdyret, gjorde den langsame farten og den digre storleiken den til både eit enkelt måltid for nye rovdyr og eit lett byte då leveområdet systematisk vart smuldra bort, og etterlét berre den dystre ironien i namnet som ekko i vinden."},{"scientific_name":"Neomonachus tropicalis","common_name":"Caribbean monk seal","iucn_status":"EX","primary_cause":"Hunting, habitat loss","last_sighting_year":1952,"region":"Caribbean","wikipedia_url":"https://en.wikipedia.org/wiki/Caribbean_monk_seal","image_url":"archive_images/neomonachus_tropicalis.webp","synopsis_en":"**A blissfully ignorant sunbather**, the Caribbean monk seal once basked on tranquil shores, utterly oblivious to the ticking clock of its existence. Hunted relentlessly for its blubber and oils, then out-competed for every patch of diminishing sand, this gentle giant simply vanished. Its quiet disappearance serves as a darkly comedic punchline to a human-made joke, leaving behind only echoes and a void where its lazy days once were.","synopsis_nn":"**Ein lukkeleg uvitande livsnytar i sola**, den karibiske munkeselen kosa seg ein gong på fredelege strender, fullstendig uvitande om at livsklokka tikka ned. Jaga nådelaust for spekk og olje, og så utkonkurrert for kvar einaste rest av sand, forsvann denne milde kjempa rett og slett. Den rolege forsvinninga vart ei mørkt-komisk oppsummering av ein menneskeskapt spøk, som berre etterlet seg ekko og eit tomrom der late dagar ein gong rådde."},{"scientific_name":"Conuropsis carolinensis","common_name":"Carolina parakeet","iucn_status":"EX","primary_cause":"Hunting, habitat loss","last_sighting_year":1918,"region":"North America","wikipedia_url":"https://en.wikipedia.org/wiki/Carolina_parakeet","image_url":"archive_images/conuropsis_carolinensis.webp","synopsis_en":"**A squawking kaleidoscope of emerald and gold**, the Carolina parakeet was, regrettably, too fabulous for its own good. Its dazzling plumage made it a fashionable target for hats, while its collective taste for cultivated crops sealed its ironic fate as an agricultural 'pest' – even as its forest home was razed for those very farms. This vibrant confetti of life flew its last, leaving only the melancholic silence where once a raucous, colourful cacophony reigned.","synopsis_nn":"**Eit skvatrande kalejdoskop av smaragd og gull**, karolinaparakitten var, diverre, for fabelaktig for sitt eige beste. Den blenkjande fjørdrakta gjorde den til eit moteriktig mål for hattar, medan den kollektive smaken for dyrka avlingar forsegla den ironiske skjebnen som eit landbruks-'skadedyr' – sjølv då skogheimane vart jamna med jorda for dei same gardane. Denne livlege konfettien av liv flaug for siste gong, og etterlèt berre den melankolske stilla der ein gong ein støyande, fargerik kakofoni rådde."},{"scientific_name":"Panthera tigris virgata","common_name":"Caspian Tiger","iucn_status":"EX","primary_cause":"Hunting, habitat destruction","last_sighting_year":1970,"region":"Central Asia, Iran, Turkey","wikipedia_url":"https://en.wikipedia.org/wiki/Caspian_tiger","image_url":"archive_images/panthera_tigris_virgata.webp","synopsis_en":"**Once a magnificent ghost of the riparian forests and reed beds of Central Asia, Iran, and Turkey**, the Caspian Tiger (Panthera tigris virgata) now exists solely in the annals of extinction. Its vibrant stripes, once a symbol of the wild expanse, faded into oblivion, largely due to relentless human hunting and the destruction of its vital habitat. A stark reminder of biodiversity lost, its story echoes the irreversible consequences of unchecked expansion and exploitation.","synopsis_nn":"**Ein gong eit storslått spøkelse i strandskogane og sivfelta i Sentral-Asia, Iran og Tyrkia**, finst kaspisk tiger (Panthera tigris virgata) no berre i utryddingshistorikken. Dei levande stripene, ein gong eit symbol på den ville vidda, forsvann i gløymsle, hovudsakleg på grunn av ustoppeleg jakt og øydelegging av livsviktige habitat. Ei tydeleg påminning om tapt biologisk mangfald, forteljinga resonnerer med dei irreversible konsekvensane av ukontrollert ekspansjon og utnytting."},{"scientific_name":"Anthornis melanocephala","common_name":"Chatham bellbird","iucn_status":"EX","primary_cause":"Invasive species","last_sighting_year":1906,"region":"Chatham Islands","wikipedia_url":"https://en.wikipedia.org/wiki/Chatham_bellbird","image_url":"archive_images/anthornis_melanocephala.webp","synopsis_en":"**A liquid-gold lament**, the Chatham bellbird once filled island forests with its chiming song. Its vibrant future, however, wasn't silenced by a grand cataclysm, but by the prosaic appetites of scuttling rats and purring cats. Now, only the wind whistles a mournful tune where its melodies once danced, a stark reminder that even the most exquisite voices can be undone by the most mundane invaders.","synopsis_nn":"**Ein flytande gull-klagesong**, fylte Chatham-klokkefuglen ein gong øyseskogane med sin klingande song. Den livlege framtida hennar vart likevel ikkje stilna av ei stor katastrofe, men av dei prosaiske appetittane til snikande rotter og spinnande kattar. No plystrar berre vinden ein sørgmodig melodi der songane hennar ein gong dansa, ei skarp påminning om at sjølv dei mest utsøkte stemmene kan bli øydelagde av dei mest kvardagslege inntrengarane."},{"scientific_name":"Psephurus gladius","common_name":"Chinese paddlefish","iucn_status":"EX","primary_cause":"Overfishing, dams","last_sighting_year":2003,"region":"China","wikipedia_url":"https://en.wikipedia.org/wiki/Chinese_paddlefish","image_url":"archive_images/psephurus_gladius.webp","synopsis_en":"**A riverine ghost, nearly seven meters long**, the Chinese paddlefish once patrolled the Yangtze, an ancient leviathan impervious to almost any natural threat. Yet, this two-hundred-million-year survivor met its absurd end not by predators, but by our insatiable nets and ingeniously placed concrete dams. What a dark punchline for such a majestic, millennia-spanning fish.","synopsis_nn":"**Eit spøkjelse frå elva, nesten sju meter langt**, patruljerte den kinesiske stjernestøyen ein gong Yangtze-elva, ein eldgammal kjempe som var motstandsdyktig mot nesten alle naturlege trugslar. Men denne to hundre millionar år gamle overlevaren møtte sin absurde ende, ikkje av rovdyr, men av våre umettelege garn og genialt plasserte betongdammar. Kva for ein mørk latter for ein slik majestetisk, tusenårsgammal fisk!"},{"scientific_name":"Atelopus chiriquiensis","common_name":"Chiriqui harlequin frog","iucn_status":"CR (likely extinct)","primary_cause":"Disease (chytrid fungus)","last_sighting_year":1996,"region":"Costa Rica/Panama","wikipedia_url":"https://en.wikipedia.org/wiki/Atelopus_chiriquiensis","image_url":"archive_images/atelopus_chiriquiensis.webp","synopsis_en":"**A fluorescent forest phantom**, the Chiriqui harlequin frog once graced the streams of Central America with its vibrant presence. But its dazzling life wasn't extinguished by a mighty predator; instead, a microscopic, waterborne fungus swept through its world with devastating, almost comically indifferent, efficiency. Now, only the chilling irony of its quiet disappearance remains, a testament to an invisible foe's tragic power.","synopsis_nn":"**Eit lysande skogsfantom**, frosken Atelopus chiriquiensis pryda ein gong elvane i Mellom-Amerika med sitt levande nærvær. Men det blendande livet hans vart ikkje sløkt av eit mektig rovdyr; i staden sveipte ein mikroskopisk, vassboren sopp gjennom verda hans med øydeleggjande, nesten komisk likeglad, effektivitet. No er det berre den gruvekkjande ironien i den stille forsvinninga hans att, eit vitnesbyrd om ei usynleg fiendes tragiske makt."},{"scientific_name":"Microgoura meeki","common_name":"Choiseul pigeon","iucn_status":"EX","primary_cause":"Predation by cats","last_sighting_year":1904,"region":"Solomon Islands","wikipedia_url":"https://en.wikipedia.org/wiki/Choiseul_pigeon","image_url":"archive_images/microgoura_meeki.webp","synopsis_en":"**A plump, unsuspecting soul**, the Choiseul pigeon once cooed through the undergrowth of its island home, a gentle denizen oblivious to the creeping shadow of its doom. It wasn't a meteor, nor a plague, but the 'purr-fect' predator—domestic cats—that penned its tragic final chapter, proving even the most mundane threat can silence a species forever.","synopsis_nn":"**Ein lubben, intetanande sjel**, duva frå Choiseul duva ein gong gjennom undervegetasjonen på øyheimen sin, ein mild innbyggjar uvitande om den snikande skuggen av undergangen sin. Det var ikkje ein meteor, ei heller ei plage, men det 'mjau-perfekte' rovdyret – huskattar – som skreiv det tragiske siste kapittelet, og beviste at sjølv den mest kvardagslege trugselen kan stilne ein art for alltid."},{"scientific_name":"Pipistrellus murrayi","common_name":"Christmas Island pipistrelle","iucn_status":"EX","primary_cause":"Unknown decline","last_sighting_year":2009,"region":"Christmas Island","wikipedia_url":"https://en.wikipedia.org/wiki/Christmas_Island_pipistrelle","image_url":"archive_images/pipistrellus_murrayi.webp","synopsis_en":"**A nimble nocturnal hunter**, the Christmas Island pipistrelle performed the ultimate vanishing act with chilling, unobserved precision. This four-gram bat, once a common flicker against the island's twilight, simply ceased to be. In a darkly comedic twist, its extinction remains a poignant, unresolved whodunit, leaving behind only the echoing silence of an 'unknown decline'.","synopsis_nn":"**Ein smidig nattjegar**, utførte Christmas Island-dvergflaggermusa det ultimate forsvinningsnummeret med skremmande, uobservert presisjon. Denne firegramsflaggermusa, ein gong eit vanleg glimt i skumringa på øya, slutta rett og slett å eksistere. I ei mørkt komisk vending er utryddinga hennar framleis eit gripande, uløyst mysterium, som berre etterlèt den ekkande stilla av ein 'ukjend tilbakegang'."},{"scientific_name":"Crocidura trichura","common_name":"Christmas Island shrew","iucn_status":"EX","primary_cause":"Invasive species, disease","last_sighting_year":1985,"region":"Christmas Island","wikipedia_url":"https://en.wikipedia.org/wiki/Christmas_Island_shrew","image_url":"archive_images/crocidura_trichura.webp","synopsis_en":"**A mere morsel of mammal**, the Christmas Island Shrew (*Crocidura trichura*) vanished not with an epic struggle, but with a series of microscopic sniffles and a silent, scuttling retreat. This lithe, unassuming insectivore, once a bustling presence, found its delicate existence no match for a darkly comedic cocktail of introduced pests and novel pathogens. Its quiet, almost absurdly swift disappearance serves as a poignant, if somewhat playful, punchline to the island's ecological vulnerabilities.","synopsis_nn":"**Berre ein munnfull pattedyr**, juløy-spissmusa (*Crocidura trichura*) forsvann ikkje med ein episk kamp, men med ei rekkje mikroskopiske snufsingar og ein stille, skurande retrett. Dette lette, uanselige insektetaren, ein gong ein travel del av økosystemet, fann den skjøre tilværet sitt ingen match for ein mørkt komisk cocktail av introduserte skadedyr og nye patogen. Den stille, nesten absurd raske forsvinninga hennar fungerer som ein gripande, om enn noko leikent, poeng for øya sine økologiske sårbarheiter."},{"scientific_name":"Podiceps andinus","common_name":"Colombian grebe","iucn_status":"EX","primary_cause":"Pollution, habitat loss","last_sighting_year":1977,"region":"Colombia","wikipedia_url":"https://en.wikipedia.org/wiki/Colombian_grebe","image_url":"archive_images/podiceps_andinus.webp","synopsis_en":"**A charming master of the serene Andean depths**, the Colombian grebe (Podiceps andinus) once waltzed through its pristine lake habitat, blissfully unaware that its liquid ballroom was slated for a toxic makeover. Humanity, ever the thoughtful interior designer, kindly redecorated with industrial runoff and dwindling shores, leaving this elegant diver nowhere to dance but into oblivion – a truly modern tragedy with an utterly predictable punchline.","synopsis_nn":"**Ein sjarmerande meistrar av dei rolege Andes-djupa**, den kolombianske lappedykkaren (Podiceps andinus) valsa ein gong gjennom sitt urørte innsjøhabitat, lukkeleg uvitande om at det flytande ballrommet var planlagt for ei giftig overhaling. Menneskja, alltid den omtenksame interiørdesignaren, pusla venleg opp med industrielt avrenning og krympande strandlinjer, og lét denne elegante dykkaren ingen stad å danse, anna enn inn i gløymsla – ein verkeleg moderne tragedie med eit fullstendig føreseieleg sluttpoeng."},{"scientific_name":"Conus lugubris","common_name":"Conus lugubris","iucn_status":"EX","primary_cause":"Coastal development","last_sighting_year":1987,"region":"Cape Verde","wikipedia_url":"https://en.wikipedia.org/wiki/Conus_lugubris","image_url":"archive_images/conus_lugubris.webp","synopsis_en":"**A fragile jewel of the tideline**, *Conus lugubris* once hunted the pristine shallows with quiet grace. This exquisitely patterned cone snail didn't fall to a predator's hunger, but rather to the relentless march of coastal development, exchanging its vital sandy realms for concrete dreams and melancholic memory.","synopsis_nn":"**Ein skjørb juvel i tidvasgrensa**, *Conus lugubris* jakta ein gong i dei uberørte gruntområda med stille ynde. Denne utsøkt mønstra kjeglesnigelen fall ikkje for ein predators svolt, men snarare for den ubøyelege frammarsjen av kystutvikling, og bytte ut sine vitale sandrike rike med konkrete draumar og melankolsk minne."},{"scientific_name":"Onychogalea lunata","common_name":"Crescent nail-tail wallaby","iucn_status":"EX","primary_cause":"Predation by foxes","last_sighting_year":1956,"region":"Australia","wikipedia_url":"https://en.wikipedia.org/wiki/Crescent_nail-tail_wallaby","image_url":"archive_images/onychogalea_lunata.webp","synopsis_en":"**A crescent moon on nimble feet**, the Onychogalea lunata, or Crescent Nail-tail Wallaby, was a marvel of nocturnal agility, darting through the Australian landscape with its distinctive claw-tipped tail. This lithe phantom, exquisitely evolved to outmaneuver ancient threats, met its melancholic end not from a grand cosmic event, but the simple, relentless hunger of a red fox. An absurdly understated tragedy for such a unique, nimble spirit.","synopsis_nn":"**Ein halvmåne på snøgge føter**, Onychogalea lunata, eller halvmåne-klohalewallabyen, var eit under av nattleg smidigheit, som pila gjennom det australske landskapet med sin særeigne klo-tippa hale. Dette smidige fantomet, utsøkt utvikla for å overliste eldgamle truslar, møtte si melankolske slutt ikkje frå ei storslått kosmisk hending, men den enkle, nådelause svelta til ein raudrev. Ein absurd underdriven tragedie for ein så unik, lettfør ånd."},{"scientific_name":"Viola cryana","common_name":"Cry violet","iucn_status":"EX","primary_cause":"Quarrying","last_sighting_year":1930,"region":"France","wikipedia_url":"https://en.wikipedia.org/wiki/Viola_cryana","image_url":"archive_images/viola_cryana.webp","synopsis_en":"**Nature's own little rock rebel**, *Viola cryana* was a vibrant splash of purple perfectly at home amidst Virginia's stark limestone barrens. Tragically, its very niche—thriving on the highly specific, calcium-rich soils—made it a prime, unwitting victim of relentless quarrying. This tenacious violet, quite literally, had its world ground into dust for human infrastructure, a truly 'rocky' end to a species that deserved to keep its stony haven.","synopsis_nn":"**Natura sin eigen lille stein-rebell**, *Viola cryana* var eit levande purpurfarga innslag perfekt heime i Virginias nakne kalksteinslandskap. Tragisk nok gjorde nettopp nisjen hennar – å trivast på den svært spesifikke, kalsiumrike jorda – henne til eit hovudmål, utan å vite det, for ustoppeleg steinbrotverksemd. Denne hardføre fiolen fekk bokstavleg talt verda si pulverisert for menneskeleg infrastruktur, ein verkeleg 'stein-hard' slutt for ein art som fortente å behalde sin steinete tilfluktsstad."},{"scientific_name":"Ara tricolor","common_name":"Cuban macaw","iucn_status":"EX","primary_cause":"Hunting, trapping","last_sighting_year":1885,"region":"Cuba","wikipedia_url":"https://en.wikipedia.org/wiki/Cuban_macaw","image_url":"archive_images/ara_tricolor.webp","synopsis_en":"**A living firework of the Caribbean sky**, the Cuban macaw (Ara tricolor) once blazed across island canopies in a riot of red, blue, and gold. This magnificent avian display, ironically, was extinguished not by cosmic forces, but by human hands, hunted and trapped relentlessly for its dazzling beauty. What a way to appreciate a masterpiece: admire it to death, leaving only silent museum specimens in its wake.","synopsis_nn":"**Eit levande fyrverkeri på karibisk himmel**, den kubanske araen (Ara tricolor) flamma ein gong over øyenes trekroner i eit mylder av raudt, blått og gull. Denne storslåtte fugleoppvisinga vart, ironisk nok, sløkt ikkje av kosmiske krefter, men av menneskehender, jakta og fanga nådelaust for sin strålande venleik. For ein måte å verdsetje eit meisterverk på: å beundre det til døde, og berre etterlate stille museumseksemplar i sitt kjølvatn."},{"scientific_name":"Cyanea superba","common_name":"Cyanea superba","iucn_status":"EW","primary_cause":"Habitat loss, invasive species","last_sighting_year":2003,"region":"Hawaii","wikipedia_url":"https://en.wikipedia.org/wiki/Cyanea_superba","image_url":"archive_images/cyanea_superba.webp","synopsis_en":"**Hawaii's very own botanical superstar, Cyanea superba**, once graced the islands with its truly magnificent, bell-shaped flowers. One might imagine a dramatic exit, but its 'superb' run ended not with a bang, but a series of nibbles: from introduced pigs and slugs, coupled with its precious forest home slowly turning into suburbia. A tragically mundane curtain call for such a diva.","synopsis_nn":"**Hawaii si eiga botaniske superstjerne, Cyanea superba**, pryda ein gong øyane med dei sanne, praktfulle, klokkeforma blomane sine. Ein kunne førestille seg ein dramatisk sorti, men den 'superbe' karrieren enda ikkje med eit smell, men med ei rekkje smågnag: frå innførte griser og sniglar, saman med at den dyrebare skogheimen sakte vart omgjort til forstad. Eit tragisk kvardagsleg teppefall for ei slik diva."},{"scientific_name":"Coregonus johannae","common_name":"Deepwater cisco","iucn_status":"EX","primary_cause":"Overfishing, invasive species","last_sighting_year":1952,"region":"Great Lakes","wikipedia_url":"https://en.wikipedia.org/wiki/Deepwater_cisco","image_url":"archive_images/coregonus_johannae.webp","synopsis_en":"**The unsuspecting deepwater diner,** *Coregonus johannae* once thrived in the Great Lakes, a plump, silvery delight. Its downfall? Being utterly delectable to hungry humans and wholly unprepared for the ravenous appetites of new, spikier neighbors. Now, this perfectly ordinary fish is just an extraordinary absence, a watery punchline to a darkly comedic ecological tragedy.","synopsis_nn":"**Den intetanande djuphavsetaren,** *Coregonus johannae* blomstra ein gong i Dei store sjøane, ein lubben, sølvglinsande fryd. Undergangen? Å vera uimotståeleg velsmakande for svoltne menneske, og totalt uførebudd på den glupske appetitten til nye, piggete naboar. No er denne heilt vanlege fisken berre eit ekstraordinært fråvær, ein vassbasert punchline i ein mørkt komisk økologisk tragedie."},{"scientific_name":"Hoplodactylus delcourti","common_name":"Delcourt's Giant Gecko","iucn_status":"EX","primary_cause":"Predation by introduced species","last_sighting_year":1870,"region":"New Zealand","wikipedia_url":"https://en.wikipedia.org/wiki/Hoplodactylus_delcourti","image_url":"archive_images/hoplodactylus_delcourti.webp","synopsis_en":"**The titan among geckos**, *Hoplodactylus delcourti* once silently patrolled New Zealand's ancient forests, a true behemoth in the reptilian world. This magnificent, isolated giant, potentially the largest gecko ever recorded, succumbed not to time, but to the swift, often unseen, predation of introduced species. Its extinction stands as a poignant, almost farcical, testament to the fragility of island ecosystems and the devastating cost of colonial ambition.","synopsis_nn":"**Titanen blant gekkoane**, *Hoplodactylus delcourti*, patruljerte ein gong stille i New Zealands eldgamle skogar, eit sant beist i reptilverda. Denne storslåtte, isolerte kjempa, moglegvis den største gekkoen som nokon gong er registrert, bukka under ikkje for tidas tann, men for den raske, ofte usynlege, predasjonen frå innførte artar. Utøyddinga hennar står som eit gripande, nesten farseaktig, vitnesbyrd om sårbarheita til økosystem på øyar og den øydeleggjande kostnaden av kolonial ambisjon."},{"scientific_name":"Delissea sinuata","common_name":"Delissea sinuata","iucn_status":"EX","primary_cause":"Habitat loss, invasive species","last_sighting_year":1937,"region":"Hawaii","wikipedia_url":"https://en.wikipedia.org/wiki/Hawaiian_lobelioids","image_url":"archive_images/delissea_sinuata.webp","synopsis_en":"**A master of serene obscurity, Delissea sinuata**, once flourished in its secluded Hawaiian havens, tragically unprepared for the onslaught of hungry hooves and foreign flora. Its unassuming beauty was no match for the dual punch of habitat destruction and invasive species, leading to a quiet, almost apologetic disappearance from the world's stage.","synopsis_nn":"**Ein meister i roleg obskuritet, Delissea sinuata**, blømde ein gong i sine avsidesliggjande hawaiiske tilfluktsstader, tragisk uførebudd på åtaket frå svoltne klovdyr og framande plantar. Den ufordrande venleiken hennar var ingen match for det doble slaget av tap av habitat og invaderande artar, noko som førte til ei stille, nesten unnskyldande forsvinning frå verdsscena."},{"scientific_name":"Bettongia anhydra","common_name":"Desert bettong","iucn_status":"EX","primary_cause":"Predation, habitat loss","last_sighting_year":1933,"region":"Australia","wikipedia_url":"https://en.wikipedia.org/wiki/Bettongia_anhydra","image_url":"archive_images/bettongia_anhydra.webp","synopsis_en":"**A pint-sized desert dancer**, the Desert Bettong once scurried through arid lands, a vital architect of its ecosystem, diligently digging for fungi and roots. Yet, this nimble marsupial, accustomed to dodging dingoes, found itself comically outmatched by the new, sharper teeth of foxes and feral cats, its vital desert home vanishing beneath its very paws. A testament to nature's grim punchline: sometimes, being quick on your feet isn't quite enough when the world pulls the rug out from under them.","synopsis_nn":"**Ein knøttliten ørkendansar**, ørkenbettongen pilte ein gong gjennom tørre landskap, ein viktig arkitekt for økosystemet sitt, og grov flittig etter sopp og røter. Men dette smidige pungdyret, vant til å unngå dingoar, fann seg komisk overgått av dei nye, skarpare tennene til revar og villkattar, medan det livsviktige ørkenheimen forsvann under potane på det. Eit vitnesbyrd om naturens dystre poeng: nokre gonger er det ikkje nok å vere rask på føtene når verda riv teppet vekk under det."},{"scientific_name":"Caloprymnus campestris","common_name":"Desert rat-kangaroo","iucn_status":"EX","primary_cause":"Predation, drought","last_sighting_year":1935,"region":"Australia","wikipedia_url":"https://en.wikipedia.org/wiki/Desert_rat-kangaroo","image_url":"archive_images/caloprymnus_campestris.webp","synopsis_en":"**The desert's tiny dancer**, the Caloprymnus campestris (or Desert rat-kangaroo), once navigated the harsh Outback with an elegant, almost comical grace. But neither its nimble leaps nor its remarkable adaptability could outrun the gnawing thirst of prolonged droughts or the new, sharper teeth introduced to its ancient home. A poignant ballet of survival, ultimately undone by a dry landscape and the silent, hungry shadows.","synopsis_nn":"**Ørkenens vesle dansar**, Caloprymnus campestris (eller ørkenrottekenguruen), navigerte ein gong den barske utmarka med ein elegant, nesten komisk ynde. Men korkje dei smidige hoppa hennar eller den bemerkelsesverdige tilpassingsevna kunne overleva den gnagande tørsten frå langvarige tørkar eller dei nye, skarpare tennene som vart introduserte til hennar eldgamle heim. Ein gripande overlevingsballett, til slutt øydelagd av eit tørt landskap og dei stille, svoltne skuggane."},{"scientific_name":"Diospyros angulata","common_name":"Diospyros angulata","iucn_status":"EX","primary_cause":"Habitat loss","last_sighting_year":1851,"region":"Mauritius","wikipedia_url":"https://en.wikipedia.org/wiki/Diospyros_tessellaria","image_url":"archive_images/diospyros_angulata.webp","synopsis_en":"**A quiet contender of forgotten canopies**, *Diospyros angulata* once thrived, a verdant whisper in the ancient woods. Its ultimate undoing? Not a grand battle for survival, but the rather mundane disappearance of its home, leaving this once-flourishing flora nowhere to grow its roots.","synopsis_nn":"**Ein stille utfordrar i gløymde trekroner**, *Diospyros angulata* trivst ein gong, eit grønt kviskring i dei eldgamle skogane. Den ultimate undergangen? Ikkje ein storslått kamp for overleving, men den heller prosaiske forsvinningen av heimen hennar, som etterlet denne tidlegare blomstrande floraen utan ein stad å slå røter."},{"scientific_name":"Canis dirus","common_name":"Dire Wolf","iucn_status":"EX","primary_cause":"Climate change, megafaunal extinction","last_sighting_year":-9500,"region":"Americas","wikipedia_url":"https://en.wikipedia.org/wiki/Dire_wolf","image_url":"archive_images/canis_dirus.webp","synopsis_en":"**The iconic apex predator of the Pleistocene Americas**, the Dire Wolf (Canis dirus) met its demise alongside the very megafauna it once hunted. A victim of shifting climates and the subsequent collapse of its large prey base, this formidable canine, larger than modern wolves, serves as a poignant reminder of nature's brutal adaptability – or lack thereof. Its impressive fossil record stands as a testament to a bygone era, a stark warning etched in ancient bone.","synopsis_nn":"**Det ikoniske topprovdyret i pleistocen-Amerika**, Direulven (Canis dirus) møtte sin undergang saman med den same megafaunaen han jakta på. Eit offer for skiftande klima og den etterfølgjande kollapsen av byttedyrbasen, står dette formidable hundedyret, større enn moderne ulvar, som ei gripande påminning om naturens brutale tilpassingsevne – eller mangel på den. Det imponerande fossile materialet er eit vitnesbyrd om ei svunnen tid, ei skarp åtvaring rissa inn i gamle bein."},{"scientific_name":"Raphus cucullatus","common_name":"Dodo","iucn_status":"EX","primary_cause":"Hunting, invasive species","last_sighting_year":1662,"region":"Mauritius","wikipedia_url":"https://en.wikipedia.org/wiki/Dodo","image_url":"archive_images/raphus_cucullatus.webp","synopsis_en":"**A plump, flightless marvel**, the Dodo once waddled across Mauritius, blissfully unaware its evolutionary paradise was about to become a culinary stopover. Its gentle nature and lack of natural predators ill-equipped it for the hungry sailors and their accompanying menagerie of invasive species, who swiftly—and absurdly—devoured its future. A truly monumental vanishing act.","synopsis_nn":"**Eit lubbent, flygelaust underverk**, vandret dodoen ein gong over Mauritius, salig uvitande om at det evolusjonære paradiset deira snart skulle bli ein kulinarisk rasteplass. Den milde naturen og mangelen på naturlege fiendar gjorde den dårleg rusta for svoltne sjømenn og deira medfølgjande dyreflokk av invaderande artar, som raskt – og absurd nok – fortærte framtida hennar. Ein verkeleg monumental forsvinningsakt."},{"scientific_name":"Felis catus","common_name":"Domestic Cat","iucn_status":"LC","primary_cause":null,"last_sighting_year":null,"region":null,"wikipedia_url":"https://en.wikipedia.org/wiki/Felis_catus","image_url":"archive_images/felis_catus.webp","synopsis_en":"**From desert-dwelling loners to internet overlords**, these pint-sized predators traded pest control for premium upholstery and global worship. They effectively self-domesticated (luring us with strategic purring) to conquer every corner of the planet while maintaining the cold gaze of their Near Eastern wildcat ancestors.","synopsis_nn":"**Frå einslege ørkenjegerar til herskarar over verdsveven**, bytte desse små rovdyra skadedyrkontroll mot luksuriøse møblar og global tilbeding. Dei domestiserte seg sjølve (ved å lokka oss med strategisk maling) for å erobra kvar krik og krok av planeten medan dei beheldt det kalde blikket til sine forfedrar frå Nære Austen."},{"scientific_name":"Notropis aulidion","common_name":"Durango shiner","iucn_status":"EX","primary_cause":"Habitat loss","last_sighting_year":1965,"region":"Mexico","wikipedia_url":"https://en.wikipedia.org/wiki/Durango_shiner","image_url":"archive_images/notropis_aulidion.webp","synopsis_en":"**A fleeting whisper of silver**, the Durango shiner once graced its very particular corner of Mexican waters. What a cosmic jest that such a specific, irreplaceable aquatic address could simply cease to exist, not with a bang, but because a few too many puddles decided to pack up and leave. Now, only the echo of its shimmering absence remains, a testament to... progress?","synopsis_nn":"**Eit flyktig sølvvisk**, Durango-shineren pryda ein gong sin heilt særeigne krok i meksikansk farvatn. For ein kosmisk spøk at ei så spesifikk, uerstatteleg vassadresse berre kunne slutte å eksistere, ikkje med eit smell, men fordi nokre for mange dammar bestemte seg for å pakke saman og dra. No er det berre ekkoet av det glitrande fråværet som er att, eit vitnesbyrd om... framsteg?"},{"scientific_name":"Pteropus brunneus","common_name":"Dusky flying fox","iucn_status":"EX","primary_cause":"Unknown","last_sighting_year":1874,"region":"Percy Islands","wikipedia_url":"https://en.wikipedia.org/wiki/Dusky_flying_fox","image_url":"archive_images/pteropus_brunneus.webp","synopsis_en":"**The dusky dart of the night**, Pteropus brunneus once graced the skies, a creature of quiet, arboreal elegance. Its vanishing act, however, was a true masterclass in unceremonious exits, leaving behind only the most exquisite mystery: *why*? A dark jest of history, this elusive fruit bat simply ceased to be, without so much as a final, whispered goodbye.","synopsis_nn":"**Den mørke pilen frå natta**, Pteropus brunneus pryda ein gong himmelen, ei skapning av stille, trelevande eleganse. Men forsvinningsnummeret hennar var ei sann meisterklasse i useremoniell avgang, og etterlèt seg berre det mest utsøkte mysteriet: *kvifor*? Ein mørk spøk frå historia; denne flyktige fruktflaggermusa slutta rett og slett å eksistere, utan så mykje som eit siste, kviskra farvel."},{"scientific_name":"Lagorchestes leporides","common_name":"Eastern hare-wallaby","iucn_status":"EX","primary_cause":"Predation, habitat loss","last_sighting_year":1890,"region":"Australia","wikipedia_url":"https://en.wikipedia.org/wiki/Eastern_hare-wallaby","image_url":"archive_images/lagorchestes_leporides.webp","synopsis_en":"**A bouncy, grass-guzzling dynamo**, the Eastern hare-wallaby once ricocheted across Australia's sunburnt plains, a lithe sprite of the dawn. Tragically, its nimble spirit and boundless energy were no match for the twin specters of shrinking habitats and ravenous new predators, quietly vanishing this unique bounce into the historical record by the 1930s.","synopsis_nn":"**Ein spretten, gras-gnagande dynamo**, den austlege hare-wallabyen sprang ein gong lett og ledig over Australia sine solbrentte sletter, ein smidig morgonånd. Tragisk nok var den kvikke ånda og den grenselause energien hennar ingen match for dei tvilling-spøkelsa av innskrenka leveområde og glupske nye rovdyr, som stilferdig sletta denne unike spretten frå verda før 1930-talet var omme."},{"scientific_name":"Aepyornis maximus","common_name":"Elephant Bird","iucn_status":"EX","primary_cause":"Human hunting, egg collection","last_sighting_year":1000,"region":"Madagascar","wikipedia_url":"https://en.wikipedia.org/wiki/Elephant_bird","image_url":"archive_images/aepyornis_maximus.webp","synopsis_en":"**A once colossal and undeniably impressive resident of Madagascar**, the Elephant Bird, or Aepyornis maximus, fell victim to a familiar narrative: the arrival of humans. These flightless giants, with eggs larger than basketballs, were relentlessly hunted and their precious clutches plundered, sealing their fate as mere museum specimens. Their disappearance serves as a stark, if somewhat predictable, reminder of our species' profound ecological footprint.","synopsis_nn":"**Ein gong ein kolossal og udiskutabelt imponerande innbyggjar på Madagaskar**, blei elefantfuglen, eller Aepyornis maximus, offer for ei velkjend forteljing: menneska sin ankomst. Desse flygelause gigantane, med egg større enn basketballar, vart nådelaust jakta på og dei verdfulle eggsamlingane deira plyndra, noko som forsegla lagnaden deira som berre museumsutstillingar. Forsvinninga deira tener som ei tydeleg, om enn noko føreseieleg, påminning om det djupe økologiske fotavtrykket arten vår etterlet."},{"scientific_name":"Encephalartos woodii","common_name":"Encephalartos woodii","iucn_status":"EW","primary_cause":"Overcollection","last_sighting_year":1916,"region":"South Africa","wikipedia_url":"https://en.wikipedia.org/wiki/Encephalartos_woodii","image_url":"archive_images/encephalartos_woodii.webp","synopsis_en":"**The botanical equivalent of a one-hit wonder**, *Encephalartos woodii* achieved ultimate collector status. Its stunning rarity ignited such fervent desire that human admiration, tragically, became its undoing, plundering this magnificent species into oblivion before it could truly thrive.","synopsis_nn":"**Den botaniske perla som blei elska i hel**, *Encephalartos woodii* oppnådde den ultimate samlarstatusen. Den forbløffande sjeldnheita tente ei så intens lyst at menneskeleg beundring, tragisk nok, blei undergangen for denne praktfulle arten, som blei plyndra i gløymselen før ho verkeleg fekk sjansen til å blomstre."},{"scientific_name":"Dusicyon australis","common_name":"Falkland Islands wolf","iucn_status":"EX","primary_cause":"Hunting","last_sighting_year":1876,"region":"Falkland Islands","wikipedia_url":"https://en.wikipedia.org/wiki/Falkland_Islands_wolf","image_url":"archive_images/dusicyon_australis.webp","synopsis_en":"**The Falklands' unsuspecting monarch**, *Dusicyon australis*, once trotted the treeless plains, a unique wolf blissfully unaware of anything more menacing than a stiff breeze. Its eventual undoing? Not a stronger rival, but the curious — and tragically effective — human notion that everything interesting makes a better trophy than a living neighbour.","synopsis_nn":"**Den uvitande monarken på Falkland**, *Dusicyon australis*, spankulerte ein gong over dei trelause slettene, ein unik ulv lukkeleg uvitande om noko meir trugande enn ein stiv bris. Den endelege undergangen? Ikkje ein sterkare rival, men den nysgjerrige — og tragisk effektive — menneskelege ideen om at alt interessant er eit betre trofé enn ein levande nabo."},{"scientific_name":"Neofelis nebulosa brachyura","common_name":"Formosan Clouded Leopard","iucn_status":"EX","primary_cause":"Deforestation, hunting","last_sighting_year":1983,"region":"Taiwan","wikipedia_url":"https://en.wikipedia.org/wiki/Formosan_clouded_leopard","image_url":"archive_images/neofelis_nebulosa_brachyura.webp","synopsis_en":"**The Formosan Clouded Leopard,** *Neofelis nebulosa brachyura*, once a shy phantom of Taiwan's ancient forests, vanished silently, officially declared Extinct (EX) in 2013. Its demise, a predictable tragedy, was sealed by the relentless march of deforestation and unchecked hunting, leaving behind only elusive myths in the cloud-kissed mountains it once roamed. This apex predator's absence now echoes as a stark reminder of humanity's indelible mark.","synopsis_nn":"**Den formosanske tåkepard,** *Neofelis nebulosa brachyura*, ein gong eit skygt fantom i Taiwans eldgamle skogar, forsvann stille og vart offisielt erklært utrydda (EX) i 2013. Undergangen, ein føreseieleg tragedie, vart forsegla av den nådelause avskoginga og ukontrollert jakt, og etterlèt seg berre mytar i dei sky-kyssa fjella den ein gong streifa. Fråværet av dette topprovdyret gjenlyder no som ei skarp påminning om menneska sitt uutslettelege merke."},{"scientific_name":"Franklinia alatamaha","common_name":"Franklinia (extinct in wild)","iucn_status":"EW","primary_cause":"Unknown","last_sighting_year":1803,"region":"Georgia, USA","wikipedia_url":"https://en.wikipedia.org/wiki/Franklinia","image_url":"archive_images/franklinia_alatamaha.webp","synopsis_en":"**A botanical vanishing act,** the exquisite Franklinia tree gracefully bowed out of the wild by the early 1800s, leaving only cultivated descendants to ponder its fate. Its pristine beauty, an ancestral gift, didn't succumb to an obvious blight or a clear-cut villain; instead, it simply, almost comically, *poofed* into extinction, leaving us to muse on the sheer audacity of an unknown cause.","synopsis_nn":"**Ei botanisk forsvinningsakt,** det utsøkte frankliniatreet takka grasiøst for seg i villmarka tidleg på 1800-talet, og etterlét berre kultiverte avkom til å grunne over lagnaden sin. Dens plettfrie venleik, ei arveleg gåve, bukka ikkje under for openberr sjukdom eller ein tydeleg skurk; i staden *poffa* det berre, nesten komisk, inn i utrydding, og let oss grunne over den reine frekkheita i ei ukjend årsak."},{"scientific_name":"Coregonus fera","common_name":"Féra (Lake Geneva Whitefish)","iucn_status":"EX","primary_cause":"Overfishing, eutrophication","last_sighting_year":1920,"region":"Lake Geneva, Europe","wikipedia_url":"https://en.wikipedia.org/wiki/Coregonus_fera","image_url":"archive_images/coregonus_fera.webp","synopsis_en":"**The elegant Féra, once a culinary jewel of Lake Geneva**, met its unfortunate demise through a tragic blend of human greed and environmental neglect. Succumbing to intense overfishing and the suffocating embrace of eutrophication, this unique whitefish vanished from European waters by the turn of the 20th century. Its extinction serves as a stark, albeit somber, testament to our historical capacity for ecological short-sightedness.","synopsis_nn":"**Den elegante Féraen, ein gong ein kulinarisk juvel i Genfersjøen**, møtte sin sørgjelege skjebne gjennom ei tragisk blanding av menneskeleg grådigheit og miljømessig likegyldigheit. Denne unike sikarten bukka under for intens overfisking og den kvelande omfamninga av overgjødsling, og forsvann frå europeisk farvatn ved byrjinga av det 20. hundreåret. Utryddinga er eit tydeleg, men dystert, vitnesbyrd om vår historiske evne til økologisk kortsyntheit."},{"scientific_name":"Dicrogonatus gardineri","common_name":"Gardiner's giant mite","iucn_status":"EX","primary_cause":"Habitat loss","last_sighting_year":1903,"region":"Seychelles","wikipedia_url":"https://en.wikipedia.org/wiki/Gardiner%27s_giant_mite","image_url":"generics/generic_arachnid.webp","synopsis_en":"**Once the undisputed, if somewhat overlooked, king of the leaf litter, Gardiner's giant mite was a hulking terrestrial arachnid with a surprisingly delicate palate.** It once navigated vast, verdant worlds within worlds, performing a constant, gentle foraging ballet amongst decaying flora. Alas, even an entire universe of microscopic wonders shrinks to nothing when its macro-scale forest home vanishes, leaving our earnest giant with nowhere left to dance.","synopsis_nn":"**Ein gong den ubestridde, om enn noko oversette, kongen av lauvstrøet, var Gardiner sin gigantmidd ein ruvande landlevande arakknide med ein overraskande delikat gane.** Den navigerte ein gong vide, grøne verder inni verder, og utførte ein konstant, varsam søkeballett mellom rotna planter. Akk, sjølv eit heilt univers av mikroskopiske under skrumpar inn til ingenting når den storskala skogheimen forsvinn, og let vår ærlege gigant utan stad å danse."},{"scientific_name":"Rheobatrachus silus","common_name":"Gastric-brooding frog","iucn_status":"EX","primary_cause":"Disease (chytrid fungus)","last_sighting_year":1981,"region":"Australia","wikipedia_url":"https://en.wikipedia.org/wiki/Gastric-brooding_frog","image_url":"archive_images/rheobatrachus_silus.webp","synopsis_en":"**A living, breathing digestive system repurposed for childcare**, the Gastric-brooding frog (*Rheobatrachus silus*) was nature's most bizarre maternity ward, its stomach a sanctuary where tadpoles safely matured before being vomited into the world. This unparalleled evolutionary innovation, a literal gut feeling for parenting, ironically couldn't stomach the introduction of a microscopic fungal invader that merely attacked its skin, silencing its extraordinary croak forever.","synopsis_nn":"**Eit levande, pustande fordøyingssystem omgjort til barnehage**, maga-ruggefrosken (*Rheobatrachus silus*) var naturen sin mest bisarre fødeavdeling, magen hennar ein fristad der rumpetroll trygt modna før dei vart spytta ut i verda. Denne uovertrufne evolusjonære innovasjonen, ei bokstavleg magefølelse for foreldreskap, kunne ironisk nok ikkje fordøye innføringa av ein mikroskopisk soppinntrengjar som berre angreip huda hennar, og stilna hennar ekstraordinære kvekk for alltid."},{"scientific_name":"Cryptoprocta spelea","common_name":"Giant Fossa","iucn_status":"EX","primary_cause":"Habitat destruction, human arrival","last_sighting_year":1400,"region":"Madagascar","wikipedia_url":"https://en.wikipedia.org/wiki/Cryptoprocta_spelea","image_url":"archive_images/cryptoprocta_spelea.webp","synopsis_en":"**The colossal Cryptoprocta spelea**, a formidable predator, once roamed Madagascar, dwarfing its modern fossa cousin. Its demise, echoing the fate of much of the island's unique megafauna, swiftly followed the arrival of humans and their devastating habitat alterations. A stark reminder that even the apex of an ecosystem can vanish with alarming speed.","synopsis_nn":"**Den kolossale Cryptoprocta spelea**, ein fryktinngytande predator, streifa ein gong på Madagaskar og fekk den moderne fosa-slektningen sin til å sjå liten ut. Den forsvann, på same måte som mykje av øyas unike megafauna, raskt etter at menneska kom og endra leveområda øydeleggjande. Ei skarp påminning om at sjølv toppen av eit økosystem kan forsvinne med skremmande fart."},{"scientific_name":"Pachylemur insignis","common_name":"Giant Ruffed Lemur","iucn_status":"EX","primary_cause":"Hunting, habitat loss","last_sighting_year":1000,"region":"Madagascar","wikipedia_url":"https://en.wikipedia.org/wiki/Pachylemur","image_url":"archive_images/pachylemur_insignis.webp","synopsis_en":"**The Giant Ruffed Lemur,** once a magnificent denizen of Madagascar's ancient forests, fell victim to an all-too-familiar tale. Its impressive stature and shaggy grandeur offered no defense against the relentless pressures of human hunting and encroaching habitat loss. Now a grand, silent ghost, its absence serves as a stark reminder of our capacity for profound ecological erasure.","synopsis_nn":"**Den store hårete lemuren,** ein gong ein storslått innbyggjar i Madagaskars eldgamle skogar, vart offer for ei altfor kjend historie. Den imponerande storleiken og rufsete prakten var inga beskytting mot det nådelause presset frå jakt og tap av leveområde. No er han eit storslått, taust spøkelse, der fråværet hans tener som ei skarp påminning om vår evne til djupt økologisk fråvær."},{"scientific_name":"Archaeoindris fontoynontii","common_name":"Giant Sloth Lemur","iucn_status":"EX","primary_cause":"Human colonization, hunting","last_sighting_year":-350,"region":"Madagascar","wikipedia_url":"https://en.wikipedia.org/wiki/Archaeoindris","image_url":"archive_images/archaeoindris_fontoynontii.webp","synopsis_en":"**Imagine Archaeoindris fontoynontii,** the Giant Sloth Lemur, a colossal primate that once lumbered through Madagascar's ancient forests, only to vanish with the swiftness of human colonization. Weighing up to 200kg, this impressive creature, sadly, found its slow-moving nature and large size a fatal disadvantage against early settlers' hunting prowess. Its extinction serves as a sobering testament to humanity's profound, and often devastating, ecological footprint.","synopsis_nn":"**Førestell deg Archaeoindris fontoynontii,** kjempesimlelemuren, ein kolossal primat som ein gong labba gjennom dei gamle skogane på Madagaskar, berre for å forsvinne med farten til menneskeleg kolonisering. Denne imponerande skapningen, som vog opp mot 200 kg, fann diverre sin treigleik og store storleik som ei dødeleg ulempe mot dei tidlege busetjarane si jaktferdigheit. Utryddinga hans er eit tankevekkjande vitnesbyrd om menneska sitt djupe, og ofte øydeleggjande, økologiske fotavtrykk."},{"scientific_name":"Incilius periglenes","common_name":"Golden toad","iucn_status":"EX","primary_cause":"Climate change, disease","last_sighting_year":1989,"region":"Costa Rica","wikipedia_url":"https://en.wikipedia.org/wiki/Golden_toad","image_url":"archive_images/incilius_periglenes.webp","synopsis_en":"**Nature's fleeting Midas touch,** t
